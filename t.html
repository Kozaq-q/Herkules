<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>Tablica wyników — MSS</title>
<meta name="description" content="Wyniki zawodów na żywo — Military Sports System">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:      #0d0f0f;
  --bg2:     #141717;
  --bg3:     #1c2020;
  --bg4:     #232828;
  --border:  #2e3535;
  --border2: #3d4646;
  --text1:   #f0f2f2;
  --text2:   #c8cfcf;
  --text3:   #8a9898;
  --accent:  #e8d44d;
  --green:   #4caf82;
  --red:     #e05555;
  --blue:    #5b9bd5;
  --orange:  #e8944d;
  --male:    #5b9bd5;
  --female:  #d57b9b;
  --gold:    #ffd24a;
  --silver:  #c0c8cc;
  --bronze:  #cd8a4a;
  --font-h:  'Barlow Condensed', sans-serif;
  --font-b:  'Barlow', sans-serif;
  --font-m:  'JetBrains Mono', monospace;
  --radius:  4px;
  --radius-lg: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text1); font-family: var(--font-b); font-size: 15px; line-height: 1.5; min-height: 100vh; -webkit-text-size-adjust: 100%; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* HEADER (sticky) */
.tab-header {
  background: rgba(13,15,15,.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
}
.tab-logo {
  font-family: var(--font-h); font-size: 16px; font-weight: 800;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--accent); line-height: 1; flex-shrink: 0;
  display: inline-flex; align-items: baseline; gap: 8px;
}
.tab-logo .logo-sub {
  font-size: 9px; letter-spacing: 2.5px; color: var(--text3); font-weight: 700;
}
.tab-meta {
  font-family: var(--font-b); font-size: 12px; color: var(--text3);
  font-weight: 500; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: .3px;
}
.tab-live {
  font-family: var(--font-m); font-size: 9px; color: var(--text3);
  background: transparent; border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px 10px; display: inline-flex; align-items: center; gap: 6px;
  flex-shrink: 0; letter-spacing: 1.5px; text-transform: uppercase;
}

/* Przycisk lupy w naglowku */
.tab-search-btn {
  background: transparent; border: 1px solid var(--border);
  border-radius: 999px; padding: 6px 10px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text2); cursor: pointer; flex-shrink: 0;
  transition: color .15s, border-color .15s, background .15s;
}
.tab-search-btn:hover { color: var(--accent); border-color: var(--border2); background: var(--bg2); }
.tab-search-btn:active { transform: scale(.96); }

/* SEARCH OVERLAY */
.search-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(13,15,15,.78);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 40px 16px;
  animation: searchFadeIn .18s ease;
}
.search-overlay.open { display: block; }
@keyframes searchFadeIn { from { opacity: 0; } to { opacity: 1; } }
.search-modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 16px;
  max-width: 620px; margin: 0 auto;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(232,212,77,.04);
  animation: searchSlide .22s ease;
  display: flex; flex-direction: column; max-height: calc(100vh - 80px);
}
@keyframes searchSlide { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.search-head {
  padding: 18px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(232,212,77,.03), transparent);
}
.search-input-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 12px;
  transition: border-color .15s, background .15s;
}
.search-input-wrap:focus-within { border-color: var(--accent); background: var(--bg4); }
.search-input-wrap .search-icon { color: var(--text3); flex-shrink: 0; transition: color .15s; }
.search-input-wrap:focus-within .search-icon { color: var(--accent); }
.search-input-wrap input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text1); font-family: var(--font-b); font-size: 16px;
  letter-spacing: .2px; min-width: 0;
}
.search-input-wrap input::placeholder { color: var(--text3); font-weight: 400; }
.search-close {
  background: transparent; border: none; color: var(--text3); cursor: pointer;
  width: 24px; height: 24px; border-radius: 999px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  transition: color .15s, background .15s;
}
.search-close:hover { color: var(--text1); background: var(--bg4); }
.search-hint {
  font-family: var(--font-m); font-size: 10px; color: var(--text3);
  letter-spacing: 1px; text-transform: uppercase;
  margin-top: 10px; padding: 0 2px;
}
.search-results {
  overflow-y: auto; padding: 8px 8px 14px;
}
.search-results::-webkit-scrollbar { width: 6px; }
.search-result {
  background: transparent; border: 1px solid transparent;
  border-radius: 10px;
  padding: 12px 14px;
  display: grid; grid-template-columns: 1fr auto;
  gap: 12px; align-items: center;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  text-align: left;
  width: 100%;
  margin-bottom: 4px;
}
.search-result:hover { background: var(--bg3); border-color: var(--border); }
.search-result-name {
  font-family: var(--font-b); font-size: 15px; font-weight: 700;
  color: var(--text1); line-height: 1.2; word-break: break-word;
}
.search-result-meta {
  font-family: var(--font-m); font-size: 11px; color: var(--text3);
  margin-top: 3px; letter-spacing: .3px;
}
.search-result-cat {
  font-family: var(--font-h); font-size: 9px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid currentColor;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
}
.search-result-cat.cat-m { color: var(--male); }
.search-result-cat.cat-k { color: var(--female); }
.search-result-cat.cat-team { color: var(--orange); }
.search-result-cat.cat-trun { color: #60a8e8; }
.search-result-cat.cat-overall { color: var(--accent); }
.search-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-family: var(--font-b); font-size: 14px;
}
@media (max-width: 520px) {
  .search-overlay { padding: 12px 8px; }
  .search-modal { max-height: calc(100vh - 24px); border-radius: 14px; }
  .search-result-name { font-size: 14px; }
  .search-result-cat { font-size: 8px; padding: 3px 8px; }
}
.tab-live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background .3s; }
.tab-live.ok { color: var(--green); border-color: rgba(76,175,130,.4); background: rgba(76,175,130,.1); }
.tab-live.ok .dot { background: var(--green); animation: pulse 2s ease-in-out infinite; }
.tab-live.err { color: var(--red); border-color: rgba(224,85,85,.4); background: rgba(224,85,85,.1); }
.tab-live.err .dot { background: var(--red); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

/* HERO — nazwa zawodow */
.hero {
  text-align: center;
  padding: 28px 20px 22px;
  max-width: 820px;
  margin: 0 auto 12px;
  position: relative;
}
.hero-chip {
  display: inline-block;
  font-family: var(--font-h);
  font-size: 10px; font-weight: 800; letter-spacing: 3px;
  text-transform: uppercase; color: var(--accent);
  padding: 5px 14px;
  border: 1px solid rgba(232,212,77,.35);
  border-radius: 999px;
  background: rgba(232,212,77,.05);
  margin-bottom: 16px;
}
.hero-title {
  font-family: var(--font-h);
  font-size: 30px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text1);
  line-height: 1.12;
  margin-bottom: 8px;
  text-wrap: balance;
}
.hero-meta {
  font-family: var(--font-m);
  font-size: 12px; letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
}
.hero-meta .sep { opacity: .35; margin: 0 8px; }
.hero-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 18px auto 0;
  opacity: .6;
}
@media (min-width: 900px) {
  .hero { padding: 48px 20px 30px; }
  .hero-title { font-size: 44px; letter-spacing: 1.5px; }
  .hero-meta { font-size: 13px; }
}

/* TILE MENU (kategorie jako kafelki — eleganckie) */
.tile-grid {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
  max-width: 720px; margin: 0 auto;
}
.cat-tile {
  --tile-accent: var(--text3);
  --tile-accent-soft: rgba(200,207,207,.18);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px 18px 22px;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; color: var(--text1); text-align: center;
  cursor: pointer;
  transition: transform .18s ease, border-color .2s, background .2s, box-shadow .2s;
  min-height: 134px; justify-content: center;
  position: relative; overflow: hidden;
  flex: 0 1 calc(50% - 6px);
}
.cat-tile::before {
  /* subtelna linia akcent na gornej krawedzi */
  content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--tile-accent), transparent);
  opacity: .55;
  transition: opacity .2s, left .2s, right .2s;
}
.cat-tile:hover {
  transform: translateY(-2px);
  border-color: var(--tile-accent);
  background: var(--bg3);
  box-shadow: 0 10px 30px -12px var(--tile-accent-soft);
}
.cat-tile:hover::before { opacity: 1; left: 8%; right: 8%; }
.cat-tile:active { transform: translateY(0) scale(.985); }
.cat-tile .cat-icon {
  font-size: 30px; line-height: 1; margin-bottom: 6px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
}
.cat-tile .cat-label {
  font-family: var(--font-h); font-size: 16px; font-weight: 700;
  letter-spacing: 2.2px; text-transform: uppercase; line-height: 1.15;
  color: var(--tile-accent);
}
.cat-tile .cat-sub {
  font-family: var(--font-b); font-size: 11px; color: var(--text3);
  letter-spacing: .3px; margin-top: 6px; line-height: 1.35;
  font-weight: 500;
}
.cat-tile.cat-m { --tile-accent: var(--male); --tile-accent-soft: rgba(91,155,213,.18); }
.cat-tile.cat-k { --tile-accent: var(--female); --tile-accent-soft: rgba(216,120,164,.18); }
.cat-tile.cat-team { --tile-accent: var(--orange); --tile-accent-soft: rgba(232,148,77,.18); }
.cat-tile.cat-trun { --tile-accent: #60a8e8; --tile-accent-soft: rgba(96,168,232,.18); }
.cat-tile.cat-overall {
  --tile-accent: var(--accent);
  --tile-accent-soft: rgba(232,212,77,.18);
  order: -1; flex-basis: 100%;
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(232,212,77,.09) 0%, var(--bg2) 70%);
  min-height: 120px; padding: 26px 18px;
}
.cat-tile.cat-overall .cat-icon { font-size: 30px; margin-bottom: 4px; }
.cat-tile.cat-overall .cat-label { font-size: 20px; }
@media (min-width: 900px) {
  .tile-grid { max-width: 1120px; gap: 16px; }
  .cat-tile { padding: 36px 16px 30px; min-height: 160px; flex-basis: calc(25% - 12px); }
  .cat-tile .cat-icon { font-size: 38px; }
  .cat-tile .cat-label { font-size: 18px; }
  .cat-tile .cat-sub { font-size: 12px; }
  .cat-tile.cat-overall { flex-basis: 100%; min-height: 132px; padding: 32px; }
  .cat-tile.cat-overall .cat-icon { font-size: 32px; }
  .cat-tile.cat-overall .cat-label { font-size: 20px; }
}

/* DETAIL view */
.detail-wrap { max-width: 980px; margin: 0 auto; padding-top: 4px; }
.detail-back {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 999px; color: var(--text3);
  font-family: var(--font-h); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 16px 8px 12px; cursor: pointer; margin-bottom: 22px;
  transition: background .15s, color .15s, border-color .15s, transform .12s;
}
.detail-back:hover { background: var(--bg2); color: var(--text1); border-color: var(--border2); transform: translateX(-2px); }
.detail-back .arrow { font-size: 13px; line-height: 1; }

.detail-title {
  font-family: var(--font-h); font-size: 24px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
}
.detail-title .icon { font-size: 28px; line-height: 1; }
.detail-title.cat-m-color { color: var(--male); }
.detail-title.cat-k-color { color: var(--female); }
.detail-title.cat-team-color { color: var(--orange); }
.detail-title.cat-trun-color { color: #60a8e8; }
.detail-title.cat-overall-color { color: var(--accent); }
.detail-subtitle {
  font-size: 12px; color: var(--text3); margin-bottom: 22px;
  font-family: var(--font-m); letter-spacing: .8px;
  text-transform: uppercase; opacity: .85;
}

/* MAIN */
.tab-main { padding: 16px 12px 60px; max-width: 980px; margin: 0 auto; }

/* RANKING CARD */
.rank-card {
  display: grid; grid-template-columns: 56px 1fr auto; gap: 12px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px; margin-bottom: 10px; align-items: center;
}
.rank-card.top-1 { border-color: var(--gold); background: linear-gradient(135deg, var(--bg2) 0%, rgba(255,210,74,.08) 100%); }
.rank-card.top-2 { border-color: var(--silver); background: linear-gradient(135deg, var(--bg2) 0%, rgba(192,200,204,.06) 100%); }
.rank-card.top-3 { border-color: var(--bronze); background: linear-gradient(135deg, var(--bg2) 0%, rgba(205,138,74,.06) 100%); }
.rank-card.dsq { opacity: .5; }
.td-chip.medal-1 { border: 2px solid var(--gold); background: rgba(255,210,74,.13); }
.td-chip.medal-2 { border: 2px solid var(--silver); background: rgba(192,200,204,.13); }
.td-chip.medal-3 { border: 2px solid var(--bronze); background: rgba(205,138,74,.13); }
.td-chip.medal-1 .td-chip-big { color: var(--gold); }
.td-chip.medal-2 .td-chip-big { color: var(--silver); }
.td-chip.medal-3 .td-chip-big { color: var(--bronze); }
.rank-num {
  font-family: var(--font-h); font-size: 32px; font-weight: 800;
  text-align: center; line-height: 1; color: var(--text3);
}
.rank-card.top-1 .rank-num { color: var(--gold); font-size: 38px; }
.rank-card.top-2 .rank-num { color: var(--silver); font-size: 36px; }
.rank-card.top-3 .rank-num { color: var(--bronze); font-size: 36px; }
.rank-medal { font-size: 24px; line-height: 1; }
.rank-info { min-width: 0; }
.rank-name { font-family: var(--font-b); font-size: 16px; font-weight: 700; color: var(--text1); line-height: 1.2; margin-bottom: 3px; word-wrap: break-word; }
.rank-team { font-family: var(--font-m); font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.rank-team-link { cursor: pointer; transition: color .12s; display: inline-block; }
.rank-team-link:hover { color: var(--accent); }
.rank-team-link:active { color: var(--accent); }
.team-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 18px; color: var(--text1); font-family: var(--font-b); font-weight: 700; font-size: 14px; cursor: pointer; transition: border-color .12s, color .12s; }
.team-pill:hover, .team-pill:active { border-color: var(--accent); color: var(--accent); }
.team-pill .ic { font-size: 16px; color: var(--accent); }
.rank-card.flash { animation: cardflash 2.4s ease-out; }
@keyframes cardflash {
  0%   { box-shadow: 0 0 0 3px var(--accent); background: rgba(255,255,255,.07); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
}
.td-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; justify-content: center; }
.stat-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 6px; }
.stat-row .stat-tile { min-width: 84px; width: auto; max-width: 100%; }
.td-chip-big.td-chip-accentval { color: var(--accent); }
.td-chip { box-sizing: border-box; flex: 0 0 auto; min-width: 108px; width: auto; max-width: 100%; height: 108px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.td-chip-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; line-height: 1.15; }
.td-chip-big { font-size: 38px; font-weight: 800; color: var(--text1); line-height: 1; margin: 5px 0 3px; white-space: nowrap; }
.td-chip-sub { font-size: 10px; color: var(--text3); line-height: 1.15; }
.td-section-lbl { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; font-family: var(--font-m); }
.rank-card[data-aid] .rank-name { cursor: pointer; transition: color .12s; display: inline-block; }
.rank-card[data-aid] .rank-name:hover { color: var(--accent); }
.rank-card[data-aid] .rank-name:active { color: var(--accent); }
.age36 { display: inline-block; font-family: var(--font-m); font-size: 9px; font-weight: 700; padding: 1px 5px; background: rgba(91,155,213,.15); color: #5b9bd5; border: 1px solid rgba(91,155,213,.45); border-radius: 3px; letter-spacing: .5px; margin-left: 6px; vertical-align: 2px; }
.td-chip-link { cursor: pointer; }
.td-chip-link:hover { border-color: var(--accent); }
#to-top { position: fixed; right: 16px; bottom: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text1); font-size: 20px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
#to-top.show { display: flex; }
#to-back { position: fixed; left: 16px; bottom: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text1); cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
#to-back.show { display: flex; }
.rank-details { display: flex; flex-wrap: wrap; gap: 8px 14px; font-family: var(--font-m); font-size: 11px; color: var(--text3); }
.rank-detail-lbl { color: var(--text3); margin-right: 3px; }
.rank-detail-val { color: var(--text2); }
.rank-detail-val.best-time { color: var(--green); font-weight: 700; }
.stat-tile .st-val.st-val-best { color: var(--green); }
.rank-score-formula { font-family: var(--font-m); font-size: 8px; color: var(--text3); white-space: nowrap; letter-spacing: .3px; margin-left: 4px; font-weight: 400; text-transform: none; }
.td-chip.td-chip-feat { flex-basis: auto; width: auto; min-width: 240px; max-width: 100%; height: auto; padding: 12px 24px; border-width: 2px; border-color: var(--accent); }
.td-chip.td-chip-feat .td-chip-big { font-size: 34px; }
.td-chip.td-chip-feat.medal-1 { border-color: var(--gold); }
.td-chip.td-chip-feat.medal-2 { border-color: var(--silver); }
.td-chip.td-chip-feat.medal-3 { border-color: var(--bronze); }
.rank-score {
  font-family: var(--font-m); font-size: 22px; font-weight: 700;
  color: var(--accent); text-align: right; line-height: 1; padding-left: 8px;
}
.rank-score.dnf { color: var(--text3); font-size: 14px; }
.rank-score-lbl { font-family: var(--font-h); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }

/* EMPTY */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text3);
  font-family: var(--font-h); font-size: 16px; letter-spacing: 1px;
  text-transform: uppercase;
}
.empty-icon { font-size: 48px; opacity: .3; margin-bottom: 16px; }
.ic { display: inline-flex; align-items: center; justify-content: center; vertical-align: -0.15em; }
.ic svg { width: 1em; height: 1em; display: block; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 10px; margin-bottom: 6px; }
.stat-tile { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.stat-tile .st-ic { color: var(--accent); font-size: 18px; display: block; margin-bottom: 5px; }
.stat-tile .st-val { font-family: var(--font-m); font-size: 19px; font-weight: 700; color: var(--text1); line-height: 1.1; white-space: nowrap; }
.stat-tile .st-val.st-val-accent { color: var(--accent); }
.stat-tile .st-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-top: 5px; }

/* LOADING */
.loading { text-align: center; padding: 60px 20px; color: var(--text3); font-family: var(--font-m); font-size: 12px; }

/* SLOTS LIST (no slot in URL) */
.slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.slot-tile {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 16px; cursor: pointer; transition: border-color .15s, transform .12s;
  display: flex; flex-direction: column; gap: 8px;
}
.slot-tile:hover { border-color: var(--border2); transform: translateY(-1px); }
.slot-tile-chip {
  font-family: var(--font-h); font-size: 10px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 10px; border-radius: 3px;
  display: inline-block; align-self: flex-start;
}
.slot-tile-chip.patrol { background: rgba(76,175,130,.15); color: var(--green); border: 1px solid rgba(76,175,130,.4); }
.slot-tile-chip.osf { background: rgba(232,148,77,.15); color: var(--orange); border: 1px solid rgba(232,148,77,.4); }
.slot-tile-chip.wieloboj { background: rgba(91,155,213,.15); color: var(--blue); border: 1px solid rgba(91,155,213,.4); }
.slot-tile-name { font-family: var(--font-b); font-size: 16px; font-weight: 700; color: var(--text1); }
.slot-tile-meta { font-family: var(--font-m); font-size: 11px; color: var(--text3); }

/* PROJECTOR mode (large screens) */
@media (min-width: 1400px) {
  .tab-logo { font-size: 26px; }
  .tab-meta { font-size: 18px; }
  .rank-card { padding: 18px 22px; }
  .rank-name { font-size: 20px; }
  .rank-team { font-size: 13px; }
  .rank-details { font-size: 13px; }
  .rank-score { font-size: 30px; }
  .rank-num { font-size: 40px; }
  .rank-card.top-1 .rank-num { font-size: 48px; }
}

/* Mobile-specific */
@media (max-width: 480px) {
  .tab-header { padding: 8px 12px; }
  .tab-logo { font-size: 16px; letter-spacing: 2px; }
  .tab-meta { font-size: 11px; }
  .tab-tabs { padding: 0 8px; }
  .tab-tab { padding: 10px 10px; font-size: 11px; letter-spacing: 1px; }
  .tab-main { padding: 12px 8px 40px; }
  .rank-card { padding: 10px; gap: 8px; grid-template-columns: 42px 1fr auto; }
  .rank-num { font-size: 24px; }
  .rank-name { font-size: 14px; }
  .rank-score { font-size: 18px; }
  .td-chip { min-width: 92px; height: 100px; padding: 10px 12px; }
  .td-chip-big { font-size: 30px; }
  .td-chips { gap: 8px; }
  .stat-row { gap: 8px; }
  .stat-row .stat-tile { min-width: 72px; }
  .stat-tile .st-val { font-size: 17px; }
}

<body>

<header class="tab-header">
  <div class="tab-logo">⬡ MSS <span class="logo-sub" id="header-type-sub"></span></div>
  <div class="tab-meta" id="meta"></div>
  <button class="tab-search-btn" id="search-btn" onclick="openSearch()" title="Wyszukaj zawodnika / drużynę" aria-label="Szukaj">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
    </svg>
  </button>
  <div class="tab-live" id="live"><span class="dot"></span><span id="live-lbl">…</span></div>
</header>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-head">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        </svg>
        <input id="search-input" type="text" placeholder="Nazwisko, drużyna..."
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               oninput="runSearch()" onkeydown="if(event.key==='Escape')closeSearch();" />
        <button class="search-close" onclick="closeSearch()" aria-label="Zamknij">✕</button>
      </div>
      <div class="search-hint" id="search-hint">Wpisz min. 2 znaki</div>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<main class="tab-main" id="main">
  <div class="loading">Ładowanie…</div>
</main>
<button id="to-top" aria-label="Na górę" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<button id="to-back" aria-label="Wstecz" onclick="_navBack()"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0"/><path d="M5 12l6 6"/><path d="M5 12l6 -6"/></svg></button>

<script>
// ═══════════════════════════════════════════════════════════════
// KONFIG SUPABASE — read-only client (anon key)
// Idziemy przez Cloudflare Worker (cache 10s) zamiast direct
// do Supabase. Worker redukuje liczbe zapytan ~300x przy duzej
// liczbie viewerow. Kod Worker: cloudflare/worker.js
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://mss-api.pawelkozak4327.workers.dev';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyZ2tnenJwZmVtbXRoc2NycHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjYxMTUsImV4cCI6MjA4OTAwMjExNX0.CKuLNRCyolMf6nPiWgOcE8j76Isjwc12bwQmIY5E8Do';
let _sb = null;
function getSB() {
  if (!_sb) _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: false, autoRefreshToken: false }
  });
  return _sb;
}

// ═══════════════════════════════════════════════════════════════
// URL PARAMS
// ═══════════════════════════════════════════════════════════════
const URL_PARAMS = new URLSearchParams(window.location.search);
// Obsluga obu wersji: ?slot=<pelny UUID> (legacy) lub ?s=<ostatnie 6 znakow>
const URL_SLOT_FULL = URL_PARAMS.get('slot');
const URL_SLOT_SHORT = URL_PARAMS.get('s');
// URL_SLOT zostanie ustalony - dla pelnego od razu, dla short po async lookup
let URL_SLOT = URL_SLOT_FULL || null;

// Resolver short code -> pelny slot_id (przeszuka herkules_slots ILIKE %suffix)
async function _resolveShortSlot(short) {
  if (!short) return null;
  const norm = String(short).toLowerCase().trim();
  if (!norm) return null;
  const { data, error } = await getSB()
    .from('herkules_slots')
    .select('slot_id')
    .ilike('slot_id', '%' + norm);
  if (error || !data || !data.length) return null;
  return data[0].slot_id;
}

// State
let _slot = null;        // herkules_slots row
let _slotMeta = null;    // parsed slot_json
let _competitionType = null; // 'patrol' | 'osf' | 'wielobój'
let _state = null;       // state_json parsed (z patrol_state / osf_state / app_state)
let _refreshTimer = null;
let _activeTab; // undefined = jeszcze nieustawione, null = menu kafelkowe, string = wybrana kategoria ('__team' = karta druzyny)
let _teamDetail = null;       // nazwa druzyny dla widoku '__team'
let _athleteDetailId = null;  // id zawodnika dla widoku '__athlete'
let _pendingScroll = null;    // selektor CSS do doscrollowania+podswietlenia po renderze
let _delegatesInit = false;   // czy podpieto delegowane klikniecia

function setLive(status) {
  const el = document.getElementById('live');
  const lbl = document.getElementById('live-lbl');
  el.classList.remove('ok', 'err');
  if (status === 'ok') { el.classList.add('ok'); lbl.textContent = 'LIVE'; }
  else if (status === 'err') { el.classList.add('err'); lbl.textContent = 'BŁĄD'; }
  else { lbl.textContent = '...'; }
}

function setMeta(text) {
  document.getElementById('meta').textContent = text || '';
}

// Ustaw label typu zawodow w naglowku (subtelny: BIEG PATROLOWY, OSF, WIELOBÓJ)
function setHeaderTypeSub(typeLabel) {
  const el = document.getElementById('header-type-sub');
  if (el) el.textContent = typeLabel ? '· ' + typeLabel : '';
}

// Buduje sekcje hero (nazwa + miasto + data) zwraca HTML string
function _heroHTML() {
  if (!_slotMeta) return '';
  const typeLabel = _competitionType === 'wielobój' ? 'Wielobój' : (_competitionType === 'osf' ? 'OSF' : 'Bieg patrolowy');
  const name = _slotMeta.name || 'Zawody';
  const city = _slotMeta.city || '';
  const date = _slotMeta.date || '';
  const dateFmt = date ? _formatDateNice(date) : '';
  const metaParts = [];
  if (city) metaParts.push('<span>' + esc(city) + '</span>');
  if (dateFmt) metaParts.push('<span>' + esc(dateFmt) + '</span>');
  const metaJoined = metaParts.join('<span class="sep">·</span>');
  return '<section class="hero">' +
    '<div class="hero-chip">' + esc(typeLabel) + '</div>' +
    '<h1 class="hero-title">' + esc(name) + '</h1>' +
    (metaJoined ? '<div class="hero-meta">' + metaJoined + '</div>' : '') +
    '<div class="hero-divider"></div>' +
  '</section>';
}

// Format daty: "2026-02-17" -> "17.02.2026"
function _formatDateNice(d) {
  if (!d) return '';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3] + '.' + m[2] + '.' + m[1];
  return d;
}

// ─── SEARCH (zawodnicy + druzyny + wyniki) ───
function openSearch() {
  if (!_state) return;
  const overlay = document.getElementById('search-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  const inp = document.getElementById('search-input');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
  runSearch();
}

function closeSearch() {
  const overlay = document.getElementById('search-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Normalizacja stringu: lowercase, usun polskie znaki dla bardziej forgiving search
function _normForSearch(s) {
  if (!s) return '';
  return String(s).toLowerCase()
    .replace(/[ąa]/g,'a').replace(/[ćc]/g,'c').replace(/[ęe]/g,'e')
    .replace(/[łl]/g,'l').replace(/[ńn]/g,'n').replace(/[óo]/g,'o')
    .replace(/[śs]/g,'s').replace(/[źżz]/g,'z')
    .replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim();
}

function runSearch() {
  const inp = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const hint = document.getElementById('search-hint');
  const q = inp.value.trim();
  const qn = _normForSearch(q);

  if (qn.length < 2) {
    hint.textContent = q.length === 0 ? 'Wpisz nazwisko, drużynę lub fragment...' : 'Wpisz min. 2 znaki';
    results.innerHTML = '';
    return;
  }

  const hits = _searchInState(qn);
  hint.textContent = hits.length === 0
    ? 'Brak dopasowań'
    : (hits.length === 1 ? '1 wynik' : (hits.length + (hits.length < 5 ? ' wyniki' : ' wyników')));

  if (hits.length === 0) {
    results.innerHTML = '<div class="search-empty">' + ic('moodEmpty') + '<br><br>Nic nie znaleziono</div>';
    return;
  }
  results.innerHTML = hits.map(h =>
    '<button class="search-result" ' +
      (h.isTeam
        ? 'data-team="' + esc(h.team != null ? h.team : h.name) + '"'
        : 'data-cat="' + esc(h.catId) + '" data-aid="' + esc(String(h.aid)) + '"') +
    '>' +
      '<div>' +
        '<div class="search-result-name">' + esc(h.name) + '</div>' +
        '<div class="search-result-meta">' + esc(h.meta || '') + '</div>' +
      '</div>' +
      '<div class="search-result-cat ' + h.catCls + '">' + h.catIcon + ' ' + esc(h.catLabel) + '</div>' +
    '</button>'
  ).join('');
}

function _searchPickResult(catId, aid) {
  closeSearch();
  _teamDetail = null;
  _pendingScroll = (aid !== undefined && aid !== null && aid !== '' && aid !== 'undefined') ? ('.rank-card[data-aid="' + _cssEsc(aid) + '"]') : null;
  setTab(catId);
}

// Szuka w aktualnym _state. Zwraca [{name, meta, catId, catLabel, catCls, catIcon}].
function _searchInState(qn) {
  const tabs = _getTabsForType();
  const findTab = (id) => tabs.find(t => t.id === id) || {};
  const hits = [];
  const seen = new Set(); // dedupe (athlete moze byc w team-run i ind)

  function _matchAth(a) {
    if (!a) return false;
    const n = _normForSearch(a.name || '');
    const t = _normForSearch(a.team || '');
    return n.includes(qn) || t.includes(qn);
  }

  function _matchTeam(teamName) {
    return _normForSearch(teamName || '').includes(qn);
  }

  if (_competitionType === 'patrol') {
    // Indywidualnie M
    (_state.athletes || []).filter(a => a.gender === 'M' && _matchAth(a)).forEach(a => {
      const key = 'ind-m-' + a.id;
      if (seen.has(key)) return; seen.add(key);
      const tab = findTab('m');
      hits.push({ name: (a.rank ? a.rank + ' ' : '') + a.name, meta: a.team || '—', aid: a.id, catId: 'm', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
    });
    // Indywidualnie K
    (_state.athletes || []).filter(a => a.gender === 'K' && _matchAth(a)).forEach(a => {
      const key = 'ind-k-' + a.id;
      if (seen.has(key)) return; seen.add(key);
      const tab = findTab('k');
      hits.push({ name: (a.rank ? a.rank + ' ' : '') + a.name, meta: a.team || '—', aid: a.id, catId: 'k', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
    });
    // Druzyny (zbierz z athletes)
    const teamsSeen = new Set();
    (_state.athletes || []).forEach(a => {
      if (a.team && !teamsSeen.has(a.team) && _matchTeam(a.team)) {
        teamsSeen.add(a.team);
        const tab = findTab('team');
        hits.push({ name: a.team, meta: 'Drużyna', isTeam: true, team: a.team, catId: 'team', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
      }
    });
    // Bieg druzynowy
    Object.keys(_state.teamRun || {}).forEach(teamName => {
      if (_matchTeam(teamName)) {
        const tab = findTab('trun');
        hits.push({ name: teamName, meta: 'Bieg drużynowy', isTeam: true, team: teamName, catId: 'trun', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
      }
    });
  } else if (_competitionType === 'osf') {
    (_state.athletes || []).filter(a => a.gender === 'M' && !a.pk && _matchAth(a)).forEach(a => {
      const tab = findTab('m');
      hits.push({ name: (a.rank ? a.rank + ' ' : '') + a.name, meta: a.team || '—', aid: a.id, catId: 'm', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
    });
    (_state.athletes || []).filter(a => a.gender === 'K' && !a.pk && _matchAth(a)).forEach(a => {
      const tab = findTab('k');
      hits.push({ name: (a.rank ? a.rank + ' ' : '') + a.name, meta: a.team || '—', aid: a.id, catId: 'k', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
    });
    const teamsSeen = new Set();
    (_state.athletes || []).forEach(a => {
      if (a.team && !teamsSeen.has(a.team) && _matchTeam(a.team)) {
        teamsSeen.add(a.team);
        const tab = findTab('team');
        hits.push({ name: a.team, meta: 'Drużyna', isTeam: true, team: a.team, catId: 'team', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
      }
    });
  } else if (_competitionType === 'wielobój') {
    // Athletes
    (_state.athletes || []).filter(a => !a.pk).forEach(a => {
      const team = (_state.teams || []).find(t => t.id == a.teamId);
      const teamName = team ? team.name : (a.team || '');
      const nMatch = _normForSearch(a.name || '').includes(qn);
      const tMatch = _normForSearch(teamName).includes(qn);
      if (!nMatch && !tMatch) return;
      const catId = (a.cat || (a.gender === 'K' ? 'k' : 'm')).toLowerCase();
      const tab = findTab(catId);
      hits.push({
        name: (a.rank ? a.rank + ' ' : '') + a.name, meta: teamName + (a.cat ? ' · ' + a.cat : ''),
        aid: a.id, catId, catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon
      });
    });
    // Teams
    (_state.teams || []).forEach(team => {
      if (_matchTeam(team.name)) {
        const tab = findTab('team');
        hits.push({ name: team.name, meta: 'Drużyna', isTeam: true, team: team.name, catId: 'team', catLabel: tab.label, catCls: tab.cls, catIcon: tab.icon });
      }
    });
  }

  return hits.slice(0, 50); // limit
}

// Globalny klawisz Esc i Cmd/Ctrl+K (powerful UX)
window.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const ov = document.getElementById('search-overlay');
    if (ov && ov.classList.contains('open')) closeSearch();
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    openSearch();
  }
});

// ROUTING — bez ?slot=, pokaz liste wszystkich aktywnych zawodow
// ═══════════════════════════════════════════════════════════════

async function showSlotsList() {
  setMeta('Wybierz zawody');
  document.getElementById('tabs').style.display = 'none';
  setLive('ok');

  try {
    const { data, error } = await getSB()
      .from('herkules_slots')
      .select('slot_id, slot_json, updated_at')
      .order('updated_at', { ascending: false });
    if (error) throw error;

    const slots = (data || []).map(row => {
      try { return { id: row.slot_id, raw: row, meta: JSON.parse(row.slot_json || '{}') }; }
      catch (_) { return null; }
    }).filter(Boolean);

    // Filtr: tylko aktywne (nie "done")
    const active = slots.filter(s => !s.meta.done);

    if (active.length === 0) {
      document.getElementById('main').innerHTML =
        '<div class="empty"><div class="empty-icon">' + ic('run') + '</div>Brak aktywnych zawodów</div>';
      return;
    }

    const html = ['<div class="slot-grid">'];
    for (const s of active) {
      const type = _resolveType(s.meta.type);
      const chipCls = (type === 'wielobój') ? 'wieloboj' : (type === 'osf' ? 'osf' : 'patrol');
      const typeLabel = (type === 'wielobój') ? 'Wielobój' : (type === 'osf' ? 'OSF' : 'Patrol');
      const name = s.meta.name || 'Zawody bez nazwy';
      const city = s.meta.city || '';
      const date = s.meta.date || '';
      // Krotki link z ostatnich 6 znakow slot_id
      const shortCode = String(s.id).slice(-6).toLowerCase();
      const url = 't.html?s=' + encodeURIComponent(shortCode);
      html.push(
        '<a class="slot-tile" href="' + esc(url) + '" style="text-decoration:none;color:inherit;">' +
          '<div class="slot-tile-chip ' + chipCls + '">' + typeLabel + '</div>' +
          '<div class="slot-tile-name">' + esc(name) + '</div>' +
          '<div class="slot-tile-meta">' + esc([city, date].filter(Boolean).join(' · ') || '—') + '</div>' +
        '</a>'
      );
    }
    html.push('</div>');
    document.getElementById('main').innerHTML = html.join('');
  } catch (e) {
    console.error('[tablica] showSlotsList', e);
    setLive('err');
    document.getElementById('main').innerHTML =
      '<div class="empty"><div class="empty-icon">' + ic('alert') + '</div>Bład: ' + esc(e.message) + '</div>';
  }
}

function _resolveType(raw) {
  if (raw === 'czworboj') return 'wielobój';
  if (raw === 'wielobój' || raw === 'osf' || raw === 'patrol') return raw;
  return raw || null;
}

// ═══════════════════════════════════════════════════════════════
// PATROL — punktacja (port z patrol.html)
// ═══════════════════════════════════════════════════════════════

function parseTime(t) {
  if (!t || typeof t !== 'string') return NaN;
  if (t === 'DNF' || t === 'DNS') return NaN;
  // Formaty: "m:ss.SS", "mm:ss", "ss.SS", "ss"
  const m = t.match(/^(\d+):(\d{1,2}(?:\.\d+)?)$/);
  if (m) return parseInt(m[1]) * 60 + parseFloat(m[2]);
  const n = parseFloat(t);
  return isNaN(n) ? NaN : n;
}

function isTimeMarker(v) { return v === 'DNF' || v === 'DNS'; }

function _shotPointsFromRow(row) {
  if (row.shotPoints !== undefined && row.shotPoints !== null && row.shotPoints !== '') {
    const n = parseInt(row.shotPoints);
    return Number.isFinite(n) ? n : null;
  }
  if (row.hits !== undefined && row.hits !== null) {
    const h = parseInt(row.hits);
    return Number.isFinite(h) ? h * 10 : null;
  }
  return null;
}

function calcPatrolPoints(row) {
  if (row.dsq) return null;
  if (!Number.isFinite(row.totalSec) || row.totalSec === Infinity) return null;
  const osfSec = (row.osf && !isTimeMarker(row.osf)) ? parseTime(row.osf) : null;
  if (osfSec === null || !Number.isFinite(osfSec) || osfSec <= 0) return null;
  const shotPts = _shotPointsFromRow(row);
  if (shotPts === null || shotPts === undefined) return null;
  const biegPts = row.totalSec;
  const osfPts  = 450 - 2 * osfSec;
  const strzPts = shotPts * 2;
  return Math.round(biegPts - osfPts - strzPts);
}

function _buildPatrolRow(a, state) {
  const t = (state.times && state.times[a.id]) || {};
  const total = t.total;
  const osf   = t.osf;
  const shotPoints = t.shotPoints;
  const hits = t.hits;
  const tens = t.tens;
  const dsq = !!(state.disq && state.disq[a.id]);
  const totalIsMarker = isTimeMarker(total);
  const totalSec = (dsq || totalIsMarker || !total) ? Infinity : parseTime(total);
  let tier = 3;
  let marker = '';
  if (dsq) tier = 3;
  else if (totalSec < Infinity) tier = 0;
  else if (total === 'DNF') { tier = 1; marker = 'DNF'; }
  else if (total === 'DNS') { tier = 2; marker = 'DNS'; }
  const hasAny = !!(total || osf || hits !== undefined || shotPoints !== undefined || dsq);
  return { ath: a, total, osf, hits, shotPoints, tens, dsq, totalSec, tier, marker, hasAny };
}

function _formatTotalDisplay(row) {
  if (row.dsq) return 'DSQ';
  if (row.marker) return row.marker;
  if (!row.total) return '—';
  return row.total;
}

function _sortPatrolRows(rows) {
  rows.forEach(r => { r._pts = calcPatrolPoints(r); });
  rows.sort((a, b) => {
    if (a.tier !== b.tier) return a.tier - b.tier;
    if (a.tier === 0) {
      if (a._pts === null && b._pts !== null) return 1;
      if (b._pts === null && a._pts !== null) return -1;
      if (a._pts !== null && b._pts !== null && a._pts !== b._pts) return a._pts - b._pts;
      const aShot = _shotPointsFromRow(a) || 0;
      const bShot = _shotPointsFromRow(b) || 0;
      if (aShot !== bShot) return bShot - aShot;
      const aOsf = parseTime(a.osf || '');
      const bOsf = parseTime(b.osf || '');
      if (Number.isFinite(aOsf) && Number.isFinite(bOsf) && aOsf !== bOsf) return aOsf - bOsf;
      const aTens = parseInt(a.tens) || 0;
      const bTens = parseInt(b.tens) || 0;
      if (aTens !== bTens) return bTens - aTens;
    }
    return (a.ath.name || '').localeCompare(b.ath.name || '');
  });
}

// ═══════════════════════════════════════════════════════════════
// RENDER PATROL — różne widoki
// ═══════════════════════════════════════════════════════════════

function _medal(rank) {
  return ''; // medale jako kolorowy numer (top-1/2/3), bez emoji

function renderPatrolIndividual(gender, over36Only) {
  const rows = _state.athletes.filter(a => a.gender === gender && (!over36Only || a.over36)).map(a => _buildPatrolRow(a, _state)).filter(r => r.hasAny);
  if (!rows.length) {
    return '<div class="empty"><div class="empty-icon">' + ic('clipboard') + '</div>Brak wpisanych wyników</div>';
  }
  _sortPatrolRows(rows);

  let visibleRank = 0;
  return rows.map((r, i) => {
    const isClassified = r.tier === 0 && r._pts !== null;
    if (isClassified) visibleRank++;
    const rankNum = isClassified ? visibleRank : '—';
    const topCls = (isClassified && visibleRank <= 3) ? ' top-' + visibleRank : '';
    const dsqCls = r.dsq ? ' dsq' : '';
    const medal = _medal(visibleRank);
    const name = (r.ath.rank ? r.ath.rank + ' ' : '') + (r.ath.name || 'Bez nazwy');
    const team = r.ath.team || '';
    const totalDisp = _formatTotalDisplay(r);
    const osfDisp = r.osf || '—';
    const shotDisp = (r.shotPoints !== undefined && r.shotPoints !== null && r.shotPoints !== '') ? (r.shotPoints + ' pkt') : '—';
    const ptsDisp = r._pts !== null ? r._pts.toString() : (r.dsq ? 'DSQ' : '—');
    const scoreCls = (r._pts === null) ? ' dnf' : '';

    return '<div class="rank-card' + topCls + dsqCls + '" data-aid="' + esc(String(r.ath.id)) + '">' +
      '<div class="rank-num">' + (medal || rankNum) + '</div>' +

        '<div class="rank-details">' +
          '<span><span class="rank-detail-lbl">' + ic('run') + '</span><span class="rank-detail-val">' + esc(totalDisp) + '</span></span>' +
          '<span><span class="rank-detail-lbl">' + ic('stopwatch') + ' OSF</span><span class="rank-detail-val">' + esc(osfDisp) + '</span></span>' +
          '<span><span class="rank-detail-lbl">' + ic('target') + '</span><span class="rank-detail-val">' + esc(shotDisp) + '</span></span>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="rank-score' + scoreCls + '">' + esc(ptsDisp) + '</div>' +
        '<div class="rank-score-lbl">pkt</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderPatrolTeam() {
  // Klasyfikacja drużynowa: suma 3 najlepszych M z drużyny
  const menRows = _state.athletes.filter(a => a.gender === 'M').map(a => _buildPatrolRow(a, _state));

  const byTeam = {};
  menRows.forEach(r => {
    const team = r.ath.team;
    if (!team) return;
    if (!byTeam[team]) byTeam[team] = [];
    byTeam[team].push(r);
  });

  const teamRows = [];
  for (const team in byTeam) {
    const all = byTeam[team];
    _sortPatrolRows(all);
    const classified = all.filter(r => r._pts !== null);
    if (classified.length < 3) continue;
    const top3 = classified.slice(0, 3);
    const sum = top3.reduce((s, r) => s + r._pts, 0);
    teamRows.push({ team, sum, top3, classified: classified.length });
  }

  if (teamRows.length === 0) {
    return '<div class="empty"><div class="empty-icon">' + ic('shield') + '</div>Brak drużyn z 3 sklasyfikowanymi M</div>';
  }

  // Sortowanie jak w panelu (calcTeamScore/renderTeamView): najpierw liczba sklasyfikowanych M (malejaco), potem suma rosnaco
  teamRows.sort((a, b) => a.classified !== b.classified ? b.classified - a.classified : a.sum - b.sum);

  return teamRows.map((r, i) => {
    const rank = i + 1;
    const topCls = rank <= 3 ? ' top-' + rank : '';
    const medal = _medal(rank);
    const names = r.top3.map(t => esc(t.ath.name || '?')).join(', ');
    return '<div class="rank-card' + topCls + '">' +
      '<div class="rank-num">' + (medal || rank) + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name rank-team-link" data-team="' + esc(r.team) + '">' + esc(r.team) + '</div>' +
        '<div class="rank-details" style="margin-top:6px;">' +
          '<span><span class="rank-detail-lbl">Top 3:</span><span class="rank-detail-val">' + names + '</span></span>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="rank-score">' + r.sum + '</div>' +
        '<div class="rank-score-lbl">pkt</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function _parseTeamSec(str) {
  if (!str) return NaN;
  if (typeof str === 'number') return str;
  const s = String(str).trim();
  const m = s.match(/^(\d+):(\d{1,2}(?:\.\d+)?)$/);
  if (m) return parseInt(m[1]) * 60 + parseFloat(m[2]);
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n;
}

function calcTeamRunPoints(tr) {
  if (!tr) return null;
  if (tr.dsq) return null;
  const biegSec = parseFloat(tr.biegSec);
  if (!Number.isFinite(biegSec) || biegSec <= 0) return null;
  const osfSec = parseFloat(tr.osfSec);
  if (!Number.isFinite(osfSec) || osfSec <= 0) return null;
  const shotPoints = parseInt(tr.shotPoints);
  if (!Number.isFinite(shotPoints)) return null;
  const eliminated = parseInt(tr.eliminated) || 0;
  const osfPts = 480 - 2 * osfSec;
  const strzPts = shotPoints * 2;
  const elimPts = eliminated * 100;
  return Math.round(biegSec - osfPts - strzPts + elimPts);
}

function _formatTeamSec(sec) {
  if (!Number.isFinite(sec)) return '—';
  const m = Math.floor(sec / 60);
  const s = sec - m * 60;
  return m + ':' + (s < 10 ? '0' : '') + s.toFixed(2);
}

function renderPatrolTeamRun() {
  const teamRun = _state.teamRun || {};
  const teamNames = Object.keys(teamRun);
  if (teamNames.length === 0) {
    return '<div class="empty"><div class="empty-icon">' + ic('run') + '</div>Brak wpisanych biegów drużynowych</div>';
  }

  const rows = teamNames.map(name => {
    const tr = teamRun[name];
    const pts = calcTeamRunPoints(tr);
    return { name, tr, pts, dsq: !!tr.dsq };
  });

  rows.sort((a, b) => {
    // Sklasyfikowani pierwsi
    if (a.pts === null && b.pts === null) return 0;
    if (a.pts === null) return 1;
    if (b.pts === null) return -1;
    return a.pts - b.pts;
  });

  let visibleRank = 0;
  return rows.map(r => {
    const isClassified = r.pts !== null;
    if (isClassified) visibleRank++;
    const rankNum = isClassified ? visibleRank : '—';
    const topCls = (isClassified && visibleRank <= 3) ? ' top-' + visibleRank : '';
    const dsqCls = r.dsq ? ' dsq' : '';
    const medal = _medal(visibleRank);
    const biegDisp = _formatTeamSec(parseFloat(r.tr.biegSec));
    const osfDisp = _formatTeamSec(parseFloat(r.tr.osfSec));
    const shotDisp = (r.tr.shotPoints !== undefined && r.tr.shotPoints !== null && r.tr.shotPoints !== '') ? (r.tr.shotPoints + ' pkt') : '—';
    const elim = parseInt(r.tr.eliminated) || 0;
    const ptsDisp = r.pts !== null ? r.pts.toString() : (r.dsq ? 'DSQ' : '—');
    const scoreCls = (r.pts === null) ? ' dnf' : '';

    return '<div class="rank-card' + topCls + dsqCls + '">' +
      '<div class="rank-num">' + (medal || rankNum) + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name rank-team-link" data-team="' + esc(r.name) + '">' + esc(r.name) + '</div>' +
        '<div class="rank-details">' +
          '<span><span class="rank-detail-lbl">' + ic('run') + '</span><span class="rank-detail-val">' + biegDisp + '</span></span>' +
          '<span><span class="rank-detail-lbl">' + ic('stopwatch') + ' OSF</span><span class="rank-detail-val">' + osfDisp + '</span></span>' +
          '<span><span class="rank-detail-lbl">' + ic('target') + '</span><span class="rank-detail-val">' + shotDisp + '</span></span>' +
          (elim > 0 ? '<span style="color:var(--red);">' + ic('alert') + ' ' + elim + ' eliminacji</span>' : '') +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="rank-score' + scoreCls + '">' + esc(ptsDisp) + '</div>' +
        '<div class="rank-score-lbl">pkt</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderPatrolOverall() {
  // Klasyfikacja generalna: indywid (top 3 M z każdej drużyny) + bieg drużynowy
  // Drużyna bez biegu drużynowego: +1200 pkt karnych
  const menRows = _state.athletes.filter(a => a.gender === 'M').map(a => _buildPatrolRow(a, _state));
  const byTeam = {};
  menRows.forEach(r => {
    const team = r.ath.team;
    if (!team) return;
    if (!byTeam[team]) byTeam[team] = [];
    byTeam[team].push(r);
  });

  const teamRun = _state.teamRun || {};

  const overall = [];
  for (const team in byTeam) {
    const all = byTeam[team];
    _sortPatrolRows(all);
    const classified = all.filter(r => r._pts !== null);
    if (classified.length < 3) continue;
    const indSum = classified.slice(0, 3).reduce((s, r) => s + r._pts, 0);
    const tr = teamRun[team];
    const trPts = tr ? calcTeamRunPoints(tr) : null;
    const trPenalty = (trPts === null) ? 1200 : 0;
    const total = indSum + (trPts !== null ? trPts : 0) + trPenalty;
    overall.push({ team, indSum, trPts, trPenalty, total });
  }

  if (overall.length === 0) {
    return '<div class="empty"><div class="empty-icon">' + ic('trophy') + '</div>Brak drużyn z kompletem wyników</div>';
  }

  overall.sort((a, b) => a.total - b.total);

  return overall.map((r, i) => {
    const rank = i + 1;
    const topCls = rank <= 3 ? ' top-' + rank : '';
    const medal = _medal(rank);
    const trDisp = r.trPts !== null ? r.trPts + ' pkt' : ('brak (+' + r.trPenalty + ')');
    return '<div class="rank-card' + topCls + '">' +
      '<div class="rank-num">' + (medal || rank) + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name rank-team-link" data-team="' + esc(r.team) + '">' + esc(r.team) + '</div>' +
        '<div class="rank-details">' +
          '<span><span class="rank-detail-lbl">Indyw:</span><span class="rank-detail-val">' + r.indSum + '</span></span>' +
          '<span><span class="rank-detail-lbl">Bieg dr.:</span><span class="rank-detail-val">' + esc(trDisp) + '</span></span>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="rank-score">' + r.total + '</div>' +
        '<div class="rank-score-lbl">pkt</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// OSF — punktacja
// ═══════════════════════════════════════════════════════════════

function _osfParseTime(t) {
  if (!t || typeof t !== 'string') return Infinity;
  const s = t.trim();
  if (!s) return Infinity;
  if (/^(DNF|DNS|NKL)$/i.test(s)) return Infinity;
  // Liberalny parser: dwukropek lub kropka, przecinek
  const cleaned = s.replace(/,/g, '.').replace(/-/g, '.').replace(/[^\d.:]/g, '');
  if (!cleaned) return Infinity;
  if (cleaned.includes(':')) {
    const parts = cleaned.split(':');
    if (parts.length === 2) {
      const min = parseInt(parts[0]) || 0;
      const sec = parseFloat(parts[1]) || 0;
      return min * 60 + sec;
    }
  }
  const n = parseFloat(cleaned);
  return isNaN(n) ? Infinity : n;
}

function _osfGetTime(state, id, series) {
  return (state.times && state.times[id] && state.times[id][series]) || '';
}

function _osfIsDisq(state, id, series) {
  return !!(state.disq && state.disq[id] && state.disq[id][series]);
}

function _osfBestTime(state, id) {
  const s1 = _osfGetTime(state, id, 's1');
  const s2 = _osfGetTime(state, id, 's2');
  const isMarker = v => v === 'DNF' || v === 'DNS' || v === 'NKL';
  const s1ok = s1 && !_osfIsDisq(state, id, 's1') && !isMarker(s1);
  const s2ok = s2 && !_osfIsDisq(state, id, 's2') && !isMarker(s2);
  if (!s1ok && !s2ok) return null;
  if (!s1ok) return s2;
  if (!s2ok) return s1;
  return _osfParseTime(s1) <= _osfParseTime(s2) ? s1 : s2;
}

function _osfSumTime(state, id) {
  const s1 = _osfGetTime(state, id, 's1');
  const s2 = _osfGetTime(state, id, 's2');
  const isMarker = v => v === 'DNF' || v === 'DNS' || v === 'NKL';
  const s1ok = s1 && !_osfIsDisq(state, id, 's1') && !isMarker(s1);
  const s2ok = s2 && !_osfIsDisq(state, id, 's2') && !isMarker(s2);
  if (!s1ok && !s2ok) return Infinity;
  if (!s1ok) return _osfParseTime(s2);
  if (!s2ok) return _osfParseTime(s1);
  return _osfParseTime(s1) + _osfParseTime(s2);
}

function _wjGetBestValidTime(arr, disqArr, dnfArr) {
  if (!arr || !arr.length) return null;
  const valid = arr.filter((t, i) => {
    if (!t || isNaN(t) || t <= 0) return false;
    if (disqArr && disqArr[i]) return false;
    if (dnfArr && dnfArr[i]) return false;
    return true;
  });
  if (!valid.length) return null;
  return Math.min(...valid);
}

function _wjGetPoints(state, cat, event, timeSec) {
  if (timeSec === null || timeSec === undefined || isNaN(timeSec) || timeSec <= 0) return 0;
  let table = state.scoreTablesByCat?.[cat]?.[event];
  if (!table || !table.length) table = state.scoreTables?.[cat[0]]?.[event];
  if (!table || !table.length) return 0;
  const sorted = [...table].sort((a, b) => a[0] - b[0]);
  if (timeSec <= sorted[0][0]) return sorted[0][1];
  if (timeSec >= sorted[sorted.length - 1][0]) return Math.max(0, sorted[sorted.length - 1][1]);
  for (let i = 0; i < sorted.length - 1; i++) {
    if (timeSec >= sorted[i][0] && timeSec <= sorted[i + 1][0]) {
      const ratio = (timeSec - sorted[i][0]) / (sorted[i + 1][0] - sorted[i][0]);
      return sorted[i][1] + ratio * (sorted[i + 1][1] - sorted[i][1]);
    }
  }
  return 0;
}

function _wjGetAthletePoints(state, athleteId) {
  const a = state.athletes.find(x => x.id == athleteId);
  if (!a) return { k1: 0, k2: 0, k3: 0, k4: 0, total: 0 };
  const r    = state.results[athleteId] || {};
  const disq = state.disq[athleteId]    || {};
  const dnf  = state.dnf[athleteId]     || {};
  const cat  = a.cat;
  const k1t = _wjGetBestValidTime(r.k1, disq.k1, dnf.k1);
  const k2t = _wjGetBestValidTime(r.k2, disq.k2, dnf.k2);
  const k3t1 = _wjGetBestValidTime(r.k3, disq.k3, dnf.k3);
  const k3t2 = _wjGetBestValidTime(r.k3s2, disq.k3s2, dnf.k3s2);
  const k3t = k3t1 && k3t2 ? Math.min(k3t1, k3t2) : (k3t1 || k3t2);
  const k4t = _wjGetBestValidTime(r.k4, disq.k4, dnf.k4);
  const k1p = _wjGetPoints(state, cat, 'k1', k1t);
  const k2p = _wjGetPoints(state, cat, 'k2', k2t);
  const k3p = _wjGetPoints(state, cat, 'k3', k3t);
  const k4p = _wjGetPoints(state, cat, 'k4', k4t);
  return { k1: k1p, k2: k2p, k3: k3p, k4: k4p, total: k1p + k2p + k3p + k4p };
}

function renderWielobojIndividual(cat) {

// Wynik drużyny wieloboju — odtworzenie getTeamScore() z panelu:
// tryb domyslny = top teamLimitM M + top teamLimitK K (limity z setup, fallback bez limitu);
// tryb teamLimitOpen = N najlepszych lacznie (teamLimitOpenN). Tylko !pk.
function _wjTeamScore(team) {
  const setup = _state.setup || {};
  const all = (_state.athletes || []).filter(a => a.teamId == team.id && !a.pk).map(a => ({ a, pts: _wjGetAthletePoints(_state, a.id).total }));
  if (setup.teamLimitOpen) {
    const limitN = (setup.teamLimitOpenN != null) ? setup.teamLimitOpenN : Infinity;
    const used = [...all].sort((x, y) => y.pts - x.pts).slice(0, limitN);
    return { team, open: true, total: used.reduce((s, x) => s + x.pts, 0), mUsed: used.filter(x => x.a.gender === 'M').length, kUsed: used.filter(x => x.a.gender === 'K').length };
  }
  const limitM = (setup.teamLimitM != null) ? setup.teamLimitM : Infinity;
  const limitK = (setup.teamLimitK != null) ? setup.teamLimitK : Infinity;
  const menUsed = all.filter(x => x.a.gender === 'M').sort((a, b) => b.pts - a.pts).slice(0, limitM);
  const womenUsed = all.filter(x => x.a.gender === 'K').sort((a, b) => b.pts - a.pts).slice(0, limitK);
  return { team, open: false, sumMen: menUsed.reduce((s, x) => s + x.pts, 0), sumWomen: womenUsed.reduce((s, x) => s + x.pts, 0), mUsed: menUsed.length, kUsed: womenUsed.length, total: [...menUsed, ...womenUsed].reduce((s, x) => s + x.pts, 0) };
}

  if (!_state.athletes || _state.athletes.length === 0) {

  const rows = (_state.teams || []).map(t => _wjTeamScore(t)).filter(r => r.total > 0).sort((a, b) => b.total - a.total);

function _initDelegates() {
  if (_delegatesInit) return;
  _delegatesInit = true;
  const main = document.getElementById('main');
  if (main) main.addEventListener('click', e => {
    const tl = e.target.closest('.rank-team-link');
    if (tl && tl.dataset.team) { showTeamDetail(tl.dataset.team); return; }
    const chip = e.target.closest('.td-chip-link');
    if (chip && chip.dataset.goto) { _gotoRanking(chip.dataset.goto, { team: chip.dataset.team, aid: chip.dataset.aid }); return; }
    const nameEl = e.target.closest('.rank-name');
    if (nameEl) {
      const card = nameEl.closest('.rank-card[data-aid]');
      if (card && card.dataset.aid) { showAthleteDetail(card.dataset.aid); return; }
    }
  });
  const sr = document.getElementById('search-results');
  if (sr) sr.addEventListener('click', e => {
    const btn = e.target.closest('.search-result');
    if (!btn) return;
    if (btn.dataset.team) _searchPickTeam(btn.dataset.team);
    else _searchPickResult(btn.dataset.cat, btn.dataset.aid);

  window.addEventListener('scroll', () => {
    const b = document.getElementById('to-top');

// ── PATROL ──
function _patrolGenderStandings(gender) {
  const rows = _state.athletes.filter(a => a.gender === gender).map(a => _buildPatrolRow(a, _state)).filter(r => r.hasAny);
  _sortPatrolRows(rows);
  let vr = 0;
  rows.forEach(r => { if (r.tier === 0 && r._pts !== null) { vr++; r._place = vr; } else r._place = null; });
  return rows;
}
function _patrolTeamStandings() {
  const byTeam = {};
  _state.athletes.filter(a => a.gender === 'M').map(a => _buildPatrolRow(a, _state)).forEach(r => {
    if (!r.ath.team) return; (byTeam[r.ath.team] = byTeam[r.ath.team] || []).push(r);
  });
  const arr = [];
  for (const t in byTeam) { const all = byTeam[t]; _sortPatrolRows(all); const cl = all.filter(r => r._pts !== null); if (cl.length < 3) continue; arr.push({ team: t, sum: cl.slice(0, 3).reduce((s, r) => s + r._pts, 0) }); }
  arr.sort((a, b) => a.sum - b.sum); arr.forEach((r, i) => r.rank = i + 1); return arr;
}
function _patrolTeamRunStandings() {
  const teamRun = _state.teamRun || {};
  const arr = Object.keys(teamRun).map(name => ({ name, tr: teamRun[name], pts: calcTeamRunPoints(teamRun[name]) }));
  arr.sort((a, b) => { if (a.pts === null && b.pts === null) return 0; if (a.pts === null) return 1; if (b.pts === null) return -1; return a.pts - b.pts; });
  let vr = 0; arr.forEach(r => { if (r.pts !== null) { vr++; r.rank = vr; } else r.rank = null; });
  return arr;
}

  const rows = _state.athletes.filter(a => a.gender === gender && !a.pk).map(a => {

  const bestEff = t => { const s1 = getT(t,'s1'), s2 = getT(t,'s2'); const o1 = s1 && !isDsq(t,'s1') && !isMarker(s1); const o2 = s2 && !isDsq(t,'s2') && !isMarker(s2); if (!o1 && !o2) return ''; if (!o1) return s2; if (!o2) return s1; return _osfParseTime(s1) <= _osfParseTime(s2) ? s1 : s2; };

    const best = bestEff(t);

// ── OSF: Generalna (getTeamClassification z panelu) = pkt indywidualne M [+K jesli kScores] + pkt bieg druzynowy ──
function _osfIndPoints(rank, N) { return rank === 1 ? N + 1 : Math.max(0, N - rank + 1); }
function _osfBestSec(id) { const b = _osfBestTime(_state, id); return b ? _osfParseTime(b) : Infinity; }
function _osfRankedMen() {
  const men = (_state.athletes || []).filter(a => a.gender === 'M' && !a.pk);
  const N = men.length;
  const ranked = men.map(a => ({ a, bestSec: _osfBestSec(a.id), sumSec: _osfSumTime(_state, a.id) }))
    .sort((x, y) => x.bestSec !== y.bestSec ? x.bestSec - y.bestSec : x.sumSec - y.sumSec);
  const limit = (_state.setup && _state.setup.maxScoringM) ? _state.setup.maxScoringM : 0;
  const scoringIds = new Map();
  if (limit > 0) {
    [...new Set(men.map(a => a.team).filter(Boolean))].forEach(team => {
      const ids = men.filter(a => a.team === team).map(a => ({ id: a.id, sec: _osfBestSec(a.id) })).filter(x => Number.isFinite(x.sec)).sort((p, q) => p.sec - q.sec).slice(0, limit).map(x => x.id);
      scoringIds.set(team, new Set(ids));
    });
  }
  let rank = 1;
  return ranked.map(r => {
    const noBest = !Number.isFinite(r.bestSec);
    const scores = (limit === 0 || !r.a.team) ? true : (scoringIds.has(r.a.team) ? scoringIds.get(r.a.team).has(r.a.id) : true);
    const pts = (noBest || !scores) ? 0 : _osfIndPoints(rank, N);
    if (!noBest) rank++;
    return { a: r.a, rank: noBest ? null : rank - 1, pts };
  });
}
function _osfWomenTeamPts() {
  if (!(_state.setup && _state.setup.kScores)) return {};
  const nM = (_state.athletes || []).filter(a => a.gender === 'M' && !a.pk).length;
  const women = (_state.athletes || []).filter(a => a.gender === 'K' && !a.pk)
    .map(a => ({ a, bestSec: _osfBestSec(a.id), sumSec: _osfSumTime(_state, a.id) }))
    .sort((x, y) => x.bestSec !== y.bestSec ? x.bestSec - y.bestSec : x.sumSec - y.sumSec);
  const limitK = (_state.setup.maxScoringK) ? _state.setup.maxScoringK : 0;
  let scoringW = null;
  if (limitK > 0) {
    scoringW = new Map();
    [...new Set(women.map(w => w.a.team).filter(Boolean))].forEach(team => {
      const ids = women.filter(w => w.a.team === team && Number.isFinite(w.bestSec)).slice(0, limitK).map(w => w.a.id);
      scoringW.set(team, new Set(ids));
    });
  }
  const teamPts = {};
  let rank = 1;
  women.forEach(w => {
    if (!Number.isFinite(w.bestSec)) return;
    const pts = _osfIndPoints(rank, nM); rank++;
    const t = w.a.team; if (!t) return;
    const counts = !scoringW || (scoringW.has(t) ? scoringW.get(t).has(w.a.id) : true);
    if (counts) teamPts[t] = (teamPts[t] || 0) + pts;
  });
  return teamPts;
}
// Punkty indywidualne (wklad do generalnej) per zawodnik: { id: pts }. M zawsze, K tylko gdy kScores.
function _osfIndPtsByAth() {
  const map = {};
  _osfRankedMen().forEach(r => { map[r.a.id] = r.pts; });
  if (_state.setup && _state.setup.kScores) {
    const nM = (_state.athletes || []).filter(a => a.gender === 'M' && !a.pk).length;
    const women = (_state.athletes || []).filter(a => a.gender === 'K' && !a.pk)
      .map(a => ({ a, bestSec: _osfBestSec(a.id), sumSec: _osfSumTime(_state, a.id) }))
      .sort((x, y) => x.bestSec !== y.bestSec ? x.bestSec - y.bestSec : x.sumSec - y.sumSec);
    const limitK = (_state.setup.maxScoringK) ? _state.setup.maxScoringK : 0;
    let scoringW = null;
    if (limitK > 0) {
      scoringW = new Map();
      [...new Set(women.map(w => w.a.team).filter(Boolean))].forEach(team => {
        const ids = women.filter(w => w.a.team === team && Number.isFinite(w.bestSec)).slice(0, limitK).map(w => w.a.id);
        scoringW.set(team, new Set(ids));
      });
    }
    let rank = 1;
    women.forEach(w => {
      if (!Number.isFinite(w.bestSec)) { map[w.a.id] = 0; return; }
      const pts = _osfIndPoints(rank, nM); rank++;
      const t = w.a.team;
      const counts = !scoringW || (scoringW.has(t) ? scoringW.get(t).has(w.a.id) : true);
      map[w.a.id] = (t && counts) ? pts : 0;
    });
  }
  return map;
}
function _osfGeneralna() {
  const indPts = {};
  _osfRankedMen().forEach(r => { const t = r.a.team; if (t) indPts[t] = (indPts[t] || 0) + r.pts; });
  const wPts = _osfWomenTeamPts();
  for (const t in wPts) indPts[t] = (indPts[t] || 0) + wPts[t];
  const teamPts = {};
  _osfTeamRun().forEach(r => { teamPts[r.team] = r.pts; });
  const teamSet = new Set();
  (_state.athletes || []).forEach(a => { if (a.team) teamSet.add(a.team); });
  Object.keys(teamPts).forEach(t => teamSet.add(t));
  return [...teamSet].map(team => ({ team, indPts: indPts[team] || 0, teamPts: teamPts[team] || 0, total: (indPts[team] || 0) + (teamPts[team] || 0) })).sort((a, b) => b.total - a.total);
}
function renderOsfGeneralna() {
  if (!_state.athletes || !_state.athletes.length) return '<div class="empty"><div class="empty-icon">' + ic('trophy') + '</div>Brak zawodników</div>';
  const rows = _osfGeneralna().filter(r => r.total > 0);
  if (!rows.length) return '<div class="empty"><div class="empty-icon">' + ic('trophy') + '</div>Brak wyników</div>';
  return rows.map((r, i) => {
    const rank = i + 1; const topCls = rank <= 3 ? ' top-' + rank : '';
    return '<div class="rank-card' + topCls + '">' +
      '<div class="rank-num">' + rank + '</div>' +
      '<div class="rank-info"><div class="rank-name rank-team-link" data-team="' + esc(r.team) + '">' + esc(r.team) + '</div>' +
        '<div class="rank-details">' +
          '<span><span class="rank-detail-lbl">Indyw:</span><span class="rank-detail-val">' + Math.round(r.indPts) + '</span></span>' +
          '<span><span class="rank-detail-lbl">Bieg dr.:</span><span class="rank-detail-val">' + Math.round(r.teamPts) + '</span></span>' +
        '</div></div>' +
      '<div><div class="rank-score">' + Math.round(r.total) + '</div><div class="rank-score-lbl">pkt</div></div>' +
    '</div>';
  }).join('');
}

const OSF_TABS = [
  { id: 'overall', label: 'Generalna', icon: ic('trophy'), cls: 'cat-overall', sub: 'Indywidualny M + bieg drużynowy', render: () => renderOsfGeneralna() },
  { id: 'm',    label: 'Mężczyźni', icon: ic('male'), cls: 'cat-m',    sub: 'Najlepszy czas (S1 lub S2)', render: () => renderOsfIndividual('M') },
  { id: 'k',    label: 'Kobiety',   icon: ic('female'), cls: 'cat-k',    sub: 'Najlepszy czas (S1 lub S2)', render: () => renderOsfIndividual('K') },
  { id: 'team', label: 'Bieg drużynowy', icon: ic('run'), cls: 'cat-team', sub: 'Osobny przejazd drużyny (S1/S2)', render: () => renderOsfTeam() },
];

const WIELOBOJ_TABS = [
  { id: 'm35', label: 'M35', icon: ic('male'),   cls: 'cat-m',    sub: 'Mężczyźni do 35 lat', render: () => renderWielobojIndividual('M35') },
  { id: 'm36', label: 'M36', icon: ic('male'),   cls: 'cat-m',    sub: 'Mężczyźni 36+',       render: () => renderWielobojIndividual('M36') },
  { id: 'k35', label: 'K35', icon: ic('female'), cls: 'cat-k',    sub: 'Kobiety do 35 lat',   render: () => renderWielobojIndividual('K35') },
  { id: 'k36', label: 'K36', icon: ic('female'), cls: 'cat-k',    sub: 'Kobiety 36+',         render: () => renderWielobojIndividual('K36') },
  { id: 'team', label: 'Drużynowa', icon: ic('shield'), cls: 'cat-overall', sub: 'Klasyfikacja zespołowa', render: () => renderWielobojTeam() },
];

function _getTabsForType() {
  if (_competitionType === 'patrol') {
    const has = g => (_state.athletes || []).some(a => a.gender === g && a.over36);
    if (!has('M') && !has('K')) return PATROL_TABS;
    const tabs = PATROL_TABS.slice();
    const extra = [];
    if (has('M')) extra.push({ id: 'm36', label: 'M36', icon: ic('male'), cls: 'cat-m', sub: 'Klasyfikacja wiekowa 36+', render: () => renderPatrolIndividual('M', true) });
    if (has('K')) extra.push({ id: 'k36', label: 'K36', icon: ic('female'), cls: 'cat-k', sub: 'Klasyfikacja wiekowa 36+', render: () => renderPatrolIndividual('K', true) });
    const idx = tabs.findIndex(t => t.id === 'k');
    tabs.splice(idx >= 0 ? idx + 1 : tabs.length, 0, ...extra);
    return tabs;
  }
  if (_competitionType === 'osf')      return OSF_TABS; // zakladka Kobiet zawsze widoczna (medale indywidualne); kScores wplywa tylko na Generalna
  if (_competitionType === 'wielobój') return WIELOBOJ_TABS;
  return [];
}

function _getDefaultTab() {
  if (_competitionType === 'patrol')   return 'overall';
  if (_competitionType === 'osf')      return 'overall';
  if (_competitionType === 'wielobój') return 'm35';
  return null;
}

// _activeTab: null = menu kafelkowe (lista kategorii), inaczej id wybranej kategorii.
// Nie zapisywany w localStorage — kazda nowa wizyta zaczyna od menu.
function showTileMenu() {
  _activeTab = null;
  _teamDetail = null;
  _athleteDetailId = null;
  _navStack = [];
  renderTileMenu();
}

function setTab(id) {
  _pushHistory();
  _activeTab = id;
  _teamDetail = null;
  _athleteDetailId = null;
  renderDetail();
}

function renderActiveView() {
  if (_activeTab) renderDetail();
  else renderTileMenu();
}

function renderTileMenu() {
  _saveView();
  _toggleBackBtn(false);
  const tabs = _getTabsForType();
  if (!tabs.length) {
    document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">' + ic('alert') + '</div>Nieznany typ zawodów</div>';
    return;
  }
  const html = [_heroHTML(), '<div class="tile-grid">'];
  for (const t of tabs) {
    html.push(
      '<button class="cat-tile ' + t.cls + '" onclick="setTab(\'' + t.id + '\')">' +
        '<div class="cat-icon">' + t.icon + '</div>' +
        '<div class="cat-label">' + esc(t.label) + '</div>' +
        '<div class="cat-sub">' + esc(t.sub || '') + '</div>' +
      '</button>'
    );
  }
  html.push('</div>');
  document.getElementById('main').innerHTML = html.join('');
}

function renderDetail() {
  _saveView();
  _toggleBackBtn(true);
  if (_activeTab === '__team') {
    document.getElementById('main').innerHTML = _renderTeamDetailWrap();
    return;
  }
  if (_activeTab === '__athlete') {
    document.getElementById('main').innerHTML = _renderAthleteDetailWrap();
    return;
  }
  const tabs = _getTabsForType();
  const tab = tabs.find(t => t.id === _activeTab) || tabs[0];
  if (!tab) {
    showTileMenu();
    return;
  }
  const titleColorCls = (tab.cls || '').replace('cat-', 'cat-') + '-color';
  const html =
    '<div class="detail-wrap">' +
    _homeBtn() +
    '<div class="detail-title ' + titleColorCls + '"><span class="icon">' + tab.icon + '</span><span>' + esc(tab.label) + '</span></div>' +
    (tab.sub ? '<div class="detail-subtitle">' + esc(tab.sub) + '</div>' : '') +
    tab.render() +
    '</div>';
  document.getElementById('main').innerHTML = html;
  if (_pendingScroll) {
    const sel = _pendingScroll; _pendingScroll = null;
    requestAnimationFrame(() => _scrollToSel(sel));
  }
}

// ═══════════════════════════════════════════════════════════════
// MAIN BOOT — z ?slot=
// ═══════════════════════════════════════════════════════════════

// Akcent aplikacji wg konkurencji (kanon paneli): patrol zielony, OSF pomarancz, wieloboj zloto.
// Zmienia TYLKO token --accent — uklad i reszta kolorow (M/K, medale, semantyka) bez zmian.
function _applyAccent(type) {
  const c = type === 'patrol' ? '#4caf82' : (type === 'osf' ? '#e8944d' : '#e8d44d');
  document.documentElement.style.setProperty('--accent', c);
}

async function loadAndRender() {
  try {
    const slotData = await loadSlotMeta(URL_SLOT);
    if (!slotData) {
      setLive('err');
      document.getElementById('main').innerHTML =
        '<div class="empty" style="padding:80px 20px;"><div class="empty-icon">' + ic('lock') + '</div><div style="margin-bottom:8px;">Zawody niedostępne</div><div style="font-size:13px;color:var(--text3);text-transform:none;font-family:var(--font-b);letter-spacing:0;font-weight:normal;margin-top:8px;">Publikacja wyników nie jest włączona, lub link jest nieprawidłowy.</div></div>';
      return;
    }
    _slot = slotData.row;
    _slotMeta = slotData.meta;
    _competitionType = _resolveType(_slotMeta.type);
    _applyAccent(_competitionType);

    // Header: tylko typ zawodow (subtelnie), nazwa idzie do hero
    const typeLabel = _competitionType === 'wielobój' ? 'Wielobój' : (_competitionType === 'osf' ? 'OSF' : 'Patrol');
    setHeaderTypeSub(typeLabel);
    // Compact meta dla wask. ekranow (header) — nazwa zawodow
    setMeta(_slotMeta.name || '');

    // Załaduj stan zawodów (per typ)
    let loader = null;
    if (_competitionType === 'patrol')   loader = loadPatrolState;
    else if (_competitionType === 'osf') loader = loadOsfState;
    else if (_competitionType === 'wielobój') loader = loadWielobojState;

    if (!loader) {
      setLive('err');
      document.getElementById('main').innerHTML =
        '<div class="empty"><div class="empty-icon">' + ic('alert') + '</div>Nieznany typ zawodów: ' + esc(_slotMeta.type || '?') + '</div>';
      return;
    }

    _state = await loader(URL_SLOT);
    if (!_state) {
      setLive('ok');
      document.getElementById('main').innerHTML =
        '<div class="empty"><div class="empty-icon">' + ic('clipboard') + '</div>Brak danych konkurencji</div>';
      return;
    }

    // Pierwsze wejscie -> ZAWSZE menu kafelkowe.
    // Po wybraniu kategorii _activeTab = id, kolejne auto-refreshe nie zmieniaja widoku.
    if (_activeTab === undefined) {
      const _v = _loadView();
      if (_v) { _activeTab = _v.tab; _teamDetail = _v.team || null; _athleteDetailId = _v.ath || null; }
      else { _activeTab = null; }
    }
    renderActiveView();

    setLive('ok');
  } catch (e) {
    console.error('[tablica]', e);
    setLive('err');
    document.getElementById('main').innerHTML =
      '<div class="empty"><div class="empty-icon">' + ic('alert') + '</div>Błąd: ' + esc(e.message) + '</div>';
  }
}

// Auto-refresh
function startAutoRefresh() {
  if (_refreshTimer) return;
  _refreshTimer = setInterval(loadAndRender, 10000);
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
(async function _boot() {
  _initDelegates();
  // Bez parametru -> placeholder (NIE pokazujemy listy innych zawodow)
  if (!URL_SLOT && !URL_SLOT_SHORT) {
    setLive('ok');
    setMeta('Tablica wyników MSS');
    document.getElementById('main').innerHTML =
      '<div class="empty" style="padding:80px 20px;">' +
        '<div class="empty-icon">' + ic('qr') + '</div>' +
        '<div style="margin-bottom:8px;">Zeskanuj QR kod zawodów</div>' +
        '<div style="font-size:13px;color:var(--text3);text-transform:none;font-family:var(--font-b);letter-spacing:0;font-weight:normal;margin-top:8px;">Każde zawody mają indywidualny QR kod / link.<br>Otrzymasz go od organizatora.</div>' +
      '</div>';
    return;
  }

  // Mamy short code -> rozwiaz do pelnego slot_id
  if (!URL_SLOT && URL_SLOT_SHORT) {
    setLive('...');
    const resolved = await _resolveShortSlot(URL_SLOT_SHORT);
    if (resolved) {
      URL_SLOT = resolved;
    } else {
      setLive('err');
      setMeta('Tablica wyników MSS');
      document.getElementById('main').innerHTML =
        '<div class="empty" style="padding:80px 20px;">' +
          '<div class="empty-icon">' + ic('lock') + '</div>' +
          '<div style="margin-bottom:8px;">Zawody niedostępne</div>' +
          '<div style="font-size:13px;color:var(--text3);text-transform:none;font-family:var(--font-b);letter-spacing:0;font-weight:normal;margin-top:8px;">Kod zawodów <code>' + esc(URL_SLOT_SHORT) + '</code> nie został znaleziony, lub publikacja wyników nie jest jeszcze włączona przez organizatora.</div>' +
        '</div>';
      return;
    }
  }
  loadAndRender();
  startAutoRefresh();
})();
</script>
