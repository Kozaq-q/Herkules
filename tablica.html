<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Tablica — MSS</title>
<script>
// Redirect na nowy krotszy URL, zachowuje query params.
// Stary format: tablica.html?slot=<UUID>  -> t.html?s=<ostatnie 6 znakow>
// Inne paramy: po prostu przenosimy je dalej.
(function(){
  var params = new URLSearchParams(location.search);
  var slot = params.get('slot');
  var newParams = new URLSearchParams();
  if (slot) {
    newParams.set('s', slot.slice(-6).toLowerCase());
  }
  // Przenies pozostale (poza 'slot') do nowego URLa
  params.forEach(function(v, k) { if (k !== 'slot') newParams.set(k, v); });
  var q = newParams.toString();
  location.replace('t.html' + (q ? '?' + q : ''));
})();
</script>
</head>
<body>
<noscript>
  <p>Przekierowanie wymaga JavaScript. Wpisz: <a href="t.html">militarysportsystem.pl/t.html</a></p>
</noscript>
</body>
</html>
