<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Patrol — Sędzia startu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:      #0d0f0f;
  --bg2:     #141717;
  --bg3:     #1c2020;
  --bg4:     #232828;
  --border:  #2e3535;
  --border2: #3d4646;
  --text1:   #f0f2f2;
  --text2:   #c8cfcf;
  --text3:   #8a9898;
  --accent:  #e8d44d;
  --green:   #4caf82;
  --red:     #e05555;
  --blue:    #5b9bd5;
  --orange:  #e8944d;
  --male:    #5b9bd5;
  --female:  #d57b9b;
  --font-h:  'Barlow Condensed', sans-serif;
  --font-b:  'Barlow', sans-serif;
  --font-m:  'JetBrains Mono', monospace;
  --radius:  6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text1); font-family: var(--font-b); font-size: 14px; line-height: 1.5; min-height: 100vh; overscroll-behavior: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* SPLASH */
#splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: var(--bg); z-index: 1000; }
.splash-logo { font-family: var(--font-h); font-size: 42px; font-weight: 800; letter-spacing: 4px; color: var(--orange); text-transform: uppercase; }
.splash-sub { font-family: var(--font-m); font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; margin-bottom: 30px; }
.splash-msg { font-size: 14px; color: var(--text2); text-align: center; max-width: 360px; line-height: 1.6; }
.splash-err { display: none; font-family: var(--font-h); font-size: 22px; color: var(--red); margin-top: 18px; letter-spacing: 1.5px; text-transform: uppercase; }
.splash-hint { display: none; font-size: 13px; color: var(--text3); margin-top: 10px; text-align: center; max-width: 360px; }

/* HEADER */
.header { background: var(--bg2); border-bottom: 3px solid var(--orange); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
.header-title { font-family: var(--font-h); font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); white-space: nowrap; }
.header-sub { font-family: var(--font-m); font-size: 10px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-contest { font-size: 13px; color: var(--text2); font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hdr-status { display: flex; align-items: center; gap: 6px; font-family: var(--font-m); font-size: 10px; color: var(--text3); padding: 4px 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); }
.hdr-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.hdr-status.ok .dot { background: var(--green); animation: pulse 2s infinite; }
.hdr-status.err .dot { background: var(--red); }
.hdr-status.warn { color: var(--orange); border-color: rgba(232,148,77,.5); }
.hdr-status.block { color: var(--red); border-color: rgba(224,85,85,.5); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 16px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); border: 1px dashed var(--border); border-radius: var(--radius); }
.empty-icon { font-size: 50px; opacity: .4; margin-bottom: 14px; }
.empty-title { font-family: var(--font-h); font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }

/* PARA CARDS */
.pair-card { background: var(--bg2); border: 3px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; transition: border-color .2s, background .2s, box-shadow .2s; position: relative; }
/* IDLE — czeka */
.pair-card:not(.running):not(.finished) { opacity: .9; }
.pair-card:not(.running):not(.finished)::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--border2); }
/* RUNNING — pomaranczowa gruba ramka + glow + tło */
.pair-card.running { border-color: var(--orange); background: linear-gradient(to right, rgba(232,148,77,.12), var(--bg2) 40%); box-shadow: 0 0 0 4px rgba(232,148,77,.18), 0 4px 20px rgba(232,148,77,.22); animation: card-glow 2s ease-in-out infinite; }
@keyframes card-glow { 0%,100% { box-shadow: 0 0 0 4px rgba(232,148,77,.18), 0 4px 20px rgba(232,148,77,.22); } 50% { box-shadow: 0 0 0 5px rgba(232,148,77,.30), 0 6px 28px rgba(232,148,77,.32); } }
/* FINISHED — zielona ramka + tło */
.pair-card.finished { border-color: var(--green); background: linear-gradient(to right, rgba(76,175,130,.12), var(--bg2) 40%); opacity: .94; }

.pair-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--bg3); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.pair-num { font-family: var(--font-h); font-size: 36px; font-weight: 800; color: var(--text1); line-height: 1; min-width: 50px; text-align: center; }
.pair-gender { font-size: 22px; }
.pair-status { font-family: var(--font-h); font-size: 13px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 4px; }
.pair-status.idle { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }
.pair-status.running { background: var(--orange); color: #111; border: 1px solid var(--orange); animation: pulse 1.5s infinite; box-shadow: 0 2px 10px rgba(232,148,77,.45); }
.pair-status.finished { background: var(--green); color: #fff; border: 1px solid var(--green); box-shadow: 0 2px 10px rgba(76,175,130,.4); }

.pair-card.running .pair-head { background: rgba(232,148,77,.10); }
.pair-card.finished .pair-head { background: rgba(76,175,130,.10); }
.pair-card.running .pair-num { color: var(--orange); }
.pair-card.finished .pair-num { color: var(--green); }

.timer-display { font-family: var(--font-m); font-size: 48px; font-weight: 800; color: var(--text1); letter-spacing: 1.5px; line-height: 1; font-variant-numeric: tabular-nums; padding: 0 8px; transition: color .15s, transform .15s; }
.timer-display.countdown-soon { color: var(--orange) !important; font-size: 72px !important; font-weight: 900; animation: countdown-pulse 1s infinite; }
.timer-display.countdown-urgent { color: var(--red) !important; font-size: 96px !important; font-weight: 900; animation: countdown-urgent 0.5s infinite; }
@keyframes countdown-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes countdown-urgent { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: .8; } }
.pair-card.running .timer-display { color: var(--orange); }
.pair-card.finished .timer-display { color: var(--green); }

.pair-athletes { padding: 12px 18px; background: var(--bg2); display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-bottom: 1px solid var(--border); }
.pair-ath { background: var(--bg3); border-radius: var(--radius); padding: 10px 14px; }
.pair-ath-name { font-size: 14px; font-weight: 700; color: var(--text1); }
.pair-ath-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.lane-badge { display: inline-block; font-family: var(--font-h); font-size: 10px; font-weight: 800; letter-spacing: 1px; padding: 2px 7px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
.lane-L { background: rgba(91,155,213,.15); color: var(--male); border: 1px solid rgba(91,155,213,.4); }
.lane-P { background: rgba(213,123,155,.15); color: var(--female); border: 1px solid rgba(213,123,155,.4); }

.pair-action { padding: 14px 18px; display: flex; gap: 10px; align-items: center; }
.btn-start, .btn-reset { flex: 1; font-family: var(--font-h); font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 22px 24px; border: none; border-radius: var(--radius); cursor: pointer; transition: transform .08s, filter .12s; }
.btn-start { background: var(--green); color: #fff; box-shadow: 0 4px 16px rgba(76,175,130,.3); }
.btn-start:hover { filter: brightness(1.15); }
.btn-start:active { transform: scale(.97); }
.btn-reset { background: var(--red); color: #fff; box-shadow: 0 4px 16px rgba(224,85,85,.25); }
.btn-reset:hover { filter: brightness(1.15); }
.btn-reset:active { transform: scale(.97); }
.btn-reset-small { background: transparent; color: var(--text3); border: 1px solid var(--border2); font-family: var(--font-h); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: lowercase; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; transition: all .12s; align-self: flex-start; }
.btn-reset-small:hover { color: var(--text2); border-color: var(--text3); }
.btn-start:disabled, .btn-reset:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.5); }

.start-time-info { font-size: 12px; color: var(--text3); font-family: var(--font-m); margin-top: 2px; }

@media (max-width: 700px) {
  .pair-athletes { grid-template-columns: 1fr; }
  .pair-num { font-size: 28px; min-width: 40px; }
  .timer-display { font-size: 32px; }
  .btn-start, .btn-reset { font-size: 18px; padding: 18px 16px; }
}

/* TOAST */
#toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
.toast { background: var(--bg3); border: 1px solid var(--border2); border-left: 3px solid var(--text3); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--text1); box-shadow: 0 4px 12px rgba(0,0,0,.3); transform: translateX(120%); transition: transform .25s; max-width: 320px; pointer-events: auto; }
.toast.show { transform: translateX(0); }
.toast.success { border-left-color: var(--green); }
.toast.error { border-left-color: var(--red); }
.toast.warning { border-left-color: var(--orange); }
</style>
</head>
<body>

<!-- SPLASH (auth/load) -->
<div id="splash">
  <div class="splash-logo">🎬 PATROL · START</div>
  <div class="splash-sub">Sędzia startu</div>
  <div class="splash-msg" id="splash-msg">Łączenie z serwerem...</div>
  <div class="splash-err" id="splash-err"></div>
  <div class="splash-hint" id="splash-hint"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <header class="header">
    <div class="header-left">
      <span class="header-title">🎬 START</span>
      <span class="header-sub" id="contest-sub">—</span>
    </div>
    <div class="header-right">
      <button id="schedule-btn" onclick="openScheduleModal()" style="background:rgba(232,148,77,.12);border:1px solid var(--orange);border-radius:var(--radius);color:var(--orange);font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;">⏰ Harmonogram</button>
      <div class="hdr-status" id="live-clock" style="font-family:var(--font-m);font-size:13px;color:var(--text1);font-weight:700;letter-spacing:1px;background:var(--bg3);">00:00:00</div>
      <div class="hdr-status" id="sync-indicator"><span class="dot"></span><span id="sync-label">—</span></div>
      <div class="hdr-status" id="clock-status" style="display:none;cursor:help;"></div>
    </div>
  </header>

  <div class="main">
    <div id="ps-tabs-row" style="display:none;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap;">
      <div style="display:flex;gap:4px;">
        <button id="ps-tab-M" onclick="switchPsTab('M')" style="font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border:none;border-bottom:3px solid var(--male);background:rgba(91,155,213,.1);color:var(--male);cursor:pointer;border-radius:var(--radius) var(--radius) 0 0;margin-bottom:-2px;">♂ Mężczyźni</button>
        <button id="ps-tab-K" onclick="switchPsTab('K')" style="font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius) var(--radius) 0 0;margin-bottom:-2px;">♀ Kobiety</button>
      </div>
      <button id="ps-emergency-reset" onclick="emergencyResetRunning()" style="display:none;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text3);font-size:10px;font-family:var(--font-h);letter-spacing:1px;text-transform:lowercase;padding:4px 10px;cursor:pointer;" title="Awaryjny reset biegnących par">↺ reset biegnących</button>
    </div>
    <div id="pairs-list"></div>
  </div>
</div>

<!-- MODAL: HARMONOGRAM -->
<div id="schedule-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--bg2);border:2px solid var(--orange);border-radius:10px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);">
      <div style="font-family:var(--font-h);font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orange);">⏰ Harmonogram startów</div>
      <button onclick="closeScheduleModal()" style="background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;line-height:1;padding:0 6px;">✕</button>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6;">
      Ustaw czas startu pierwszej pary i interwał między parami. Każda para otrzyma swój czas, można potem zmienić godzinę pojedynczej pary klikając na nią w głównym widoku.
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Pierwsza para startuje o (HH:MM:SS)</label>
        <input type="time" step="1" id="sched-first" value="10:00:00" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text1);padding:12px 14px;font-family:var(--font-m);font-size:18px;font-weight:700;text-align:center;" />
      </div>
      <div>
        <label style="display:block;font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Interwał między parami (sekundy)</label>
        <input type="number" min="10" max="3600" step="5" id="sched-interval" value="60" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text1);padding:12px 14px;font-family:var(--font-m);font-size:18px;font-weight:700;text-align:center;" />
      </div>
      <button onclick="confirmGenerateSchedule()" style="width:100%;padding:16px;background:var(--orange);color:#111;border:none;border-radius:var(--radius);font-family:var(--font-h);font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;">⚙ Wygeneruj harmonogram</button>
      <button onclick="confirmClearSchedule()" style="width:100%;padding:12px;background:transparent;color:var(--red);border:1px solid rgba(224,85,85,.5);border-radius:var(--radius);font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;">✕ Wyczyść cały harmonogram</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// AUTH / PARAMS
// ═══════════════════════════════════════════════════════════════
const SLOT_ID  = new URLSearchParams(window.location.search).get('slot') || '';
const URL_KEY  = new URLSearchParams(window.location.search).get('key') || '';
const STORAGE_KEY = SLOT_ID;

// ═══════════════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://yrgkgzrpfemmthscrprf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyZ2tnenJwZmVtbXRoc2NycHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjYxMTUsImV4cCI6MjA4OTAwMjExNX0.CKuLNRCyolMf6nPiWgOcE8j76Isjwc12bwQmIY5E8Do';
let _sb = null;
function getDB() {
  if (!_sb) _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _sb;
}

// ═══════════════════════════════════════════════════════════════
// SERVER CLOCK SYNC (kopia z patrol.html)
// ═══════════════════════════════════════════════════════════════
let _serverClockOffset = 0;
let _clockSyncOk = false;

function nowMs() { return Date.now() + _serverClockOffset; }

async function syncServerClock() {
  try {
    const before = Date.now();
    const resp = await fetch(SUPABASE_URL + '/rest/v1/patrol_state?select=slot_id&limit=1', {
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY },
      cache: 'no-store'
    });
    const after = Date.now();
    const dateHeader = resp.headers.get('Date') || resp.headers.get('date');
    if (!dateHeader) return;
    const serverTime = new Date(dateHeader).getTime();
    if (!Number.isFinite(serverTime)) return;
    const roundTrip = after - before;
    _serverClockOffset = (serverTime + Math.round(roundTrip / 2)) - after;
    _clockSyncOk = true;
    _updateClockStatus();
  } catch(e) { _clockSyncOk = false; _updateClockStatus(); }
}

function getClockDriftStatus() {
  if (!_clockSyncOk) return { status: 'unknown', driftMs: 0 };
  const d = Math.abs(_serverClockOffset);
  if (d > 10000) return { status: 'block', driftMs: _serverClockOffset };
  if (d > 2000)  return { status: 'warn',  driftMs: _serverClockOffset };
  return { status: 'ok', driftMs: _serverClockOffset };
}

function _updateClockStatus() {
  const el = document.getElementById('clock-status');
  if (!el) return;
  const { status, driftMs } = getClockDriftStatus();
  const driftSec = Math.round(driftMs / 100) / 10;
  const sign = driftMs > 0 ? '+' : '';
  el.classList.remove('warn', 'block');
  if (status === 'ok') { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  if (status === 'warn') { el.classList.add('warn'); el.innerHTML = '⚠ zegar ' + sign + driftSec + 's'; el.title = 'Twój zegar systemowy różni się od serwera o ' + sign + driftSec + 's — skoryguj w ustawieniach.'; }
  else if (status === 'block') { el.classList.add('block'); el.innerHTML = '⛔ zegar ' + sign + driftSec + 's'; el.title = 'Zegar zbyt dużo różni się od serwera — START zablokowany. Skoryguj zegar.'; }
  else { el.innerHTML = '⌛ zegar ?'; el.title = 'Synchronizacja zegara serwera niedostępna.'; }
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = null;
let _isSaving = false;
let _myWriteTag = '';
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2, 10);

function ensureStateDefaults() {
  if (!state) return;
  if (!state.athletes) state.athletes = [];
  if (!state.pairs) state.pairs = [];
  if (!state.times) state.times = {};
  if (!state.disq) state.disq = {};
  if (!state.runs) state.runs = {};
  if (!state.cfg) state.cfg = {};
}

async function loadState() {
  try {
    const { data } = await getDB().from('patrol_state').select('state_json').eq('slot_id', STORAGE_KEY).single();
    if (!data) return false;
    state = JSON.parse(data.state_json);
    ensureStateDefaults();
    _myWriteTag = state._writerTag || '';
    return true;
  } catch(e) { return false; }
}

function checkAccess() {
  const cfg = (state && state.cfg) || {};
  const enabled = !!cfg.startEnabled;
  const expectedKey = cfg.startKey || '';
  if (!enabled) return { ok: false, title: 'Link nieaktywny', msg: 'Sędzia główny jeszcze nie aktywował dostępu lub go wyłączył. Spróbuj ponownie za chwilę.' };
  if (expectedKey && URL_KEY !== expectedKey) return { ok: false, title: 'Link wygasł', msg: 'Twój link nie pasuje do aktywnego klucza. Poproś sędziego o nowy link.' };
  if (cfg.startKeyExpiresAt && Date.now() > cfg.startKeyExpiresAt) return { ok: false, title: 'Link wygasł', msg: 'Czas aktywności linku minął. Poproś sędziego o przedłużenie lub nowy link.' };
  return { ok: true };
}

function showSplashError(title, msg) {
  document.getElementById('splash-msg').style.display = 'none';
  const errEl = document.getElementById('splash-err');
  const hintEl = document.getElementById('splash-hint');
  errEl.textContent = title; errEl.style.display = 'block';
  hintEl.textContent = msg; hintEl.style.display = 'block';
}

function enterApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderHeader();
  renderPairs();
  showSyncStatus('ok');
}

function renderHeader() {
  const c = state.contest || {};
  const sub = [c.city, c.date].filter(Boolean).join(' · ') || 'Bieg patrolowy';
  document.getElementById('contest-sub').textContent = sub;
  if (state.setup && state.setup.accentColor) {
    document.documentElement.style.setProperty('--orange', state.setup.accentColor);
  }
}

function showSyncStatus(s) {
  const ind = document.getElementById('sync-indicator');
  const lbl = document.getElementById('sync-label');
  if (!ind || !lbl) return;
  ind.classList.remove('ok', 'err');
  if (s === 'saving') lbl.textContent = 'zapis...';
  else if (s === 'ok') { ind.classList.add('ok'); lbl.textContent = 'live'; }
  else if (s === 'err') { ind.classList.add('err'); lbl.textContent = 'błąd'; }
}

// ═══════════════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════════════
async function saveState() {
  if (_isSaving) { setTimeout(saveState, 200); return; }
  _isSaving = true;
  try {
    const now = new Date().toISOString();
    const tag = SESSION_ID + '_' + Date.now();
    _myWriteTag = tag;
    state._savedAt = now;
    state._writerTag = tag;
    const stateJson = JSON.stringify(state);
    const { error } = await getDB().from('patrol_state').upsert({
      slot_id: STORAGE_KEY,
      state_json: stateJson,
      updated_at: now
    }, { onConflict: 'slot_id' });
    if (error) { console.error('Save error:', error); _myWriteTag = ''; showSyncStatus('err'); }
    else { showSyncStatus('ok'); }
  } catch(e) { console.error(e); _myWriteTag = ''; showSyncStatus('err'); }
  finally { _isSaving = false; }
}

// ═══════════════════════════════════════════════════════════════
// REALTIME + POLLING
// ═══════════════════════════════════════════════════════════════
let _rtChannel = null;
let _pollTimer = null;
let _rtHealthy = false;

function startRealtime() {
  if (_rtChannel) return;
  _rtChannel = getDB().channel('patrol_start_' + STORAGE_KEY)
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'patrol_state', filter: 'slot_id=eq.' + STORAGE_KEY },
        (payload) => { applyRemoteState(payload.new?.state_json); })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') { _rtHealthy = true; startPolling(); }
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        _rtHealthy = false; startPolling();
        getDB().removeChannel(_rtChannel); _rtChannel = null;
        setTimeout(startRealtime, 3000);
      }
    });
}

let _lastUpdatedAt = '';
function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  const interval = _rtHealthy ? 2000 : 1000;
  _pollTimer = setInterval(async () => {
    if (_isSaving) return;
    try {
      const { data } = await getDB().from('patrol_state').select('state_json, updated_at').eq('slot_id', STORAGE_KEY).single();
      if (!data) return;
      // Renderuj tylko gdy timestamp się zmienił — eliminuje "flicker" co 2s
      if (data.updated_at && data.updated_at !== _lastUpdatedAt) {
        _lastUpdatedAt = data.updated_at;
        if (data.state_json) applyRemoteState(data.state_json);
      }
    } catch(e) {}
  }, interval);
}

function applyRemoteState(json) {
  if (!json) return;
  try {
    const incoming = JSON.parse(json);
    if (incoming._writerTag && incoming._writerTag === _myWriteTag) return;
    if (_isSaving) return;
    state = incoming;
    ensureStateDefaults();
    // Czy dostęp dalej OK?
    const access = checkAccess();
    if (!access.ok) {
      document.getElementById('app').style.display = 'none';
      document.getElementById('splash').style.display = 'flex';
      showSplashError(access.title, access.msg);
      return;
    }
    renderHeader();
    renderPairs();
  } catch(e) { console.error('applyRemoteState:', e); }
}

// ═══════════════════════════════════════════════════════════════
// RENDER PAR
// ═══════════════════════════════════════════════════════════════
function formatRunTime(ms) {
  if (!Number.isFinite(ms) || ms < 0) ms = 0;
  const sec = Math.floor(ms / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  const m = Math.floor(sec / 60);
  const s = sec - m * 60;
  const csStr = (cs < 10 ? '0' : '') + cs;
  if (m > 0) return m + ':' + (s < 10 ? '0' : '') + s + '.' + csStr;
  return s + '.' + csStr;
}

function formatClockTime(ms) {
  const d = new Date(ms);
  const pad = n => (n < 10 ? '0' : '') + n;
  return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g, '&#39;');
}

function displayName(a) {
  return ((a.rank || '') + ' ' + (a.name || '')).trim() || '—';
}

function getRun(gender, pairNum) {
  const k = gender + '_' + pairNum;
  return (state.runs && state.runs[k]) || null;
}

let _psTab = 'M';
function switchPsTab(g) {
  _psTab = g;
  renderPairs();
}

function emergencyResetRunning() {
  const pairs = (state.pairs || []);
  const running = pairs.filter(p => {
    const r = getRun(p.gender, p.pairNum);
    return r && r.startedAt;
  });
  if (!running.length) { showToast('Brak biegnących par', 'info'); return; }
  const input = prompt('⚠ AWARYJNY RESET ' + running.length + ' biegnącą/ych parę/par.\n\nWszystkie czasy łączne zostaną usunięte.\n\nWpisz RESET aby potwierdzić:');
  if (input === null) return;
  if (input.trim().toUpperCase() !== 'RESET') {
    showToast('Nie wpisano "RESET" — anulowano', 'warning', 2500);
    return;
  }
  running.forEach(p => {
    const k = p.gender + '_' + p.pairNum;
    if (state.runs && state.runs[k]) delete state.runs[k];
    [p.aId, p.bId].filter(Boolean).forEach(id => {
      if (state.times?.[id]?.total) delete state.times[id].total;
    });
  });
  saveState();
  renderPairs();
  showToast('↺ Zresetowano ' + running.length + ' par', 'warning', 3000);
}

function renderPairs() {
  const listEl = document.getElementById('pairs-list');
  const tabsRow = document.getElementById('ps-tabs-row');
  // Tryb offline — START nieaktywny
  if (state.cfg && state.cfg.offlineMode) {
    listEl.innerHTML = '<div class="empty" style="border-color:rgba(232,148,77,.5);background:rgba(232,148,77,.04);">' +
      '<div class="empty-icon">🔌</div>' +
      '<div class="empty-title" style="color:var(--orange);">Tryb offline aktywny</div>' +
      '<div style="line-height:1.6;">Sędzia główny włączył tryb offline (sieć niestabilna).<br>' +
      '<strong>Użyj fizycznego stopera</strong> i przekaż czas startu pozostałym sędziom.<br>' +
      'Wpisanie czasów odbywa się ręcznie w aplikacji głównej.</div></div>';
    if (tabsRow) tabsRow.style.display = 'none';
    return;
  }
  const pairs = (state.pairs || []).slice().sort((a, b) => {
    if (a.gender !== b.gender) return a.gender.localeCompare(b.gender);
    return a.pairNum - b.pairNum;
  });
  if (!pairs.length) {
    listEl.innerHTML = '<div class="empty"><div class="empty-icon">🎲</div><div class="empty-title">Brak par</div><div>Sędzia główny jeszcze nie wylosował par.</div></div>';
    if (tabsRow) tabsRow.style.display = 'none';
    return;
  }
  // Taby M/K
  const hasM = pairs.some(p => p.gender === 'M');
  const hasK = pairs.some(p => p.gender === 'K');
  if (tabsRow) {
    tabsRow.style.display = 'flex';
    document.getElementById('ps-tab-M').style.display = hasM ? '' : 'none';
    document.getElementById('ps-tab-K').style.display = hasK ? '' : 'none';
  }
  if (_psTab === 'M' && !hasM && hasK) _psTab = 'K';
  if (_psTab === 'K' && !hasK && hasM) _psTab = 'M';
  _applyPsTabStyle();
  // Reset awaryjny — widoczny gdy są biegnące
  const runningCount = pairs.filter(p => {
    const r = getRun(p.gender, p.pairNum);
    return r && r.startedAt;
  }).length;
  const emergencyBtn = document.getElementById('ps-emergency-reset');
  if (emergencyBtn) emergencyBtn.style.display = runningCount > 0 ? '' : 'none';
  // Filtruj
  const visible = pairs.filter(p => p.gender === _psTab);
  listEl.innerHTML = visible.map(p => renderPairCard(p)).join('');
}

function _applyPsTabStyle() {
  const tM = document.getElementById('ps-tab-M');
  const tK = document.getElementById('ps-tab-K');
  if (!tM || !tK) return;
  const activeStyle = c => 'font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border:none;border-bottom:3px solid ' + c + ';background:rgba(255,255,255,.05);color:' + c + ';cursor:pointer;border-radius:var(--radius) var(--radius) 0 0;margin-bottom:-2px;';
  const inactiveStyle = 'font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius) var(--radius) 0 0;margin-bottom:-2px;';
  tM.style.cssText = _psTab === 'M' ? activeStyle('var(--male)') : inactiveStyle;
  tK.style.cssText = _psTab === 'K' ? activeStyle('var(--female)') : inactiveStyle;
}

function renderPairCard(p) {
  const gender = p.gender;
  const pairNum = p.pairNum;
  const run = getRun(gender, pairNum);
  const started = !!(run && run.startedAt);
  const a = p.aId ? state.athletes.find(x => x.id === p.aId) : null;
  const b = p.bId ? state.athletes.find(x => x.id === p.bId) : null;
  const aFinished = !!(started && run.finishedAt && run.finishedAt[p.aId]);
  const bFinished = p.bId ? !!(started && run.finishedAt && run.finishedAt[p.bId]) : true;
  const allFinished = started && aFinished && bFinished;

  let statusCls, statusTxt;
  if (allFinished) { statusCls = 'finished'; statusTxt = '✓ Skończona'; }
  else if (started) { statusCls = 'running'; statusTxt = '▶ Biegnie'; }
  else { statusCls = 'idle'; statusTxt = '○ Oczekuje'; }

  // Timer display
  let timerHtml;
  if (allFinished) {
    const last = Math.max(...Object.values(run.finishedAt));
    timerHtml = '<div class="timer-display" data-finished="1">' + formatRunTime(last - run.startedAt) + '</div>';
  } else if (started) {
    timerHtml = '<div class="timer-display" data-running="1" data-pair="' + gender + '_' + pairNum + '">0.00</div>';
  } else if (run && run.scheduledStartAt) {
    // Zaplanowany start — pokazuj odliczanie
    timerHtml = '<div class="timer-display" data-countdown="1" data-pair="' + gender + '_' + pairNum + '" style="color:var(--text3);font-weight:400;">—</div>';
  } else {
    timerHtml = '<div class="timer-display" style="color:var(--text3);font-weight:400;">—</div>';
  }

  // Akcja
  let actionHtml = '';
  if (!started) {
    actionHtml = '<button class="btn-start" onclick="startPair(\'' + gender + '\',' + pairNum + ')">▶ START</button>';
  } else if (allFinished) {
    // Para skończyła — reset rzadko potrzebny, więc mały i szary
    actionHtml = '<button class="btn-reset-small" onclick="resetPair(\'' + gender + '\',' + pairNum + ')" title="Reset całej pary (rzadko potrzebne)">↺ reset</button>';
  } else {
    actionHtml = '<button class="btn-reset" onclick="resetPair(\'' + gender + '\',' + pairNum + ')">↺ RESET (falstart)</button>';
  }
  // Info o czasie startu / harmonogramie
  let startTimeInfo = '';
  if (started) {
    startTimeInfo = '<div class="start-time-info">Start: ' + formatClockTime(run.startedAt) + '</div>';
  } else if (run && run.scheduledStartAt) {
    startTimeInfo = '<div class="start-time-info" data-scheduled="' + gender + '_' + pairNum + '" style="color:var(--orange);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">' +
      '<span>⏰ Auto-start: <strong>' + formatClockTime(run.scheduledStartAt) + '</strong> <span class="countdown-text" style="margin-left:6px;font-family:var(--font-m);"></span></span>' +
      '<button onclick="editPairStartTime(\'' + gender + '\',' + pairNum + ')" style="background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:11px;padding:4px 10px;cursor:pointer;">✏ zmień</button>' +
    '</div>';
  } else {
    startTimeInfo = '<div class="start-time-info" style="text-align:center;">' +
      '<button onclick="editPairStartTime(\'' + gender + '\',' + pairNum + ')" style="background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);color:var(--text3);font-size:11px;padding:6px 12px;cursor:pointer;font-family:var(--font-h);letter-spacing:1px;text-transform:uppercase;">⏰ Ustaw godzinę startu</button>' +
    '</div>';
  }

  // Header
  const head = '<div class="pair-head">' +
    '<div style="display:flex;align-items:center;gap:12px;">' +
      '<span class="pair-num">' + pairNum + '</span>' +
      '<span class="pair-gender">' + (gender === 'M' ? '♂' : '♀') + '</span>' +
      '<span class="pair-status ' + statusCls + '">' + statusTxt + '</span>' +
    '</div>' +
    timerHtml +
  '</div>';

  // Athletes
  const renderAth = (ath, lane) => {
    if (!ath) return '<div class="pair-ath" style="opacity:.4;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;">SOLO — brak ' + lane + '</div>';
    return '<div class="pair-ath">' +
      '<div class="pair-ath-name">' + esc(displayName(ath)) + '<span class="lane-badge lane-' + lane + '">' + lane + '</span></div>' +
      '<div class="pair-ath-meta">' + esc(ath.team || '') + ' · #' + esc(ath.bib) + '</div>' +
    '</div>';
  };
  const aIsL = (p.aLane || 'L') === 'L';
  const leftAth = aIsL ? a : b;
  const rightAth = aIsL ? b : a;
  const athletes = '<div class="pair-athletes">' + renderAth(leftAth, 'L') + renderAth(rightAth, 'P') + '</div>';
  const action = '<div class="pair-action" style="flex-direction:column;align-items:stretch;">' + actionHtml + startTimeInfo + '</div>';

  const cls = 'pair-card' + (allFinished ? ' finished' : (started ? ' running' : ''));
  return '<div class="' + cls + '">' + head + athletes + action + '</div>';
}

// ═══════════════════════════════════════════════════════════════
// AKCJE START/RESET
// ═══════════════════════════════════════════════════════════════
function startPair(gender, pairNum) {
  const drift = getClockDriftStatus();
  if (drift.status === 'block') {
    showToast('Zegar systemowy ma drift > 10s — skoryguj zanim wystartujesz', 'error', 4000);
    return;
  }
  const k = gender + '_' + pairNum;
  if (state.runs && state.runs[k] && state.runs[k].startedAt) {
    if (!confirm('Para ' + pairNum + ' już biegnie. Resetować i zacząć od nowa? (Falstart)')) return;
  }
  if (!state.runs) state.runs = {};
  state.runs[k] = { startedAt: nowMs(), finishedAt: {} };
  // Wyczyść total dla zawodników tej pary
  const p = state.pairs.find(x => x.gender === gender && x.pairNum === pairNum);
  if (p) {
    [p.aId, p.bId].filter(Boolean).forEach(id => {
      if (state.times?.[id]?.total) delete state.times[id].total;
    });
  }
  saveState();
  renderPairs();
  showToast('▶ Para ' + pairNum + ' (' + gender + ') wystartowała', 'success', 1800);
}

function resetPair(gender, pairNum) {
  if (!confirm('Resetować start pary ' + pairNum + '? Wszystkie czasy łączne tej pary zostaną usunięte (falstart).')) return;
  const k = gender + '_' + pairNum;
  if (state.runs) delete state.runs[k];
  const p = state.pairs.find(x => x.gender === gender && x.pairNum === pairNum);
  if (p) {
    [p.aId, p.bId].filter(Boolean).forEach(id => {
      if (state.times?.[id]?.total) delete state.times[id].total;
    });
  }
  saveState();
  renderPairs();
  showToast('↺ Reset pary ' + pairNum, 'warning', 2000);
}

// Ticker — co 100ms aktualizuje lecące liczniki
// Auto-start: sprawdzaj czy nadszedł czas startu zaplanowanych par
function checkScheduledStartsStart() {
  if (!state || !state.runs) return;
  let changed = false;
  for (const k in state.runs) {
    const run = state.runs[k];
    if (run.scheduledStartAt && !run.startedAt && nowMs() >= run.scheduledStartAt) {
      run.startedAt = run.scheduledStartAt;
      run.finishedAt = {};
      delete run.scheduledStartAt;
      changed = true;
    }
  }
  if (changed) {
    saveState();
    renderPairs();
    showToast('▶ Auto-start: para wystartowała', 'success', 2000);
  }
}

setInterval(() => {
  checkScheduledStartsStart();
  // Update lecącego licznika
  document.querySelectorAll('.timer-display[data-running="1"]').forEach(el => {
    const [gender, pairNum] = el.dataset.pair.split('_');
    const run = getRun(gender, parseInt(pairNum));
    if (!run || !run.startedAt) return;
    el.textContent = formatRunTime(nowMs() - run.startedAt);
  });
  // Update timer-display dla par z zaplanowanym startem (countdown)
  document.querySelectorAll('.timer-display[data-countdown="1"]').forEach(el => {
    const [gender, pairNum] = el.dataset.pair.split('_');
    const run = getRun(gender, parseInt(pairNum));
    if (!run || !run.scheduledStartAt || run.startedAt) {
      el.classList.remove('countdown-soon', 'countdown-urgent');
      el.textContent = '—';
      el.style.cssText = 'color:var(--text3);font-weight:400;';
      return;
    }
    const left = run.scheduledStartAt - nowMs();
    if (left > 0) {
      const sec = Math.ceil(left / 1000);
      if (sec <= 10) {
        el.style.cssText = ''; // resetuj inline style by klasy zadziałały
        el.textContent = sec;
        if (sec <= 5) {
          el.classList.remove('countdown-soon');
          el.classList.add('countdown-urgent');
        } else {
          el.classList.remove('countdown-urgent');
          el.classList.add('countdown-soon');
        }
      } else {
        el.classList.remove('countdown-soon', 'countdown-urgent');
        el.style.cssText = 'color:var(--orange);font-weight:800;';
        // Format -m:ss (bez setnych dla czytelności)
        const totalSec = Math.ceil(left / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec - m * 60;
        el.textContent = m > 0 ? '-' + m + ':' + (s < 10 ? '0' : '') + s : '-' + s + 's';
      }
    }
  });
}, 100);

// Co 500ms: aktualizuj odliczanie do auto-startu (tylko tekst, bez rerendera całych kart)
setInterval(() => {
  if (!state || !state.runs) return;
  document.querySelectorAll('[data-scheduled]').forEach(el => {
    const [gender, pairNum] = el.dataset.scheduled.split('_');
    const run = getRun(gender, parseInt(pairNum));
    if (!run || !run.scheduledStartAt || run.startedAt) return;
    const sec = Math.round((run.scheduledStartAt - nowMs()) / 1000);
    const cdEl = el.querySelector('.countdown-text');
    if (!cdEl) return;
    if (sec > 60) cdEl.textContent = '(za ' + Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0') + ')';
    else if (sec > 0) { cdEl.textContent = '(za ' + sec + 's)'; cdEl.style.color = sec <= 5 ? 'var(--red)' : 'var(--orange)'; }
    else cdEl.textContent = '(już!)';
  });
}, 500);

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function showToast(msg, type, duration) {
  type = type || 'info';
  duration = duration || 2500;
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  container.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, duration);
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// HARMONOGRAM AUTO-START
// ═══════════════════════════════════════════════════════════════
function openScheduleModal() {
  document.getElementById('schedule-modal').style.display = 'flex';
}
function closeScheduleModal() {
  document.getElementById('schedule-modal').style.display = 'none';
}

// Generuj harmonogram dla wszystkich par (z confirm — zabezpieczenie przed przypadkiem)
function confirmGenerateSchedule() {
  const firstStr = document.getElementById('sched-first').value || '10:00:00';
  const intervalSec = parseInt(document.getElementById('sched-interval').value || '60');
  if (!firstStr || !Number.isFinite(intervalSec) || intervalSec < 5) {
    showToast('Nieprawidłowe parametry', 'error'); return;
  }
  const pairCount = (state.pairs || []).length;
  if (!pairCount) { showToast('Brak par do harmonogramu', 'warning'); return; }
  if (!confirm('Wygenerować harmonogram dla ' + pairCount + ' par?\nPierwsza o ' + firstStr + ', każda kolejna co ' + intervalSec + 's.\n\nPary już biegnące nie zostaną zmienione.')) return;
  // Parsuj HH:MM:SS dla dzisiaj
  const parts = firstStr.split(':');
  const h = parseInt(parts[0]) || 0;
  const m = parseInt(parts[1]) || 0;
  const s = parseInt(parts[2]) || 0;
  const now = new Date(nowMs());
  const firstDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, s, 0);
  const firstTs = firstDate.getTime();
  // Walidacja: pierwsza para w przeszłości
  if (firstTs < nowMs()) {
    const secAgo = Math.round((nowMs() - firstTs) / 1000);
    if (!confirm('⚠ Godzina jest ' + secAgo + ' s w przeszłości — pierwsza para wystartuje natychmiast. Kontynuować?')) return;
  }
  const pairs = (state.pairs || []).slice().sort((a, b) => {
    if (a.gender !== b.gender) return a.gender.localeCompare(b.gender);
    return a.pairNum - b.pairNum;
  });
  if (!state.runs) state.runs = {};
  pairs.forEach((p, idx) => {
    const k = p.gender + '_' + p.pairNum;
    if (!state.runs[k]) state.runs[k] = {};
    if (state.runs[k].startedAt) return;
    state.runs[k].scheduledStartAt = firstTs + idx * intervalSec * 1000;
  });
  saveState();
  closeScheduleModal();
  renderPairs();
  showToast('⏰ Wygenerowano harmonogram dla ' + pairs.length + ' par', 'success', 3000);
}

function confirmClearSchedule() {
  if (!confirm('Wyczyścić zaplanowane godziny startu wszystkich par?\n(Pary już biegnące nie zostaną dotknięte.)')) return;
  let cleared = 0;
  if (state.runs) {
    for (const k in state.runs) {
      if (state.runs[k].scheduledStartAt && !state.runs[k].startedAt) {
        delete state.runs[k].scheduledStartAt;
        if (!Object.keys(state.runs[k]).length) delete state.runs[k];
        cleared++;
      }
    }
  }
  saveState();
  closeScheduleModal();
  renderPairs();
  showToast('✕ Wyczyszczono harmonogram (' + cleared + ' par)', 'info', 2000);
}

// Edycja czasu pojedynczej pary (z confirm — bo to ważne)
function editPairStartTime(gender, pairNum) {
  const k = gender + '_' + pairNum;
  const run = (state.runs && state.runs[k]) || null;
  const currentTs = run && run.scheduledStartAt;
  const currentStr = currentTs ? (() => {
    const d = new Date(currentTs);
    const pad = n => (n < 10 ? '0' : '') + n;
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  })() : '10:00:00';
  const newStr = prompt('Godzina startu pary ' + pairNum + ' (HH:MM:SS):\n(pusty = wyczyść)', currentStr);
  if (newStr === null) return;
  if (!newStr.trim()) {
    if (state.runs && state.runs[k]) {
      delete state.runs[k].scheduledStartAt;
      if (!Object.keys(state.runs[k]).length) delete state.runs[k];
    }
    saveState();
    renderPairs();
    showToast('✕ Anulowano auto-start pary ' + pairNum, 'info', 1500);
    return;
  }
  const m = newStr.trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (!m) { showToast('Nieprawidłowy format (HH:MM:SS)', 'error'); return; }
  const h = parseInt(m[1]), mi = parseInt(m[2]), s = parseInt(m[3] || '0');
  if (h > 23 || mi > 59 || s > 59) { showToast('Nieprawidłowa godzina', 'error'); return; }
  const now = new Date(nowMs());
  const newDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, mi, s, 0);
  const newTs = newDate.getTime();
  if (newTs < nowMs()) {
    const secAgo = Math.round((nowMs() - newTs) / 1000);
    if (!confirm('⚠ Godzina jest ' + secAgo + ' s w przeszłości — para wystartuje natychmiast. Kontynuować?')) return;
  }
  if (!state.runs) state.runs = {};
  if (!state.runs[k]) state.runs[k] = {};
  state.runs[k].scheduledStartAt = newTs;
  saveState();
  renderPairs();
  showToast('⏰ Para ' + pairNum + ' o ' + newStr, 'success', 1500);
}

async function boot() {
  if (!SLOT_ID) {
    showSplashError('Brak ID zawodów', 'Otwórz link z panelu MSS (powinien zawierać ?slot=...)');
    return;
  }
  if (!URL_KEY) {
    showSplashError('Brak klucza', 'Twój link nie zawiera klucza dostępu. Poproś sędziego głównego o pełny link.');
    return;
  }
  // Sync zegar zaraz
  syncServerClock();
  setInterval(syncServerClock, 60000);
  // Live clock co sekundę
  setInterval(() => { const el = document.getElementById('live-clock'); if (el) el.textContent = formatClockTime(nowMs()); }, 1000);
  // Load state
  const ok = await loadState();
  if (!ok || !state) {
    showSplashError('Brak danych', 'Nie udało się wczytać zawodów. Spróbuj odświeżyć stronę.');
    return;
  }
  const access = checkAccess();
  if (!access.ok) { showSplashError(access.title, access.msg); return; }
  enterApp();
  startRealtime();
  startPolling();
}

boot();
</script>
