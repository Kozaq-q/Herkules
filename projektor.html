<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projektor — Military Sports System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:      #0d0f0f;
  --bg2:     #141717;
  --bg3:     #1c2020;
  --bg4:     #232828;
  --border:  #2e3535;
  --border2: #3d4646;
  --text1:   #f0f2f2;
  --text2:   #c8cfcf;
  --text3:   #8a9898;
  --accent:  #e8d44d;
  --accent2: #b5a33a;
  --green:   #4caf82;
  --red:     #e05555;
  --blue:    #5b9bd5;
  --orange:  #e8944d;
  --font-h:  'Barlow Condensed', sans-serif;
  --font-b:  'Barlow', sans-serif;
  --font-m:  'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text1);
  font-family: var(--font-b);
  font-size: 15px;
  height: 100vh;
  overflow: hidden;
}

/* ── HEADER ── */
.proj-header {
  background: var(--bg2);
  border-bottom: 3px solid var(--accent);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.proj-brand {
  font-family: var(--font-h);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
.proj-contest-name {
  font-family: var(--font-h);
  font-size: 17px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
}
.proj-clock {
  font-family: var(--font-m);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  min-width: 80px;
  text-align: right;
}
.proj-sync {
  font-family: var(--font-m);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ── MAIN LAYOUT ── */
.proj-body {
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 58px);
  overflow: hidden;
}

/* ── PROGRESS ROW ── */
.proj-progress {
  grid-column: 1 / 3;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-shrink: 0;
}
.prog-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prog-label {
  font-family: var(--font-h);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
}
.prog-count { font-family: var(--font-m); font-size: 12px; color: var(--accent); }
.prog-bar {
  background: var(--bg4);
  border-radius: 3px;
  height: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.prog-pct { font-family: var(--font-m); font-size: 10px; color: var(--text3); text-align: right; }

/* ── INDIV RANKING — no scroll, fills height ── */
.proj-indiv {
  overflow: hidden;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 8px 10px 8px 16px;
  gap: 0;
}

.proj-section-title {
  font-family: var(--font-h);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* ── 4 CATEGORY BLOCKS — equal height, fill container ── */
.cats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 6px;
  flex: 1;
  min-height: 0;
}

.cat-block {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 4px;
}

.cat-block-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.cat-M35 { border-left: 3px solid #5b9bd5; background: rgba(91,155,213,.08); }
.cat-M36 { border-left: 3px solid #7b6fd4; background: rgba(123,111,212,.08); }
.cat-K35 { border-left: 3px solid #d45b9b; background: rgba(212,91,155,.08); }
.cat-K36 { border-left: 3px solid #d4845b; background: rgba(212,132,91,.08); }

.cat-block-title {
  font-family: var(--font-h);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 2px;
}
.cat-color-M35 { color: #5b9bd5; }
.cat-color-M36 { color: #7b6fd4; }
.cat-color-K35 { color: #d45b9b; }
.cat-color-K36 { color: #d4845b; }
.cat-count { font-size: 10px; color: var(--text3); font-family: var(--font-m); margin-left: auto; }

/* ── RANKING TABLE — rows stretch to fill cat-block ── */
.rank-table-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

.rank-table-scroll-viewport {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

.rank-table-scroll-track {
  position: absolute;
  top: 0; left: 0; right: 0;
  will-change: transform;
}

.rank-table {
  width: 100%;
  border-collapse: collapse;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.rank-table thead { flex-shrink: 0; display: table; width: 100%; table-layout: fixed; }
.rank-table tbody {
  display: table;
  width: 100%;
  table-layout: fixed;
}

.rank-table th {
  font-family: var(--font-h);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 3px 5px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--bg3);
}
.rank-table td {
  padding: 0 5px;
  border-bottom: 1px solid rgba(46,53,53,.4);
  vertical-align: middle;
  height: 1px; /* triggers equal distribution */
}
.rank-table tr:last-child td { border-bottom: none; }

.rk-pos {
  font-family: var(--font-h);
  font-size: 15px;
  font-weight: 800;
  text-align: center;
  width: 24px;
  color: var(--text3);
  line-height: 1;
}
.rk-1 { color: #FFD700; }
.rk-2 { color: #C0C0C0; }
.rk-3 { color: #CD7F32; }

.rk-name {
  font-weight: 600;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rk-team {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--font-h);
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rk-pts {
  font-family: var(--font-m);
  font-weight: 700;
  font-size: 13px;
  color: var(--accent);
  text-align: right;
  white-space: nowrap;
  width: 52px;
  padding-right: 10px;
}
.rk-bar-wrap { width: 50px; }
.rk-bar { background: var(--bg4); border-radius: 2px; height: 4px; overflow: hidden; }
.rk-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }

/* ── TEAM RANKING (right column) ── */
.proj-team {
  overflow: hidden;
  padding: 8px 16px 8px 12px;
  display: flex;
  flex-direction: column;
}

.team-cards-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.team-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  transition: border-color .3s;
}
.team-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.team-rank {
  font-family: var(--font-h);
  font-size: 20px;
  font-weight: 800;
  min-width: 28px;
  text-align: center;
}
.team-name {
  font-family: var(--font-h);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.team-pts {
  font-family: var(--font-m);
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}
.team-bar {
  background: var(--bg4);
  border-radius: 3px;
  height: 5px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.team-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width .6s ease;
}
.team-meta {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--font-m);
  margin-top: 3px;
}

/* ── MEDALS ── */
.medal-1 { color: #FFD700; }
.medal-2 { color: #C0C0C0; }
.medal-3 { color: #CD7F32; }

/* ── SYNC INDICATOR ── */
#proj-sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#proj-sync-dot.offline { background: var(--orange); animation: none; }

/* ── EMPTY / LOADING ── */
.proj-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-family: var(--font-h);
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
}

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="proj-header">
  <div class="proj-brand">⚔ Military Sports</div>
  <div class="proj-contest-name" id="proj-contest-name">Ładowanie...</div>
  <div style="display:flex;align-items:center;gap:14px">
    <div style="display:flex;align-items:center;gap:6px">
      <span id="proj-sync-dot"></span>
      <span class="proj-sync" id="proj-sync-txt">SYNC</span>
    </div>
    <div class="proj-clock" id="proj-clock">--:--:--</div>
  </div>
</div>

<!-- BODY -->
<div class="proj-body" id="proj-body">

  <!-- PROGRESS BAR ROW -->
  <div class="proj-progress" id="proj-progress">
    <div class="proj-loading">Ładowanie danych...</div>
  </div>

  <!-- INDIV RANKING -->
  <div class="proj-indiv" id="proj-indiv">
    <div class="proj-section-title">🏆 Klasyfikacja indywidualna</div>
    <div class="cats-grid" id="proj-cats-grid">
      <div class="proj-loading" style="grid-column:1/3">Ładowanie...</div>
    </div>
  </div>

  <!-- TEAM RANKING -->
  <div class="proj-team" id="proj-team">
    <div class="proj-section-title">🏟 Klasyfikacja drużynowa</div>
    <div class="proj-loading" style="height:200px">Ładowanie...</div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://yrgkgzrpfemmthscrprf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_aPrFnhbnuEL0xlj8b8SpiQ_Jq7CD-KL';
const SLOT_KEY     = 'default';

let _supabase = null;
function getSupabase() {
  if (!_supabase) _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _supabase;
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let STATE = null;

// Ustawienia projektora (ustawiane z index.html przez localStorage)
function getProjectorSettings() {
  try {
    const raw = localStorage.getItem('projektor_settings');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const topN = parseInt(localStorage.getItem('projektor_topN')) || 10;
  return { topN, cats: ['M35','M36','K35','K36'], showTeams: true, maxTeams: null, showProgress: true, autoScroll: false, scrollSpeed: 20, showK1: false, showK2: false, showK3: false, showK4: false, customTitle: '' };
}

// ═══════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════
async function loadState() {
  // 1. Spróbuj Supabase
  try {
    const db = getSupabase();
    // Pobierz aktywny slot z localStorage (przekazany z głównego okna)
    const activeSlot = localStorage.getItem('projektor_activeSlot') || SLOT_KEY;
    const { data, error } = await db
      .from('app_state')
      .select('state_json')
      .eq('slot_id', activeSlot)
      .single();

    if (!error && data) {
      STATE = JSON.parse(data.state_json);
      setSyncStatus(true);
      return true;
    }
  } catch(e) {
    console.warn('Supabase niedostępny:', e);
  }

  // 2. Fallback: localStorage
  try {
    const activeSlot = localStorage.getItem('projektor_activeSlot') || SLOT_KEY;
    const raw = localStorage.getItem('zawody_slot_' + activeSlot)
             || localStorage.getItem('zawody_state_v2');
    if (raw) {
      STATE = JSON.parse(raw);
      setSyncStatus(false);
      return true;
    }
  } catch(e) {}

  setSyncStatus(false);
  return false;
}

function setSyncStatus(online) {
  const dot = document.getElementById('proj-sync-dot');
  const txt = document.getElementById('proj-sync-txt');
  if (online) {
    dot.classList.remove('offline');
    txt.textContent = 'LIVE';
  } else {
    dot.classList.add('offline');
    txt.textContent = 'OFFLINE';
  }
}

// ═══════════════════════════════════════════════════════════
// POINTS LOGIC (zduplikowane z index.html — projektor jest standalone)
// ═══════════════════════════════════════════════════════════
function getPoints(cat, event, timeSec) {
  if (timeSec === null || timeSec === undefined || isNaN(timeSec) || timeSec <= 0) return 0;
  let table = STATE.scoreTablesByCat?.[cat]?.[event];
  if (!table || !table.length) return 0;
  const sorted = [...table].sort((a,b) => a[0]-b[0]);
  if (timeSec <= sorted[0][0]) return sorted[0][1];
  if (timeSec >= sorted[sorted.length-1][0]) return Math.max(0, sorted[sorted.length-1][1]);
  for (let i = 0; i < sorted.length - 1; i++) {
    if (timeSec >= sorted[i][0] && timeSec <= sorted[i+1][0]) {
      const ratio = (timeSec - sorted[i][0]) / (sorted[i+1][0] - sorted[i][0]);
      return Math.round((sorted[i][1] + ratio * (sorted[i+1][1] - sorted[i][1])) * 10) / 10;
    }
  }
  return 0;
}

function getBestValidTime(arr, disqArr, dnfArr) {
  if (!arr || !arr.length) return null;
  const valid = arr.filter((t, i) => {
    if (!t || isNaN(t) || t <= 0) return false;
    if (disqArr && disqArr[i]) return false;
    if (dnfArr && dnfArr[i]) return false;
    return true;
  });
  return valid.length ? Math.min(...valid) : null;
}

function getAthletePoints(athleteId) {
  const a = STATE.athletes.find(x => x.id == athleteId);
  if (!a) return {k1:0,k2:0,k3:0,k4:0,total:0};
  const r    = STATE.results[athleteId] || {};
  const disq = STATE.disq[athleteId]    || {};
  const dnf  = STATE.dnf[athleteId]     || {};
  const cat  = a.cat;
  const k1t = getBestValidTime(r.k1, disq.k1, dnf.k1);
  const k2t = getBestValidTime(r.k2, disq.k2, dnf.k2);
  const k3t1 = getBestValidTime(r.k3, disq.k3, dnf.k3);
  const k3t2 = getBestValidTime(r.k3s2, disq.k3s2, dnf.k3s2);
  const k3t  = k3t1 && k3t2 ? Math.min(k3t1,k3t2) : (k3t1 || k3t2);
  const k4t = getBestValidTime(r.k4, disq.k4, dnf.k4);
  return {
    k1: Math.round(getPoints(cat,'k1',k1t)*10)/10,
    k2: Math.round(getPoints(cat,'k2',k2t)*10)/10,
    k3: Math.round(getPoints(cat,'k3',k3t)*10)/10,
    k4: Math.round(getPoints(cat,'k4',k4t)*10)/10,
    total: Math.round((getPoints(cat,'k1',k1t)+getPoints(cat,'k2',k2t)+getPoints(cat,'k3',k3t)+getPoints(cat,'k4',k4t))*10)/10
  };
}

function hasAnyResult(aid, event) {
  const r   = STATE.results[aid]  || {};
  const dnf = STATE.dnf[aid]      || {};
  const arr = r[event] || [];
  const dnfArr = dnf[event] || [];
  return arr.some((t,i) => (t && t > 0) || dnfArr[i]);
}

function getTeamScore(teamId) {
  const limitM = (STATE.setup.teamLimitM != null) ? STATE.setup.teamLimitM : Infinity;
  const limitK = (STATE.setup.teamLimitK != null) ? STATE.setup.teamLimitK : Infinity;
  const all = STATE.athletes.filter(a => a.teamId == teamId && !a.pk)
    .map(a => ({ a, pts: getAthletePoints(a.id).total }));
  const menAll   = all.filter(x => x.a.gender === 'M').sort((a,b) => b.pts - a.pts);
  const womenAll = all.filter(x => x.a.gender === 'K').sort((a,b) => b.pts - a.pts);
  const menUsed   = menAll.slice(0, limitM);
  const womenUsed = womenAll.slice(0, limitK);
  const total = [...menUsed, ...womenUsed].reduce((s,x) => s + x.pts, 0);
  return { total, menUsed, womenUsed };
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  renderFull();
}

function renderFull() {
  if (!STATE) return;
  const s = getProjectorSettings();

  document.getElementById('proj-contest-name').textContent =
    (s.customTitle || STATE.setup?.name || '').toUpperCase();

  if (STATE.setup?.accentColor) {
    document.documentElement.style.setProperty('--accent', STATE.setup.accentColor);
  }

  const progressRow = document.getElementById('proj-progress');
  progressRow.style.display = s.showProgress !== false ? 'flex' : 'none';

  const body = document.getElementById('proj-body');
  const teamCol = document.getElementById('proj-team');
  if (s.showTeams) {
    body.style.gridTemplateColumns = '1fr 300px';
    teamCol.style.display = 'flex';
  } else {
    body.style.gridTemplateColumns = '1fr';
    teamCol.style.display = 'none';
  }

  if (s.showProgress !== false) renderProgress();
  renderIndiv(s);
  if (s.showTeams) renderTeam(s);
}

// Miękki rerender — aktualizuje dane bez przerywania scrollu
function renderSoft() {
  if (!STATE) return;
  const s = getProjectorSettings();

  // Nagłówek i postęp — bezpiecznie
  document.getElementById('proj-contest-name').textContent =
    (s.customTitle || STATE.setup?.name || '').toUpperCase();
  if (s.showProgress !== false) renderProgress();
  if (s.showTeams) renderTeam(s);

  // Sprawdź czy istniejące bloki kategorii pasują do bieżących ustawień
  const allCats = ['M35','M36','K35','K36'];
  const cats = allCats.filter(c => s.cats.includes(c));
  const grid = document.getElementById('proj-cats-grid');
  const existingBlocks = grid ? Array.from(grid.querySelectorAll('.cat-block[data-cat]')).map(b => b.dataset.cat) : [];

  // Jeśli zestaw kategorii się zmienił — pełny rerender
  const sameSet = cats.length === existingBlocks.length && cats.every((c,i) => c === existingBlocks[i]);
  if (!sameSet) { renderFull(); return; }

  // Aktualizuj tylko zawartość wierszy — bez dotykania tbody scrollujących kopii
  cats.forEach(cat => {
    const athletes = STATE.athletes.filter(a => a.cat === cat)
      .map(a => ({ ...a, pts: getAthletePoints(a.id) }));
    const normal = athletes.filter(a => !a.pk).sort((a,b) => b.pts.total - a.pts.total);
    const shown  = (s.topN && s.topN > 0) ? normal.slice(0, s.topN) : normal;

    const newRowsHTML = shown.length ? buildRowsHTML(shown, s)
      : `<tr><td colspan="2" style="text-align:center;color:var(--text3);font-size:12px;padding:12px">Brak wyników</td></tr>`;

    const track = document.getElementById('scroll-track-' + cat);
    if (!track) return;

    const listA = track.querySelector('.scroll-list-a');
    if (!listA) return;

    // Sprawdź czy scroll jest aktywny (tbody ma więcej niż 1 kopię)
    const tbody = listA.querySelector('tbody');
    if (!tbody) return;

    // Policz ile kopii jest (szacuj po liczbie wierszy vs oryginał)
    // Jeśli scroll nie startował — pełny rerender
    const isScrolling = !!_catScrollRAFs[cat];
    if (!isScrolling) { renderFull(); return; }

    // Zaktualizuj każdą kopię wierszy
    // Kopiujemy nowy HTML do każdej sekcji odpowiadającej jednej kopii oryginału
    // Prościej: nadpisz wszystkie wiersze w tbody powtarzając nowy HTML tyle razy co kopii
    const allRows = tbody.querySelectorAll('tr');
    const origRowCount = shown.length || 1;
    // Ile kopii jest aktualnie?
    const copies = Math.round(allRows.length / origRowCount);
    if (copies < 1) { renderFull(); return; }

    // Zastąp zawartość tbody nowymi kopiami — scroll kontynuuje od tej samej pozycji
    tbody.innerHTML = Array(copies).fill(newRowsHTML).join('');
  });
}

// ── PROGRESS ──────────────────────────────────────────────
function renderProgress() {
  const el    = document.getElementById('proj-progress');
  const total = STATE.athletes.length;
  if (!total) { el.innerHTML = '<div style="color:var(--text3);font-family:var(--font-h);letter-spacing:2px;font-size:13px">BRAK ZAWODNIKÓW</div>'; return; }

  const events = [
    { id:'k1', label:'🪢 LINA' },
    { id:'k2', label:'🏃 BTS' },
    { id:'k3', label:'⚡ 15×15m' },
    { id:'k4', label:'🏅 1000m' },
  ];

  el.innerHTML = events.map(ev => {
    const done = STATE.athletes.filter(a => hasAnyResult(a.id, ev.id)).length;
    const pct  = Math.round(done / total * 100);
    const fillColor = pct === 100 ? 'var(--green)' : 'var(--accent)';
    return `<div class="prog-item">
      <div class="prog-label">
        <span>${ev.label}</span>
        <span class="prog-count">${done}/${total}</span>
      </div>
      <div class="prog-bar">
        <div class="prog-fill" style="width:${pct}%;background:${fillColor}"></div>
      </div>
      <div class="prog-pct">${pct}%</div>
    </div>`;
  }).join('');
}

// ── INDIV RANKING ─────────────────────────────────────────
const _catScrollRAFs = {};

function getAthleteTime(athleteId, ev) {
  const r    = (STATE.results[athleteId] || {})[ev]  || [];
  const disq = (STATE.disq[athleteId]    || {})[ev]  || [];
  const dnf  = (STATE.dnf[athleteId]     || {})[ev]  || [];
  // K3: sprawdź też k3s2
  let t = null;
  if (ev === 'k3') {
    const r2    = (STATE.results[athleteId] || {}).k3s2 || [];
    const disq2 = (STATE.disq[athleteId]    || {}).k3s2 || [];
    const dnf2  = (STATE.dnf[athleteId]     || {}).k3s2 || [];
    const t1 = getBestValidTime(r,    disq,  dnf);
    const t2 = getBestValidTime(r2,   disq2, dnf2);
    t = t1 && t2 ? Math.min(t1, t2) : (t1 || t2);
  } else {
    t = getBestValidTime(r, disq, dnf);
  }
  if (!t) return '—';
  if (ev === 'k4') {
    // format m:ss.s
    const m  = Math.floor(t / 60);
    const s  = (t % 60).toFixed(1).padStart(4, '0');
    return m + ':' + s;
  }
  return t.toFixed(1) + 's';
}

function buildTheadHTML(s) {
  const showK1 = !!s.showK1, showK2 = !!s.showK2, showK3 = !!s.showK3, showK4 = !!s.showK4;
  if (!showK1 && !showK2 && !showK3 && !showK4) return '';
  const thStyle = 'font-family:var(--font-m);font-size:9px;color:var(--text3);text-align:right;padding:2px 6px 2px 0;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap';
  const cols = [
    '<th style="width:26px"></th>',
    '<th style="flex:1"></th>',
    showK1 ? `<th style="width:50px;${thStyle}">Lina</th>` : '',
    showK2 ? `<th style="width:50px;${thStyle}">BTS</th>` : '',
    showK3 ? `<th style="width:50px;${thStyle}">15×15</th>` : '',
    showK4 ? `<th style="width:56px;${thStyle}">1000m</th>` : '',
    '<th style="width:46px"></th>',
  ].join('');
  return `<table style="width:100%;border-collapse:collapse;table-layout:fixed;flex-shrink:0"><thead><tr>${cols}</tr></thead></table>`;
}

function buildRowsHTML(shown, s) {
  const showK1 = !!s.showK1, showK2 = !!s.showK2, showK3 = !!s.showK3, showK4 = !!s.showK4;
  return shown.map((a, i) => {
    const rank  = i + 1;
    const rkCls = rank===1?'rk-1':rank===2?'rk-2':rank===3?'rk-3':'';
    const team  = STATE.teams.find(t => t.id == a.teamId);
    const tdStyle = 'text-align:right;padding-right:6px;font-family:var(--font-m);font-size:11px;color:var(--text2)';
    const extraCells = [
      showK1 ? `<td style="width:50px;${tdStyle}">${getAthleteTime(a.id,'k1')}</td>` : '',
      showK2 ? `<td style="width:50px;${tdStyle}">${getAthleteTime(a.id,'k2')}</td>` : '',
      showK3 ? `<td style="width:50px;${tdStyle}">${getAthleteTime(a.id,'k3')}</td>` : '',
      showK4 ? `<td style="width:56px;${tdStyle}">${getAthleteTime(a.id,'k4')}</td>` : '',
    ].join('');
    return `<tr style="${i%2===1 ? 'background:rgba(255,255,255,0.03)' : ''}">
      <td style="width:26px"><span class="rk-pos ${rkCls}">${rank}</span></td>
      <td><div class="rk-name">${a.name}</div><div class="rk-team">${team?.name||'—'}</div></td>
      ${extraCells}
      <td class="rk-pts">${a.pts.total||'—'}</td>
    </tr>`;
  }).join('');
}

function startCatInfiniteScroll(cat, speed) {
  if (_catScrollRAFs[cat]) cancelAnimationFrame(_catScrollRAFs[cat]);

  setTimeout(() => {
    const track = document.getElementById('scroll-track-' + cat);
    if (!track) return;

    // Użyj tylko listA — listB jest zbędna w tym podejściu
    const listA = track.querySelector('.scroll-list-a');
    if (!listA) return;

    const tbody = listA.querySelector('tbody');
    if (!tbody) return;

    // Zmierz wysokość jednego zestawu wierszy
    const origHTML  = tbody.innerHTML;
    const origH     = listA.offsetHeight;
    if (origH === 0) return;

    // Powiel wiersze: 3 kopie = środkowa to "widoczna", reset jest niewidoczny
    // Przy prędkości 20px/s i 3 kopiach mamy ~origH*3/20 sekund na pełny obrót
    // Dla 10 wierszy ~30px każdy = 300px * 3 / 20 = 45s, dla 20 wierszy = 90s
    const COPIES = Math.max(3, Math.ceil(120 * speed / origH) + 2); // min 2 minuty
    tbody.innerHTML = Array(COPIES).fill(origHTML).join('');

    // Ukryj listB — nie używamy
    const listB = track.querySelector('.scroll-list-b');
    if (listB) listB.style.display = 'none';

    // Poczekaj na reflow
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const totalH = listA.offsetHeight; // wysokość wszystkich kopii
        const oneH   = totalH / COPIES;   // wysokość jednego zestawu

        if (oneH === 0) return;

        let pos      = 0;
        let lastTime = null;

        function step(now) {
          if (!lastTime) { lastTime = now; }
          const delta = Math.min(now - lastTime, 50); // cap delta na 50ms (np. po nieaktywności karty)
          lastTime = now;

          pos += speed * delta / 1000;

          // Reset niewidoczny: gdy przewinęliśmy jeden pełny zestaw, cofnij o dokładnie oneH
          // Użytkownik nie widzi skoku bo wiersze się powtarzają
          if (pos >= oneH) pos -= oneH;

          track.style.transform = `translateY(-${pos}px)`;
          _catScrollRAFs[cat] = requestAnimationFrame(step);
        }

        _catScrollRAFs[cat] = requestAnimationFrame(step);
      });
    });
  }, 200);
}

function renderIndiv(s) {
  // Zatrzymaj stare animacje
  Object.keys(_catScrollRAFs).forEach(cat => {
    if (_catScrollRAFs[cat]) cancelAnimationFrame(_catScrollRAFs[cat]);
    delete _catScrollRAFs[cat];
  });

  const grid = document.getElementById('proj-cats-grid');
  const allCats = ['M35','M36','K35','K36'];
  const cats = allCats.filter(c => s.cats.includes(c));
  const doScroll = !!s.autoScroll;
  const speed = s.scrollSpeed || 20;

  const cols = cats.length <= 2 ? cats.length : 2;
  const gridRows = Math.ceil(cats.length / cols);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${gridRows}, 1fr)`;

  grid.innerHTML = cats.map(cat => {
    const athletes = STATE.athletes.filter(a => a.cat === cat)
      .map(a => ({ ...a, pts: getAthletePoints(a.id) }));
    const normal = athletes.filter(a => !a.pk).sort((a,b) => b.pts.total - a.pts.total);
    const shown  = (s.topN && s.topN > 0) ? normal.slice(0, s.topN) : normal;

    const emptyRow = `<tr><td colspan="2" style="text-align:center;color:var(--text3);font-size:12px;padding:12px">Brak wyników</td></tr>`;
    const rowsHTML = shown.length ? buildRowsHTML(shown, s) : emptyRow;

    if (doScroll && shown.length > 0) {
      const theadHTML = buildTheadHTML(s);
      return `<div class="cat-block" data-cat="${cat}">
        <div class="cat-block-header cat-${cat}">
          <span class="cat-block-title cat-color-${cat}">${cat}</span>
          <span class="cat-count">${normal.length} zaw.</span>
        </div>
        ${theadHTML}
        <div class="rank-table-wrap">
          <div class="rank-table-scroll-viewport">
            <div class="rank-table-scroll-track" id="scroll-track-${cat}">
              <table class="scroll-list-a" style="width:100%;border-collapse:collapse;table-layout:fixed"><tbody>${rowsHTML}</tbody></table>
              <table class="scroll-list-b" style="width:100%;border-collapse:collapse;table-layout:fixed;position:absolute;left:0;right:0;top:0"><tbody>${rowsHTML}</tbody></table>
            </div>
          </div>
        </div>
      </div>`;
    }

    // Tryb statyczny
    const theadHTMLstatic = buildTheadHTML(s);
    return `<div class="cat-block" data-cat="${cat}">
      <div class="cat-block-header cat-${cat}">
        <span class="cat-block-title cat-color-${cat}">${cat}</span>
        <span class="cat-count">${normal.length} zaw.</span>
      </div>
      ${theadHTMLstatic}
      <div class="rank-table-wrap">
        <div style="flex:1;min-height:0;overflow-y:auto;scrollbar-width:none">
          <table style="width:100%;border-collapse:collapse;table-layout:fixed">
            <tbody>${rowsHTML}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  // Uruchom scrollowanie po wyrenderowaniu DOM
  if (doScroll) {
    cats.forEach(cat => startCatInfiniteScroll(cat, speed));
  }
}

// ── TEAM RANKING ──────────────────────────────────────────
function renderTeam(s) {
  const el = document.getElementById('proj-team');
  if (!STATE.teams.length) {
    el.innerHTML = `<div class="proj-section-title">🏟 Klasyfikacja drużynowa</div>
      <div style="color:var(--text3);font-size:13px;padding:20px;text-align:center">Brak drużyn</div>`;
    return;
  }

  let teams = STATE.teams.map(team => {
    const score = getTeamScore(team.id);
    return { ...team, ...score };
  }).sort((a,b) => b.total - a.total);

  if (s && s.maxTeams) teams = teams.slice(0, s.maxTeams);

  const maxPts = teams[0]?.total || 1;

  let html = `<div class="proj-section-title">🏟 Klasyfikacja drużynowa</div>
    <div class="team-cards-wrap" id="team-cards-wrap" style="gap:6px">`;

  teams.forEach((t, i) => {
    const rank  = i + 1;
    const rkCls = rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'';
    const barW  = maxPts > 0 ? (t.total / maxPts * 100).toFixed(1) : 0;
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';

    html += `<div class="team-card" style="border-color:${rank<=3?'var(--border2)':'var(--border)'}">
      <div class="team-card-top">
        <span class="team-rank ${rkCls}">${medal||rank}</span>
        <span class="team-name">${t.name}</span>
        <span class="team-pts">${t.total}</span>
      </div>
      <div class="team-bar"><div class="team-bar-fill" style="width:${barW}%"></div></div>
      <div class="team-meta">${t.menUsed.length}M + ${t.womenUsed.length}K</div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;

  // Skaluj wrapper żeby wszystkie karty mieściły się w kolumnie
  requestAnimationFrame(() => {
    const wrap = document.getElementById('team-cards-wrap');
    if (!wrap) return;
    const available = el.clientHeight - 28 - 8;
    const natural   = wrap.scrollHeight;
    if (natural > available && available > 0) {
      const scale = available / natural;
      wrap.style.transformOrigin = 'top left';
      wrap.style.transform = `scale(${scale})`;
      wrap.style.width = `${100 / scale}%`;
    } else {
      wrap.style.transform = '';
      wrap.style.width = '';
    }
  });
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('proj-clock').textContent = `${hh}:${mm}:${ss}`;
}

// ═══════════════════════════════════════════════════════════
// REAL-TIME SYNC
// ═══════════════════════════════════════════════════════════
function startRealtimeSync() {
  const activeSlot = localStorage.getItem('projektor_activeSlot') || SLOT_KEY;
  const db = getSupabase();
  db.channel('projektor_sync')
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'app_state', filter: `slot_id=eq.${activeSlot}` },
      (payload) => {
        try {
          STATE = JSON.parse(payload.new.state_json);
          renderSoft();
          setSyncStatus(true);
        } catch(e) { console.error('Realtime parse error:', e); }
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        setSyncStatus(true);
      }
    });
}

// Fallback polling co 15s (gdy realtime nie działa)
let _pollTimer = null;
function startPolling() {
  _pollTimer = setInterval(async () => {
    const ok = await loadState();
    if (ok) renderSoft();
  }, 15000);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async function init() {
  updateClock();
  setInterval(updateClock, 1000);

  const ok = await loadState();
  if (ok) {
    render();
  } else {
    document.getElementById('proj-cats-grid').innerHTML =
      '<div class="proj-loading" style="grid-column:1/3;color:var(--orange)">Brak danych — sprawdź połączenie</div>';
    document.getElementById('proj-team').innerHTML =
      '<div class="proj-loading" style="height:200px;color:var(--orange)">Brak danych</div>';
  }

  startRealtimeSync();
  startPolling();
})();
</script>
