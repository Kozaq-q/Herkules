<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herkules — MSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:      #0d0f0f;
  --bg2:     #141717;
  --bg3:     #1c2020;
  --bg4:     #232828;
  --border:  #2e3535;
  --border2: #3d4646;
  --text1:   #f0f2f2;
  --text2:   #c8cfcf;
  --text3:   #8a9898;
  --accent:  #e8d44d;
  --accent2: #b5a33a;
  --green:   #4caf82;
  --red:     #e05555;
  --blue:    #5b9bd5;
  --orange:  #e8944d;
  --font-h:  'Barlow Condensed', sans-serif;
  --font-b:  'Barlow', sans-serif;
  --font-m:  'JetBrains Mono', monospace;
  --radius:  4px;
  --radius-lg: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text1); font-family: var(--font-b); font-size: 14px; line-height: 1.5; min-height: 100vh; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; padding: 24px; }
.login-logo { font-family: var(--font-h); font-size: 52px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); line-height: 1; margin-bottom: 6px; }
.login-sub { font-family: var(--font-m); font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 44px; }
.login-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
.login-box-title { font-family: var(--font-h); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text1); padding: 12px 14px; font-family: var(--font-m); font-size: 18px; letter-spacing: 4px; text-align: center; transition: border-color .12s; }
.login-input:focus { outline: none; border-color: var(--accent); background: var(--bg4); }
.login-input.error { border-color: var(--red) !important; animation: shake .3s; }
.login-btn { width: 100%; margin-top: 12px; padding: 11px; font-family: var(--font-h); font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: var(--accent); color: #111; border: none; border-radius: var(--radius); cursor: pointer; transition: background .12s; }
.login-btn:hover { background: var(--accent2); }
.login-error { font-size: 12px; color: var(--red); margin-top: 8px; text-align: center; min-height: 16px; font-family: var(--font-m); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* HEADER */
.header { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 0 28px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: baseline; gap: 10px; }
.logo-name { font-family: var(--font-h); font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
.logo-sub { font-family: var(--font-m); font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-date { font-family: var(--font-m); font-size: 11px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 10px; }
.hdr-btn { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text3); font-family: var(--font-m); font-size: 10px; padding: 4px 10px; cursor: pointer; transition: color .12s, border-color .12s; white-space: nowrap; }
.hdr-btn:hover { color: var(--text1); border-color: var(--border2); }

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

/* TOOLBAR — przycisk + filtry */
.toolbar { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 22px; }
.add-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--accent); color: #111; border: none; border-radius: var(--radius-lg); padding: 11px 22px; font-family: var(--font-h); font-size: 14px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: background .12s, transform .12s; }
.add-cta:hover { background: var(--accent2); transform: translateY(-1px); }
.add-cta-icon { font-size: 18px; line-height: 1; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.filter-btn { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 8px 14px; font-family: var(--font-h); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); cursor: pointer; transition: all .12s; display: inline-flex; align-items: center; gap: 8px; }
.filter-btn:hover { color: var(--text1); border-color: var(--border2); }
.filter-btn.active { background: var(--bg3); color: var(--text1); border-color: var(--accent); }
.filter-count { font-family: var(--font-m); font-size: 10px; background: var(--bg3); border-radius: 10px; padding: 1px 7px; color: var(--text3); }
.filter-btn.active .filter-count { background: var(--accent); color: #111; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); border: 1px dashed var(--border); border-radius: var(--radius-lg); }
.empty-state-icon { font-size: 40px; opacity: .4; margin-bottom: 12px; }
.empty-state-title { font-family: var(--font-h); font-size: 18px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; color: var(--text3); }

/* GRID */
.tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

/* TILE */
.tile { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; transition: border-color .15s, transform .12s, box-shadow .15s; position: relative; cursor: default; }
.tile:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.25); }
.tile.disabled { opacity: .5; filter: grayscale(.4); }
.tile.disabled:hover { transform: none; box-shadow: none; border-color: var(--border); }
.tile.done { opacity: .55; }
.tile.done:hover { opacity: .8; }
.tile-bar { height: 4px; background: var(--type-color, var(--accent)); }
.tile-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; }
.tile-chip { font-family: var(--font-h); font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; border-radius: 3px; background: var(--type-bg, rgba(232,212,77,.1)); color: var(--type-color, var(--accent)); border: 1px solid var(--type-border, rgba(232,212,77,.3)); }
.tile-accent-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,.15); flex-shrink: 0; box-shadow: 0 0 0 2px var(--bg2); }
.tile-wip-badge { display: inline-block; font-family: var(--font-h); font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; background: rgba(232,148,77,.12); color: var(--orange); border: 1px solid rgba(232,148,77,.45); border-radius: 3px; cursor: help; }
.tile-status { display: flex; align-items: center; gap: 6px; font-family: var(--font-m); font-size: 10px; color: var(--text3); }
.tile-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.tile-status.active .dot { background: var(--green); animation: pulse 2s infinite; }
.tile-status.done .dot { background: var(--text3); }
.tile-status.empty .dot { background: var(--border2); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.tile-body { padding: 4px 16px 12px; flex: 1; }
.tile-city { font-family: var(--font-h); font-size: 26px; font-weight: 800; color: var(--text1); line-height: 1.1; margin-bottom: 4px; word-break: break-word; }
.tile-name { font-size: 12px; color: var(--text3); }

.tile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 12px 16px; background: rgba(0,0,0,.15); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.tile-stat { text-align: center; }
.tile-stat-num { font-family: var(--font-h); font-size: 22px; font-weight: 800; color: var(--text1); line-height: 1; }
.tile-stat-num.accent { color: var(--accent); }
.tile-stat-num.muted { color: var(--text3); }
.tile-stat-lbl { font-family: var(--font-h); font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

.tile-meta { padding: 8px 16px; font-size: 11px; color: var(--text3); font-family: var(--font-m); display: flex; gap: 8px; align-items: center; }
.tile-meta .sep { color: var(--border2); }

.tile-actions { display: flex; gap: 6px; padding: 10px 16px 14px; }
.tile-actions .btn { flex: 1; }

/* BUTTONS */
.btn { font-family: var(--font-h); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 12px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); border-radius: var(--radius); cursor: pointer; transition: background .12s, color .12s, border-color .12s; white-space: nowrap; }
.btn:hover { background: var(--bg4); color: var(--text1); border-color: var(--text3); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #111; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-danger { color: var(--red); border-color: rgba(224,85,85,.35); }
.btn-danger:hover { background: var(--red); color: #fff; border-color: var(--red); }
.btn-green { color: var(--green); border-color: rgba(76,175,130,.35); }
.btn-green:hover { background: rgba(76,175,130,.2); border-color: var(--green); }
.btn-type { background: var(--type-bg, var(--bg3)); color: var(--type-color, var(--text2)); border-color: var(--type-border, var(--border2)); }
.btn-type:hover { background: var(--bg4); }
.btn-sm { padding: 5px 10px; font-size: 10px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 28px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--font-h); font-size: 17px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text1); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-h); font-weight: 700; }
input[type="text"], input[type="date"], input[type="password"], select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text1); padding: 9px 11px; font-family: var(--font-b); font-size: 14px; transition: border-color .12s; }
input:focus, select:focus { outline: none; border-color: var(--accent); background: var(--bg4); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }

/* TYPE PICKER w modalu */
.type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.type-opt { background: var(--bg3); border: 2px solid var(--border2); border-radius: var(--radius); padding: 16px 14px; cursor: pointer; transition: border-color .15s, background .15s, transform .12s; position: relative; }
.type-opt:hover:not(.disabled) { background: var(--bg4); transform: translateY(-2px); }
.type-opt.selected { border-color: var(--type-color, var(--accent)); background: var(--type-bg, rgba(232,212,77,.05)); }
.type-opt.disabled { opacity: .45; cursor: not-allowed; filter: grayscale(.3); }
.type-opt-icon { width: 38px; height: 38px; border-radius: 5px; background: var(--type-bg, var(--bg4)); color: var(--type-color, var(--text2)); border: 1px solid var(--type-border, var(--border2)); display: flex; align-items: center; justify-content: center; font-family: var(--font-h); font-size: 13px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
.type-opt-name { font-family: var(--font-h); font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; color: var(--type-color, var(--text1)); }
.type-opt-desc { font-size: 11px; color: var(--text3); line-height: 1.4; }
.type-opt-badge { position: absolute; top: 8px; right: 8px; font-family: var(--font-m); font-size: 9px; padding: 2px 7px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 3px; color: var(--text3); letter-spacing: 1px; }

/* DELETE confirm input */
.delete-confirm-input { font-family: var(--font-m); letter-spacing: 3px; text-align: center; font-size: 16px; }

/* SPINNER */
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: currentColor; border-right-color: currentColor; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -2px; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .tiles { grid-template-columns: 1fr; }
  .toolbar { gap: 10px; }
  .add-cta { padding: 10px 16px; }
  .logo-sub { display: none; }
  .header-date { display: none; }
  .main { padding: 18px 14px 50px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">⬡ Herkules</div>
  <div class="login-sub">Military Sports System</div>
  <div class="login-box">
    <div class="login-box-title">Hasło dostępu</div>
    <input class="login-input" type="password" id="login-input" placeholder="••••••••" autocomplete="current-password" />
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">Zaloguj →</button>
  </div>
</div>

<!-- HEADER -->
<header class="header" id="main-header" style="display:none;">
  <div class="logo">
    <span class="logo-name">⬡ Herkules</span>
    <span class="logo-sub">Military Sports System</span>
  </div>
  <div class="header-right">
    <div id="sync-indicator" style="display:flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:10px;color:var(--text3);padding:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);">
      <span id="sync-dot" style="width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;"></span>
      <span id="sync-label">—</span>
    </div>
    <div class="header-date" id="header-date"></div>
    <button class="hdr-btn" onclick="openChangePassword()">⚙ Hasło</button>
    <button class="hdr-btn" onclick="doLogout()">⏻ Wyloguj</button>
  </div>
</header>

<!-- MAIN -->
<div class="main" id="main-content" style="display:none;">

  <div class="toolbar">
    <button class="add-cta" onclick="openNewModal()"><span class="add-cta-icon">＋</span>Nowe zawody</button>
    <div class="filters" id="filters"></div>
  </div>

  <div id="tiles-area">
    <div class="tiles" id="tiles"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-state-icon">⬡</div>
      <div class="empty-state-title">Brak zawodów</div>
      <div class="empty-state-sub">Kliknij <strong>+ Nowe zawody</strong> aby utworzyć pierwsze.</div>
    </div>
  </div>

</div>

<!-- MODAL: NOWE ZAWODY -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-title">Nowe zawody</div>
    <div class="form-group">
      <label>Typ zawodów</label>
      <div class="type-grid" id="type-grid"></div>
    </div>
    <div class="form-group">
      <label>Miasto / lokalizacja</label>
      <input type="text" id="new-city" placeholder="np. Warszawa" />
    </div>
    <div class="form-group">
      <label>Nazwa / jednostka (opcjonalnie)</label>
      <input type="text" id="new-name" placeholder="np. 18. Dywizja Zmechanizowana" />
    </div>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="new-date" />
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeNewModal()">Anuluj</button>
      <button class="btn btn-primary" id="new-create-btn" onclick="createSlot()">Utwórz zawody →</button>
    </div>
  </div>
</div>

<!-- MODAL: USUŃ ZAWODY -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal" style="max-width:420px;">
    <div class="modal-title" style="color:var(--red);">⚠ Usuń zawody</div>
    <div id="delete-info" style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6;"></div>
    <div class="form-group">
      <label>Wpisz <strong style="color:var(--red);">RESET</strong> aby potwierdzić</label>
      <input type="text" id="delete-confirm-input" class="delete-confirm-input" placeholder="RESET" autocomplete="off"
        oninput="document.getElementById('delete-confirm-btn').disabled = this.value.trim().toUpperCase() !== 'RESET';" />
    </div>
    <div id="delete-error" style="font-size:12px;color:var(--red);min-height:16px;font-family:var(--font-m);"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDeleteModal()">Anuluj</button>
      <button class="btn btn-danger" id="delete-confirm-btn" disabled onclick="confirmDelete()">Usuń bezpowrotnie</button>
    </div>
  </div>
</div>

<!-- MODAL: ZMIEŃ HASŁO -->
<div class="modal-overlay" id="modal-password">
  <div class="modal" style="max-width:360px;">
    <div class="modal-title">Zmień hasło</div>
    <div class="form-group">
      <label>Aktualne hasło</label>
      <input type="password" id="pw-current" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Nowe hasło</label>
      <input type="password" id="pw-new" placeholder="min. 4 znaki" />
    </div>
    <div class="form-group">
      <label>Powtórz nowe hasło</label>
      <input type="password" id="pw-confirm" placeholder="••••••••" />
    </div>
    <div id="pw-error" style="font-size:12px;color:var(--red);min-height:16px;font-family:var(--font-m);margin-top:4px;"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closePasswordModal()">Anuluj</button>
      <button class="btn btn-primary" onclick="savePassword()">Zapisz hasło</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// COMPETITION_TYPES — rejestr typów konkurencji (extensible)
// Dodanie nowej konkurencji: dopisz wpis tutaj, reszta panelu się dostosuje.
// ═══════════════════════════════════════════════════════════════
const COMPETITION_TYPES = {
  'wielobój': {
    label: 'Wielobój',
    short: 'WB',
    icon: '4×',
    color: '#5b9bd5',         // blue
    colorBg: 'rgba(91,155,213,.12)',
    colorBorder: 'rgba(91,155,213,.35)',
    desc: '4 konkurencje · M/K · 35/36',
    storageKey: 'zawody_slot_',
    legacyType: 'czworboj',   // migracja: stare slotty z type='czworboj' będą czytane jako 'wielobój'
    enabled: true,
    open: function(panelId, slot) {
      const czworId = ensureCzworSlot(panelId, slot);
      localStorage.setItem('zawody_active_slot', czworId);
      window.location.href = 'index.html';
    },
    fallbackLocalStats: function(slot) {
      const czworId = localStorage.getItem('herkules_czwor_map_' + slot.id) || ('panel_' + slot.id);
      const raw = localStorage.getItem('zawody_slot_' + czworId);
      if (!raw) return null;
      try {
        const d = JSON.parse(raw);
        return {
          athletes: (d.athletes||[]).length,
          teams: (d.teams||[]).length,
          status: '',
          accentColor: (d.setup && d.setup.accent) || ''
        };
      } catch(e) { return null; }
    }
  },
  'osf': {
    label: 'OSF',
    short: 'OSF',
    icon: 'OSF',
    color: '#e8944d',         // orange
    colorBg: 'rgba(232,148,77,.12)',
    colorBorder: 'rgba(232,148,77,.35)',
    desc: 'Tor przeszkód · 2 serie · L/P · M/K',
    storageKey: 'osf_slot_',
    enabled: true,
    open: function(panelId) {
      window.location.href = 'osf.html?slot=' + panelId;
    },
    fallbackLocalStats: function(slot) {
      const raw = localStorage.getItem('osf_slot_' + slot.id);
      if (!raw) return null;
      try {
        const d = JSON.parse(raw);
        const ath = (d.athletes||[]);
        return {
          athletes: ath.length,
          teams: new Set(ath.map(a=>a.team).filter(Boolean)).size,
          status: '',
          accentColor: (d.setup && d.setup.accentColor) || ''
        };
      } catch(e) { return null; }
    }
  },
  'patrol': {
    label: 'Bieg patrolowy',
    short: 'PTR',
    icon: 'PTR',
    color: '#4caf82',         // green
    colorBg: 'rgba(76,175,130,.12)',
    colorBorder: 'rgba(76,175,130,.35)',
    desc: 'Bieg + OSF + strzelanie · M/K · indywidualny',
    storageKey: 'patrol_slot_',
    enabled: true,
    wip: true,                // W TRAKCIE PRAC — działa, ale nie wszystkie funkcje gotowe
    open: function(panelId) {
      window.location.href = 'patrol.html?slot=' + panelId;
    },
    fallbackLocalStats: function(slot) {
      const raw = localStorage.getItem('patrol_slot_' + slot.id);
      if (!raw) return null;
      try {
        const d = JSON.parse(raw);
        const ath = (d.athletes||[]);
        return {
          athletes: ath.length,
          teams: new Set(ath.map(a=>a.team).filter(Boolean)).size,
          status: '',
          accentColor: (d.setup && d.setup.accentColor) || ''
        };
      } catch(e) { return null; }
    }
  }
};

// Resolver: zwraca config dla typu, z migracją 'czworboj' → 'wielobój'
function resolveType(rawType) {
  if (COMPETITION_TYPES[rawType]) return rawType;
  // Migracja legacy
  for (const k in COMPETITION_TYPES) {
    if (COMPETITION_TYPES[k].legacyType === rawType) return k;
  }
  return null;
}

const AUTH_KEY    = 'herkules_pw_hash';
const SESSION_KEY = 'herkules_session';
const SESSION_EXP = 'herkules_session_exp';
const DEFAULT_PW  = 'herk3214!';
const SESSION_TTL = 6 * 60 * 60 * 1000;

function hashPw(pw) {
  let h = 0x811c9dc5;
  for (let i = 0; i < pw.length; i++) { h ^= pw.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
  return h.toString(16);
}

function getStoredHash() { return localStorage.getItem(AUTH_KEY) || hashPw(DEFAULT_PW); }

function isLoggedIn() {
  if (sessionStorage.getItem(SESSION_KEY) !== 'ok') return false;
  const exp = parseInt(sessionStorage.getItem(SESSION_EXP) || '0');
  if (Date.now() > exp) { sessionStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_EXP); return false; }
  return true;
}

function setSession() {
  sessionStorage.setItem(SESSION_KEY, 'ok');
  sessionStorage.setItem(SESSION_EXP, String(Date.now() + SESSION_TTL));
}

function doLogin() {
  const val = document.getElementById('login-input').value;
  const input = document.getElementById('login-input');
  const err   = document.getElementById('login-error');
  if (hashPw(val) === getStoredHash()) {
    setSession(); showApp();
  } else {
    err.textContent = 'Nieprawidłowe hasło';
    input.classList.add('error'); input.value = '';
    setTimeout(() => { input.classList.remove('error'); err.textContent = ''; }, 1800);
    input.focus();
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_EXP);
  document.getElementById('main-header').style.display  = 'none';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-input').value = '';
  document.getElementById('login-input').focus();
}

  document.getElementById('pw-current').value = '';

  document.getElementById('pw-confirm').value = '';
  document.getElementById('pw-error').textContent = '';

  setTimeout(() => document.getElementById('pw-current').focus(), 50);
}

function closePasswordModal() { document.getElementById('modal-password').classList.remove('open'); }

function savePassword() {
  const cur = document.getElementById('pw-current').value;
  const nw  = document.getElementById('pw-new').value;
  const con = document.getElementById('pw-confirm').value;
  const err = document.getElementById('pw-error');
  if (hashPw(cur) !== getStoredHash()) { err.textContent = 'Aktualne hasło jest nieprawidłowe'; return; }
  if (nw.length < 4) { err.textContent = 'Nowe hasło musi mieć min. 4 znaki'; return; }
  if (nw !== con)    { err.textContent = 'Hasła nie są identyczne'; return; }
  localStorage.setItem(AUTH_KEY, hashPw(nw));
  closePasswordModal();
  alert('Hasło zostało zmienione.');
}

// Migracja typu: 'czworboj' → 'wielobój' w obiekcie slotu (zwraca true jeśli zmieniono)

// Zapis slotu: localStorage + Supabase. Zwraca Promise → można czekać na chmurę.
async function saveSlot(slot) {
  localStorage.setItem('herkules_slot_' + slot.id, JSON.stringify(slot));
  const { error } = await getSB().from(SB_TABLE).upsert({
    slot_id: String(slot.id),
    slot_json: JSON.stringify(slot),
    updated_at: new Date().toISOString()
  }, { onConflict: 'slot_id' });
  if (error) throw new Error(error.message);
}

async function deleteSlot(id) {
  localStorage.removeItem('herkules_slot_' + id);
  localStorage.removeItem('zawody_slot_' + id);
  localStorage.removeItem('osf_slot_' + id);
  saveSlotIds(getSlotIds().filter(x => x !== id));
  const { error } = await getSB().from(SB_TABLE).delete().eq('slot_id', String(id));
  if (error) throw new Error(error.message);
}

// Wczytaj sloty z Supabase — chmura jest jedynym źródłem prawdy
// Migracja typów (czworboj → wielobój) wykonywana inline, jeśli slot wymaga update
let _lastSyncUpdatedAt = '';
async function syncSlotsFromCloud(force) {
  try {
    // Light check: pobierz tylko max(updated_at) — jeśli się nie zmieniło, nie ciągniemy całej listy
    if (!force && _lastSyncUpdatedAt) {
      const { data: probe } = await getSB().from(SB_TABLE).select('updated_at').order('updated_at', { ascending: false }).limit(1);
      if (probe && probe[0] && probe[0].updated_at === _lastSyncUpdatedAt) return; // bez zmian
    }

    const { data, error } = await getSB().from(SB_TABLE).select('slot_id, slot_json, updated_at').order('updated_at', { ascending: true });
    if (error) { console.warn('Supabase sync error:', error.message); return; }

    const cloudIds = [];
    let maxUpdatedAt = '';
    const slotsToMigrate = [];
    (data || []).forEach(row => {
      try {
        const slot = JSON.parse(row.slot_json);
        const id   = slot.id;
        cloudIds.push(id);
        if (row.updated_at && row.updated_at > maxUpdatedAt) maxUpdatedAt = row.updated_at;
        // Migracja typu — jeśli zmienił się, zapisz z powrotem
        if (migrateSlotType(slot)) slotsToMigrate.push(slot);
        localStorage.setItem('herkules_slot_' + id, JSON.stringify(slot));
      } catch(e) {}
    });

    if (maxUpdatedAt) _lastSyncUpdatedAt = maxUpdatedAt;

    // Usuń z lokalnego cache te które wypadły z chmury
    const prevIds = getSlotIds();
    prevIds.forEach(id => {
      if (!cloudIds.includes(id) && !cloudIds.includes(String(id))) {
        localStorage.removeItem('herkules_slot_' + id);
      }
    });

    saveSlotIds(cloudIds);

    // Zapisz zmigrowane slotty z powrotem do chmury (fire-and-forget — nie blokuje renderu)
    if (slotsToMigrate.length) {
      slotsToMigrate.forEach(s => { saveSlot(s).catch(e => console.warn('Migration save error:', e.message)); });
    }
  } catch(e) { console.warn('syncSlotsFromCloud exception:', e); }
}

// Statystyki slotu — najpierw z meta (chmura, każde urządzenie), fallback lokalny localStorage
function getSlotStats(slot) {
  const typeKey = resolveType(slot.type);
  const cfg = COMPETITION_TYPES[typeKey];
  if (slot.meta && typeof slot.meta === 'object') {
    return {
      athletes: slot.meta.athletes || 0,
      teams: slot.meta.teams || 0,
      status: slot.meta.status || '',
      accentColor: slot.meta.accentColor || '',
      fromMeta: true
    };
  }
  // Fallback z localStorage (tylko gdy ten komputer otwierał slot wcześniej)
  if (cfg && cfg.fallbackLocalStats) {
    const local = cfg.fallbackLocalStats(slot);
    if (local) return { ...local, accentColor: local.accentColor || '', fromMeta: false };
  }
  return { athletes: 0, teams: 0, status: '', accentColor: '', fromMeta: false };
}

function showSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  if (status === 'syncing') {
    dot.style.background = 'var(--accent)';
    lbl.textContent = 'sync...';
  } else if (status === 'ok') {
    dot.style.background = 'var(--green)';
    lbl.textContent = 'zsync.';
    setTimeout(() => { dot.style.background = 'var(--text3)'; lbl.textContent = 'online'; }, 2000);
  } else {
    dot.style.background = 'var(--red)';
    lbl.textContent = 'offline';
  }
}

// REALTIME + POLLING
// ═══════════════════════════════════════════════════════════════
let _startRtChannel = null;
let _rtHealthy = false;
let _pollTimer = null;

function startSlotsRealtime() {
  if (_startRtChannel) return;
  _startRtChannel = getSB()
    .channel('herkules_slots_panel')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: SB_TABLE },
      () => { syncSlotsFromCloud(true).then(() => render()); }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        _setRtHealthy(true);
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        _setRtHealthy(false);
        getSB().removeChannel(_startRtChannel);
        _startRtChannel = null;
        setTimeout(startSlotsRealtime, 3000);
      }
    });
}

function _setRtHealthy(h) {
  if (_rtHealthy === h) return;
  _rtHealthy = h;
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  _startPolling();
}

function _startPolling() {
  if (_pollTimer) return;
  // Adaptive: 10s gdy RT healthy, 3s gdy padł
  const interval = _rtHealthy ? 10000 : 3000;
  _pollTimer = setInterval(() => {
    syncSlotsFromCloud(false).then(needsRender => render()).catch(() => {});
  }, interval);
}

// RENDER — kafelki + filtry
// ═══════════════════════════════════════════════════════════════
let _activeFilter = 'all'; // 'all' | typeKey | 'done'

function renderFilters() {
  const all = getAllSlots();
  const byType = {};
  let doneCount = 0;
  all.forEach(s => {
    if (s.done) { doneCount++; return; }
    const t = resolveType(s.type);
    if (t) byType[t] = (byType[t] || 0) + 1;
  });
  const totalActive = all.filter(s => !s.done).length;

  const filtersEl = document.getElementById('filters');
  let html = '';
  html += filterBtn('all', 'Wszystkie', totalActive);
  Object.keys(COMPETITION_TYPES).forEach(t => {
    const cfg = COMPETITION_TYPES[t];
    if (!cfg.enabled && !byType[t]) return; // nie pokazuj filtra dla wyłączonych pustych
    html += filterBtn(t, cfg.label, byType[t] || 0, cfg);
  });
  if (doneCount > 0) html += filterBtn('done', 'Zakończone', doneCount);
  filtersEl.innerHTML = html;
}

function filterBtn(key, label, count, cfg) {
  const active = _activeFilter === key ? ' active' : '';
  const styleVars = cfg ? ('--type-color:' + cfg.color + ';--type-bg:' + cfg.colorBg + ';--type-border:' + cfg.colorBorder + ';') : '';
  return '<button class="filter-btn' + active + '" style="' + styleVars + '" onclick="setFilter(\'' + esc(key) + '\')">' +
    esc(label) +
    '<span class="filter-count">' + count + '</span>' +
    '</button>';
}

function setFilter(key) {
  _activeFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  // Re-render filters (counts mogły się zmienić) i tiles
  renderFilters();
  render();
}

function getAllSlots() {
  return getSlotIds().map(id => getSlot(id)).filter(Boolean);
}

function render() {
  const all = getAllSlots();
  // Filtruj
  let visible;
  if (_activeFilter === 'all') {
    visible = all.filter(s => !s.done);
  } else if (_activeFilter === 'done') {
    visible = all.filter(s => s.done);
  } else {
    visible = all.filter(s => !s.done && resolveType(s.type) === _activeFilter);
  }

  // Sortuj: najnowsze _updated/created na górze
  visible.sort((a, b) => {
    const ta = a._updated || a.created || '';
    const tb = b._updated || b.created || '';
    return tb.localeCompare(ta);
  });

  const tilesEl = document.getElementById('tiles');
  const emptyEl = document.getElementById('empty-state');
  if (!visible.length) {
    tilesEl.innerHTML = '';
    emptyEl.style.display = 'block';
    if (_activeFilter !== 'all' && _activeFilter !== 'done') {
      emptyEl.querySelector('.empty-state-title').textContent = 'Brak zawodów';
      emptyEl.querySelector('.empty-state-sub').innerHTML = 'Brak zawodów typu <strong>' + (COMPETITION_TYPES[_activeFilter]?.label || '?') + '</strong>.';
    } else if (_activeFilter === 'done') {
      emptyEl.querySelector('.empty-state-title').textContent = 'Brak zakończonych';
      emptyEl.querySelector('.empty-state-sub').textContent = 'Zakończone zawody pojawią się tutaj.';
    } else {
      emptyEl.querySelector('.empty-state-title').textContent = 'Brak zawodów';
      emptyEl.querySelector('.empty-state-sub').innerHTML = 'Kliknij <strong>+ Nowe zawody</strong> aby utworzyć pierwsze.';
    }
    return;
  }
  emptyEl.style.display = 'none';
  tilesEl.innerHTML = visible.map(tileHTML).join('');
}

function tileHTML(slot) {
  const typeKey = resolveType(slot.type);
  const cfg = COMPETITION_TYPES[typeKey];
  const done = !!slot.done;
  const stats = getSlotStats(slot);
  const hasData = stats.athletes > 0;

  const color = cfg ? cfg.color : 'var(--text3)';
  const colorBg = cfg ? cfg.colorBg : 'var(--bg3)';
  const colorBorder = cfg ? cfg.colorBorder : 'var(--border)';
  const styleVars = '--type-color:' + color + ';--type-bg:' + colorBg + ';--type-border:' + colorBorder + ';';

  let statusCls = 'empty';
  let statusTxt = 'Puste';
  if (done) { statusCls = 'done'; statusTxt = 'Zakończone' + (slot.doneAt ? ' · ' + new Date(slot.doneAt).toLocaleDateString('pl-PL') : ''); }
  else if (hasData) { statusCls = 'active'; statusTxt = stats.status || 'Aktywne'; }

  // Akcje
  let actions = '';
  if (cfg && cfg.enabled) {
    actions += '<button class="btn btn-type" onclick="openSlot(\'' + esc(slot.id) + '\')">→ Otwórz</button>';
  } else {
    actions += '<button class="btn" disabled title="W przygotowaniu">→ Wkrótce</button>';
  }
  if (done) {
    actions += '<button class="btn btn-green btn-sm" onclick="reactivateSlot(\'' + esc(slot.id) + '\', event)">↺ Wznów</button>';
  }
  actions += '<button class="btn btn-danger btn-sm" onclick="askDeleteSlot(\'' + esc(slot.id) + '\', event)">✕</button>';

  const dateDisplay = slot.date ? new Date(slot.date + 'T00:00:00').toLocaleDateString('pl-PL', { day:'2-digit', month:'2-digit', year:'2-digit' }) : '—';

  // Kolor akcentu zawodów (ustawiony przez sędziego w konfiguracji)
  // Nie pomyl z color typu — to dodatkowa identyfikacja konkretnych zawodów
  const accentDot = (stats.accentColor || (slot.meta && slot.meta.accentColor))
    ? '<span class="tile-accent-dot" style="background:' + esc(stats.accentColor || slot.meta.accentColor) + ';" title="Kolor akcentu zawodów"></span>'
    : '';

  const wipBadge = (cfg && cfg.wip && !done)
    ? '<span class="tile-wip-badge" title="Konkurencja w trakcie prac — niektóre funkcje mogą jeszcze nie działać">⚠ w trakcie prac</span>'
    : '';

  return '<div class="tile' + (done ? ' done' : '') + (cfg && !cfg.enabled ? ' disabled' : '') + '" style="' + styleVars + '">' +
    '<div class="tile-bar"></div>' +
    '<div class="tile-head">' +
      '<span class="tile-chip-wrap" style="display:inline-flex;align-items:center;gap:6px;">' +
        '<span class="tile-chip">' + esc(cfg ? cfg.label : slot.type) + '</span>' +
        accentDot +
        wipBadge +
      '</span>' +
      '<span class="tile-status ' + statusCls + '"><span class="dot"></span>' + esc(statusTxt) + '</span>' +
    '</div>' +
    '<div class="tile-body">' +
      '<div class="tile-city">' + esc(slot.city || '—') + '</div>' +
      '<div class="tile-name">' + esc(slot.name || '') + '</div>' +
    '</div>' +
    '<div class="tile-stats">' +
      '<div class="tile-stat"><div class="tile-stat-num accent">' + stats.athletes + '</div><div class="tile-stat-lbl">Zawodnicy</div></div>' +
      '<div class="tile-stat"><div class="tile-stat-num">' + stats.teams + '</div><div class="tile-stat-lbl">Drużyny</div></div>' +
      '<div class="tile-stat"><div class="tile-stat-num muted" style="font-size:14px;font-family:var(--font-m);padding-top:4px;">' + dateDisplay + '</div><div class="tile-stat-lbl">Data</div></div>' +
    '</div>' +
    '<div class="tile-actions">' + actions + '</div>' +
  '</div>';
}

  if (!city) { document.getElementById('new-city').focus(); return; }
  if (!_newSelectedType || !COMPETITION_TYPES[_newSelectedType] || !COMPETITION_TYPES[_newSelectedType].enabled) {
    alert('Wybierz typ zawodów.');
    return;
  }
  const btn = document.getElementById('new-create-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Tworzenie...';

  const newId = generateSlotId();
  const slot  = { id: newId, type: _newSelectedType, city, name, date, created: new Date().toISOString(), _updated: new Date().toISOString() };
  try {
    await saveSlot(slot);
    const ids = getSlotIds();
    saveSlotIds([...ids, newId]);
    closeNewModal();
    render();
    openSlot(newId);
  } catch(e) {
    alert('Błąd zapisu do chmury: ' + e.message + '\n\nSpróbuj ponownie.');
    btn.disabled = false;
    btn.textContent = 'Utwórz zawody →';
  }
}

function openSlot(id) {
  const slot = getSlot(id);
  if (!slot) return;
  const typeKey = resolveType(slot.type);
  const cfg = COMPETITION_TYPES[typeKey];
  if (!cfg) { alert('Nieznany typ konkurencji: ' + slot.type); return; }
  if (!cfg.enabled) { cfg.open(id, slot); return; }  // pokaże alert "w przygotowaniu"
  cfg.open(id, slot);
}

// Wsteczna kompatybilność: tworzenie pliku slotu czwórbóju przy pierwszym otwarciu
function ensureCzworSlot(panelId, slot) {
  const mapKey = 'herkules_czwor_map_' + panelId;
  let czworId  = localStorage.getItem(mapKey);
  if (czworId) return czworId;
  try {
    const idx = JSON.parse(localStorage.getItem('zawody_slots_index') || '[]');
    czworId = 'panel_' + panelId;
    if (!idx.find(s => s.id === czworId)) {
      idx.push({ id: czworId, createdAt: new Date().toISOString(), passwordHash: '' });
      localStorage.setItem('zawody_slots_index', JSON.stringify(idx));
      localStorage.setItem('zawody_slot_' + czworId, JSON.stringify({
        setup: { name: slot.name||'', date: slot.date||'', place: slot.city||'', org:'', days:2, teamLimitM:5, teamLimitK:3 },
        teams:[], athletes:[], results:{}, disq:{}, dnf:{}, series2:{}, k3s2:{}, scoreTablesByCat:{}, scoreTables:{}
      }));
    }
    localStorage.setItem(mapKey, czworId);
    return czworId;
  } catch(e) { return 'panel_' + panelId; }
}

async function reactivateSlot(id, e) {
  e.stopPropagation();
  const slot = getSlot(id);
  if (!slot) return;
  slot.done = false; delete slot.doneAt;
  slot._updated = new Date().toISOString();
  try { await saveSlot(slot); render(); renderFilters(); }
  catch(err) { alert('Błąd zapisu: ' + err.message); }
}

// ═══════════════════════════════════════════════════════════════
// USUWANIE — modal zamiast prompt()
// ═══════════════════════════════════════════════════════════════
let _deleteTargetId = null;

function askDeleteSlot(id, e) {
  e.stopPropagation();
  const slot = getSlot(id);
  if (!slot) return;
  _deleteTargetId = id;
  const typeKey = resolveType(slot.type);
  const cfg = COMPETITION_TYPES[typeKey];
  const label = (cfg ? cfg.label : slot.type) + ' — ' + (slot.city || '?');
  document.getElementById('delete-info').innerHTML =
    'Usuniesz na stałe zawody:<br><strong style="color:var(--text1);">' + esc(label) + '</strong><br>' +
    '<span style="color:var(--text3);font-size:12px;">Operacji nie da się cofnąć. Dane zostaną usunięte z chmury i wszystkich urządzeń.</span>';
  document.getElementById('delete-confirm-input').value = '';
  document.getElementById('delete-confirm-btn').disabled = true;
  document.getElementById('delete-error').textContent = '';
  document.getElementById('modal-delete').classList.add('open');
  setTimeout(() => document.getElementById('delete-confirm-input').focus(), 50);
}

function closeDeleteModal() {
  _deleteTargetId = null;
  document.getElementById('modal-delete').classList.remove('open');
}

async function confirmDelete() {
  if (!_deleteTargetId) return;
  // Podwójne sprawdzenie wartości inputa (na wypadek manipulacji DOM)
  const inputVal = (document.getElementById('delete-confirm-input').value || '').trim().toUpperCase();
  if (inputVal !== 'RESET') {
    document.getElementById('delete-error').textContent = 'Wpisz RESET aby potwierdzić.';
    return;
  }
  const btn = document.getElementById('delete-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Usuwanie...';
  try {
    await deleteSlot(_deleteTargetId);
    closeDeleteModal();
    render();
    renderFilters();
  } catch(e) {
    document.getElementById('delete-error').textContent = 'Błąd usuwania: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Usuń bezpowrotnie';
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g, '&#39;');
}

function formatDate() {
  const d = new Date();
  const days   = ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
  const months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

// Modal click-outside-to-close
['modal-new', 'modal-delete', 'modal-password'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeNewModal();
    closeDeleteModal();
    closePasswordModal();
  }
});
document.getElementById('login-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// BOOT
if (isLoggedIn()) { showApp(); }
else { setTimeout(() => document.getElementById('login-input').focus(), 100); }
</script>
