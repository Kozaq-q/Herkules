<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSF — Projektor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:     #0a0c0e;
  --bg2:    #10141a;
  --bg3:    #171c24;
  --bg4:    #1e242e;
  --border: #232b38;
  --border2:#2e3a4a;
  --text1:  #f4f6f8;
  --text2:  #c9d0db;
  --text3:  #6b7a90;
  --accent: #f0d060;
  --orange: #f09050;
  --green:  #50c890;
  --blue:   #60a8e8;
  --red:    #e85858;
  --male:   #60a8e8;
  --female: #e060b0;
  --font-h: 'Oswald', sans-serif;
  --font-b: 'DM Sans', sans-serif;
  --font-m: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text1); font-family: var(--font-b); height: 100vh; overflow: hidden; }

/* ── SPLASH ── */
#splash {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 16px;
}

/* ── HEADER ── */
#proj-header {
  background: var(--bg2);
  border-bottom: 3px solid var(--orange);
  padding: 0 28px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.proj-logo  { font-family: var(--font-h); font-size: 28px; font-weight: 700; letter-spacing: 4px; color: var(--orange); text-transform: uppercase; }
.proj-title { font-family: var(--font-b); font-size: 15px; font-weight: 500; color: var(--text2); flex: 1; text-align: center; letter-spacing: .3px; }
.proj-clock { font-family: var(--font-m); font-size: 19px; color: var(--text2); min-width: 100px; text-align: right; font-weight: 500; }
.sync-dot   { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
.sync-dot.off { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── PROGRESS BAR ── */
#proj-progress {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 7px 28px; display: flex; gap: 24px; align-items: center; flex-shrink: 0;
}
.prog-item { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.prog-label { font-family: var(--font-b); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); display: flex; justify-content: space-between; }
.prog-count { font-family: var(--font-m); font-size: 10px; color: var(--accent); }
.prog-bar   { background: var(--bg4); border-radius: 3px; height: 5px; overflow: hidden; }
.prog-fill  { height: 100%; border-radius: 3px; transition: width .6s ease; }

/* ── MAIN GRID ── */
#proj-main { display: grid; height: calc(100vh - 60px); overflow: hidden; }

/* ── SEKCJA ── */
.proj-section {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden; min-width: 0;
  background: var(--bg);
}
.proj-section:last-child { border-right: none; }

.section-header {
  font-family: var(--font-b); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid;
}
.section-header.ind-m { color: var(--male);   border-color: var(--male);   background: rgba(96,168,232,.07); }
.section-header.ind-k { color: var(--female); border-color: var(--female); background: rgba(224,96,176,.07); }
.section-header.team  { color: var(--orange); border-color: var(--orange); background: rgba(240,144,80,.07); }
.section-header.klas  { color: var(--accent); border-color: var(--accent); background: rgba(240,208,96,.07); }
.section-count { font-family: var(--font-m); font-size: 10px; color: var(--text3); font-weight: 400; }

/* ── SCROLL VIEWPORT ── */
.scroll-viewport { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.scroll-track { position: absolute; top: 0; left: 0; right: 0; will-change: transform; }

/* ── RANKING TABLE ── */
.rank-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.rank-table td { border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; }
/* Naprzemienne tła wierszy */
.rank-row.even td { background: var(--bg2); }
.rank-row.odd  td { background: var(--bg3); }
/* Podświetlenia top3 nadpisują naprzemienne */
.rank-row.top1 td { background: rgba(255,210,0,.09) !important; }
.rank-row.top2 td { background: rgba(200,210,220,.06) !important; }
.rank-row.top3 td { background: rgba(200,140,60,.06) !important; }
.rank-row.dsq  td { background: transparent !important; opacity: .4; }

/* Pozycja — stała szerokość, nie obcina */
.rank-pos { font-family: var(--font-h); font-weight: 700; text-align: center; width: 50px; padding: 10px 4px; white-space: nowrap; flex-shrink: 0; }
.rank-pos.p1 { color: #ffd700; }
.rank-pos.p2 { color: #c8d0d8; }
.rank-pos.p3 { color: #d4a060; }
.rank-pos.other { color: var(--text3); font-size: .85em; }

/* Kolumna nazwy — z paddingiem, wrap */
.rank-name-cell { padding: 10px 10px 10px 8px; overflow: hidden; }
.rank-name {
  font-family: var(--font-b); font-weight: 700;
  display: block;
  white-space: normal; word-break: break-word; line-height: 1.3;
  padding-right: 4px;
}
.rank-team-sub {
  font-family: var(--font-b); font-size: 11px; font-weight: 400;
  color: var(--text3); display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px; padding-right: 4px;
}

/* Czas — stała szerokość, nie obcina */
.rank-time-cell {
  font-family: var(--font-m); font-weight: 500; color: var(--green);
  text-align: right; white-space: nowrap;
  padding: 10px 12px 10px 6px;
  width: 90px; min-width: 90px;
}
.rank-sub-time  { font-size: 10px; color: var(--text3); display: block; text-align: right; margin-top: 2px; }
.rank-dsq-label { font-size: 10px; color: var(--red); font-family: var(--font-b); font-weight: 600; }

/* ── KLASYFIKACJA WIERSZE ── */
.klas-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); }
.klas-row.even { background: var(--bg2); }
.klas-row.odd  { background: var(--bg3); }
.klas-row.top1 { background: rgba(255,210,0,.09) !important; }
.klas-row.top2 { background: rgba(200,210,220,.06) !important; }
.klas-row.top3 { background: rgba(200,140,60,.06) !important; }
.klas-pos  { font-family: var(--font-h); font-weight: 700; width: 50px; min-width: 50px; text-align: center; padding: 10px 4px; flex-shrink: 0; }
.klas-name {
  font-family: var(--font-b); font-weight: 700;
  flex: 1; padding: 10px 10px;
  white-space: normal; word-break: break-word; line-height: 1.3; overflow: hidden;
}
.klas-pts-detail { font-family: var(--font-m); font-size: 10px; color: var(--text3); display: block; margin-top: 2px; font-weight: 400; }
.klas-score { font-family: var(--font-h); font-weight: 700; color: var(--accent); padding: 10px 14px; flex-shrink: 0; text-align: right; white-space: nowrap; min-width: 70px; }

/* ── NO DATA ── */
.no-data { text-align: center; padding: 48px 16px; color: var(--text3); font-family: var(--font-b); font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; }

/* ── LISTA STARTOWA ── */
#startlist-main {
  display: flex; flex-direction: column; overflow: hidden;
  height: calc(100vh - 60px); background: var(--bg);
}
.sl-gender-block { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.sl-gender-block + .sl-gender-block { border-top: 2px solid var(--border2); }
.sl-section-header {
  padding: 10px 24px; flex-shrink: 0;
  font-family: var(--font-b); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  border-bottom: 2px solid;
  display: flex; align-items: center; justify-content: space-between;
}
.sl-section-header.ind-m { color: var(--male);   border-color: var(--male);   background: rgba(96,168,232,.07); }
.sl-section-header.ind-k { color: var(--female); border-color: var(--female); background: rgba(224,96,176,.07); }
.sl-scroll-viewport { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.sl-scroll-track    { position: absolute; top: 0; left: 0; right: 0; will-change: transform; }

/* Wiersze par */
.sl-pair-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  min-height: 0;
}
.sl-pair-row.even { background: var(--bg2); }
.sl-pair-row.odd  { background: var(--bg3); }
.sl-pair-num {
  font-family: var(--font-h); font-weight: 700; color: var(--text3);
  text-align: center; padding: 12px 8px;
  width: 56px; min-width: 56px; flex-shrink: 0;
  border-right: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
}
.sl-athlete {
  flex: 1; padding: 10px 14px;
  display: flex; flex-direction: column; justify-content: center;
  min-width: 0; overflow: hidden;
}
.sl-athlete.lane-L { border-right: 1px solid var(--border2); }
.sl-athlete-name {
  font-family: var(--font-b); font-weight: 700;
  line-height: 1.25;
  white-space: normal; word-break: break-word;
}
.sl-athlete-sub {
  font-family: var(--font-b); font-size: 11px; font-weight: 400;
  color: var(--text3); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sl-lane-badge {
  font-family: var(--font-h); font-weight: 700; font-size: 11px;
  letter-spacing: 1px; padding: 2px 8px; border-radius: 3px;
  margin-bottom: 4px; display: inline-block; width: fit-content;
}
.sl-lane-badge.L { color: var(--male);   border: 1px solid var(--male);   background: rgba(96,168,232,.12); }
.sl-lane-badge.P { color: var(--female); border: 1px solid var(--female); background: rgba(224,96,176,.12); }
.sl-vs {
  width: 48px; min-width: 48px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-h); font-size: 12px; font-weight: 700;
  color: var(--text3); letter-spacing: 1px;
  border-left: 1px solid var(--border2);
  border-right: 1px solid var(--border2);
}
.sl-solo-badge {
  font-family: var(--font-h); font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--orange);
  border: 1px solid rgba(240,144,80,.4); padding: 2px 7px; border-radius: 3px;
  margin-left: 8px;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="font-family:var(--font-h);font-size:72px;font-weight:900;letter-spacing:6px;color:var(--orange);">OSF</div>
  <div style="font-family:var(--font-m);font-size:13px;color:var(--text3);letter-spacing:2px;">ŁĄCZENIE...</div>
</div>

<!-- PROJEKTOR -->
<div id="proj-app" style="display:none;flex-direction:column;height:100vh;">

  <header id="proj-header">
    <div class="proj-logo">OSF</div>
    <div class="proj-title" id="proj-title">—</div>
    <div style="display:flex;align-items:center;gap:12px;min-width:140px;justify-content:flex-end;">
      <span style="font-family:var(--font-m);font-size:10px;color:var(--text3);letter-spacing:1px;">
        <span class="sync-dot" id="sync-dot"></span><span id="sync-label">LIVE</span>
      </span>
      <span class="proj-clock" id="proj-clock"></span>
    </div>
  </header>

  <div id="proj-progress" style="display:none;"></div>

  <div id="proj-main"></div>
  <div id="startlist-main" style="display:none;"></div>

</div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://yrgkgzrpfemmthscrprf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlyZ2tnenJwZmVtbXRoc2NycHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjYxMTUsImV4cCI6MjA4OTAwMjExNX0.CKuLNRCyolMf6nPiWgOcE8j76Isjwc12bwQmIY5E8Do';
let db = null;
function getDB() {
  if (!db) db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return db;
}

let slotId    = null;
let state     = null;
let cfg       = null; // ustawienia projektora
let rtChannel = null;
const _scrollRAFs = {}; // per-section scroll animation frame ids

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
(async function() {
  const slotFromURL     = new URLSearchParams(window.location.search).get('slot');
  const slotFromStorage = localStorage.getItem('osf_proj_slot');
  const s = slotFromURL || slotFromStorage;

  if (!s) {
    document.getElementById('splash').innerHTML =
      '<div style="font-family:var(--font-h);font-size:72px;font-weight:900;letter-spacing:6px;color:var(--orange);">OSF</div>' +
      '<div style="font-family:var(--font-m);font-size:13px;color:var(--text3);letter-spacing:2px;margin-bottom:20px;">PROJEKTOR</div>' +
      '<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">Wpisz ID slotu:</div>' +
      '<input id="manual-slot" style="background:var(--bg2);border:1px solid var(--border2);border-radius:4px;color:var(--text1);font-family:var(--font-m);font-size:16px;padding:10px 18px;text-align:center;width:260px;" placeholder="osf_slot_1" />' +
      '<button onclick="manualConnect()" style="margin-top:12px;background:var(--orange);color:#111;font-family:var(--font-h);font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:4px;padding:10px 28px;cursor:pointer;">Połącz →</button>';
    return;
  }
  await boot(s);
})();

async function manualConnect() {
  const val = (document.getElementById('manual-slot').value || '').trim();
  if (!val) return;
  localStorage.setItem('osf_proj_slot', val);
  await boot(val);
}

// Tryb projektora: 'results' lub 'startlist'
const URL_PARAMS = new URLSearchParams(window.location.search);
const PROJ_MODE  = URL_PARAMS.get('mode') || 'results';

async function boot(s) {
  slotId = s;
  cfg = loadSettings();
  const ok = await loadState();
  if (!ok) {
    document.getElementById('splash').innerHTML =
      '<div style="font-family:var(--font-h);font-size:72px;font-weight:900;color:var(--orange);">OSF</div>' +
      '<div style="font-family:var(--font-m);font-size:13px;color:var(--red);letter-spacing:2px;margin-top:8px;">BŁĄD — brak danych dla: ' + s + '</div>' +
      '<button onclick="location.reload()" style="margin-top:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border2);border-radius:4px;padding:8px 20px;cursor:pointer;">Spróbuj ponownie</button>';
    return;
  }
  document.getElementById('splash').style.display = 'none';
  const app = document.getElementById('proj-app');
  app.style.display = 'flex';
  applyTitle();
  if (PROJ_MODE === 'startlist') {
    // Tryb listy startowej
    document.getElementById('proj-main').style.display = 'none';
    document.getElementById('proj-progress').style.display = 'none';
    document.getElementById('startlist-main').style.display = 'flex';
    document.getElementById('proj-header').style.borderBottomColor = 'var(--green)';
    // Pobierz series i gender z URL (priorytet) lub cfg
    const urlSeries = URL_PARAMS.get('series') || cfg.slSeries || 's1';
    const urlGender = URL_PARAMS.get('gender') || cfg.slGender || 'both';
    cfg.slSeries = urlSeries; cfg.slGender = urlGender;
    const titleEl = document.getElementById('proj-title');
    const seriesLabel = urlSeries === 's1' ? 'SERIA 1' : 'SERIA 2';
    const genderLabel = urlGender === 'M' ? ' — MĘŻCZYŹNI' : urlGender === 'K' ? ' — KOBIETY' : '';
    if (titleEl) titleEl.textContent = 'LISTA STARTOWA · ' + seriesLabel + genderLabel;
    renderStartlist();
  } else {
    buildLayout();
    renderAll();
  }
  startClock();
  startRealtime();

  // Polling co 2s jako fallback gdy WebSocket padnie lub Realtime zgubi event
  // Porównuje updated_at zamiast całego JSON — lekki i niezawodny
  let _lastUpdatedAt = '';
  setInterval(async () => {
    try {
      const { data } = await getDB().from('osf_state').select('state_json, updated_at').eq('slot_id', slotId).single();
      if (!data) return;
      if (data.updated_at && data.updated_at !== _lastUpdatedAt) {
        _lastUpdatedAt = data.updated_at;
        if (data.state_json) {
          state = JSON.parse(data.state_json);
          softRender();
          flashSync();
        }
      }
    } catch(e) {
      console.warn('Projektor poll error:', e);
    }
  }, 2000);

  // Reconnect realtime co 5s jeśli połączenie zerwane
  setInterval(() => {
    const dot = document.getElementById('sync-dot');
    if (dot && dot.classList.contains('off')) {
      if (rtChannel) { try { getDB().removeChannel(rtChannel); } catch(e) {} rtChannel = null; }
      startRealtime();
    }
  }, 5000);
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function loadSettings() {
  const defaults = {
    customTitle: '', showIndM: true, showIndK: true,
    showTeam: true, showKlas: true,
    showS1: true, showS2: true,
    topN: 0, scrollSpeed: 0, showProgress: true
  };
  try {
    const raw = localStorage.getItem('osf_proj_settings');
    if (raw) return { ...defaults, ...JSON.parse(raw) };
  } catch(e) {}
  return defaults;
}

// ═══════════════════════════════════════════════
// STATE / SUPABASE
// ═══════════════════════════════════════════════
async function loadState() {
  try {
    const { data, error } = await getDB().from('osf_state').select('state_json').eq('slot_id', slotId).single();
    if (error || !data) return false;
    state = JSON.parse(data.state_json);
    return true;
  } catch(e) { return false; }
}

function startRealtime() {
  if (rtChannel) return;
  rtChannel = getDB().channel('osf_proj_' + slotId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'osf_state', filter: 'slot_id=eq.' + slotId },
      (payload) => {
        try { state = JSON.parse(payload.new.state_json); softRender(); flashSync(); } catch(e) {}
      })
    .subscribe((status) => {
      const dot = document.getElementById('sync-dot');
      const lbl = document.getElementById('sync-label');
      if (status === 'SUBSCRIBED') {
        if (dot) dot.classList.remove('off');
        if (lbl) lbl.textContent = 'LIVE';
      } else {
        if (dot) dot.classList.add('off');
        if (lbl) lbl.textContent = 'OFFLINE';
        // Próba reconnectu po 3s
        setTimeout(() => {
          if (rtChannel) { try { getDB().removeChannel(rtChannel); } catch(e) {} rtChannel = null; }
          startRealtime();
        }, 3000);
      }
    });
}

function flashSync() {
  const lbl = document.getElementById('sync-label');
  if (!lbl) return;
  lbl.textContent = '↓ SYNC';
  setTimeout(() => { if (lbl) lbl.textContent = 'LIVE'; }, 1500);
}

function startClock() {
  const tick = () => {
    const n = new Date();
    document.getElementById('proj-clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
  };
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function parseTime(t) {
  if (!t) return Infinity;
  t = t.trim().replace(',','.');
  const col = t.match(/^(\d+):(\d{1,2})(?:\.(\d+))?$/);
  if (col) return parseInt(col[1])*60 + parseInt(col[2]) + (col[3] ? parseFloat('0.'+col[3]) : 0);
  const dec = t.match(/^(\d+)(?:\.(\d+))?$/);
  return dec ? parseFloat(t) : Infinity;
}

function getTime(id, ser) { return state.times?.[id]?.[ser] || ''; }
function isDisq(id, ser)  { return !!(state.disq?.[id]?.[ser]); }
function bestTime(id) {
  const s1 = getTime(id,'s1'), s2 = getTime(id,'s2');
  const ok1 = s1 && !isDisq(id,'s1'), ok2 = s2 && !isDisq(id,'s2');
  if (!ok1 && !ok2) return '';
  if (!ok1) return s2; if (!ok2) return s1;
  return parseTime(s1) <= parseTime(s2) ? s1 : s2;
}

function getTeams() { return [...new Set((state.athletes||[]).map(a=>a.team).filter(Boolean))].sort(); }
function getTeamAthletes(team) { return (state.athletes||[]).filter(a=>a.team===team && a.gender==='M'); }
function getTeamTime(team, ser) { return state.teamTimes?.[team]?.[ser] || ''; }
function isTeamDisq(team, ser)  { return !!(state.teamDisq?.[team]?.[ser]); }
function teamBestTimeEff(team) {
  const s1 = getTeamTime(team,'s1'), s2 = getTeamTime(team,'s2');
  const ok1 = s1 && !isTeamDisq(team,'s1'), ok2 = s2 && !isTeamDisq(team,'s2');
  if (!ok1 && !ok2) return '';
  if (!ok1) return s2; if (!ok2) return s1;
  return parseTime(s1) <= parseTime(s2) ? s1 : s2;
}
function teamMin()  { return state.setup?.teamMin  || 8; }
function teamCnt()  { return state.setup?.teamCount || 8; }
function mult()     { return state.setup?.teamMultiplier || 3; }

function calcIndPts(rank, N)        { return rank===1 ? N+1 : Math.max(0, N-rank+1); }
function calcTeamPts(rank, N, m)    { return rank===1 ? N*m+1 : Math.max(0, N*m-rank+1); }

// ── Wyniki indywidualne ──
function buildIndRows(gender) {
  const athletes = (state.athletes||[]).filter(a => a.gender === gender);

  let ranked = athletes.map(a => ({
    a, best: bestTime(a.id), bestSec: parseTime(bestTime(a.id)),
    s1: getTime(a.id,'s1'), s2: getTime(a.id,'s2'),
    s1d: isDisq(a.id,'s1'), s2d: isDisq(a.id,'s2'),
    allDsq: isDisq(a.id,'s1') && isDisq(a.id,'s2'),
    hasAnyResult: !!(getTime(a.id,'s1') || getTime(a.id,'s2'))
  }));

  // Filtruj: pokaż tylko tych co mają jakikolwiek wynik LUB DSQ; ukryj zupełnie bez wyniku
  const withResult = ranked.filter(r => r.hasAnyResult);
  // Sortuj: z wynikiem wg czasu, DSQ na końcu
  const withTime   = withResult.filter(r => r.bestSec < Infinity).sort((x,y) => x.bestSec - y.bestSec);
  const dsqOnly    = withResult.filter(r => r.bestSec === Infinity);
  const shown0     = [...withTime, ...dsqOnly];

  const topN = cfg.topN > 0 ? cfg.topN : shown0.length;
  const shown = shown0.slice(0, topN);
  const N = shown.length;

  const baseSize = N > 24 ? 13 : N > 16 ? 15 : N > 10 ? 17 : 19;
  const posSize  = N > 24 ? 17 : N > 16 ? 19 : 22;
  const subSize  = 10;

  let rank = 1;
  const rows = shown.map((r, rowIdx) => {
    const noBest = r.bestSec === Infinity;
    const isDsq  = noBest && r.hasAnyResult;
    const posIdx = (noBest || isDsq) ? 0 : rank;
    const posCls = posIdx===1?'p1':posIdx===2?'p2':posIdx===3?'p3':'other';
    const topCls = posIdx===1?'top1':posIdx===2?'top2':posIdx===3?'top3':'';
    const altCls = rowIdx % 2 === 0 ? 'even' : 'odd';
    const rowCls = [topCls, altCls, isDsq?'dsq':''].filter(Boolean).join(' ');
    const nameLen = (r.a.name || '').length;
    const fontSize = nameLen > 22 ? Math.max(11, baseSize - 3) + 'px'
                   : nameLen > 16 ? Math.max(12, baseSize - 1) + 'px'
                   : baseSize + 'px';
    const timeSize = N > 24 ? '13px' : N > 16 ? '15px' : '17px';

    let timeSub = '';
    if (cfg.showS1 && r.s1) timeSub += 'S1: ' + (r.s1d ? '<span class="rank-dsq-label">DSQ</span>' : r.s1);
    if (cfg.showS2 && r.s2) timeSub += (timeSub ? ' &nbsp; ' : '') + 'S2: ' + (r.s2d ? '<span class="rank-dsq-label">DSQ</span>' : r.s2);

    const posDisp = isDsq ? 'DSQ' : (noBest ? '—' : posIdx);
    if (!noBest) rank++;
    return `<tr class="rank-row ${rowCls}">
        <td class="rank-pos ${posCls}" style="font-size:${posSize}px;">${posDisp}</td>
        <td class="rank-name-cell">
          <span class="rank-name" style="font-size:${fontSize};">${esc(r.a.name)}</span>
          <span class="rank-team-sub" style="font-size:${subSize}px;">${esc(r.a.team)}</span>
        </td>
        <td class="rank-time-cell" style="font-size:${timeSize};">
          ${r.best || '<span style="color:var(--text3);">—</span>'}
          ${timeSub ? `<span class="rank-sub-time">${timeSub}</span>` : ''}
        </td>
      </tr>`;
  }).join('');

  return {
    html: `<table class="rank-table"><tbody>${rows||'<tr><td colspan="3" class="no-data">Brak wyników</td></tr>'}</tbody></table>`,
    count: shown.filter(r=>r.bestSec<Infinity).length + ' zaw.'
  };
}

function renderIndM() { const d = buildIndRows('M'); _renderSection('ind-m', d); }
function renderIndK() { const d = buildIndRows('K'); _renderSection('ind-k', d); }

// ── Bieg drużynowy ──
function buildTeamRows() {
  const teams = getTeams();
  let rows = teams.map(team => {
    const ok = getTeamAthletes(team).length >= teamMin();
    const s1 = getTeamTime(team,'s1'), s2 = getTeamTime(team,'s2');
    const s1d = isTeamDisq(team,'s1'), s2d = isTeamDisq(team,'s2');
    const best = teamBestTimeEff(team);
    return { team, ok, s1, s2, s1d, s2d, best, bestSec: parseTime(best) };
  }).sort((a,b) => {
    if (!a.ok&&b.ok) return 1; if (a.ok&&!b.ok) return -1;
    return a.bestSec - b.bestSec;
  });

  const topN = cfg.topN > 0 ? cfg.topN : rows.length;
  rows = rows.slice(0, topN);
  const baseFs  = rows.length > 16 ? 15 : rows.length > 10 ? 17 : 19;
  const posFs   = rows.length > 16 ? 18 : rows.length > 10 ? 22 : 26;
  const timeFs  = rows.length > 16 ? 14 : rows.length > 10 ? 16 : 18;
  const subSize = 11;

  // Filtruj: tylko z wynikiem lub DSQ; kwalifikujące bez czasu — ukryte
  const withResult2 = rows.filter(r => !r.ok || r.best);
  const topN2 = cfg.topN > 0 ? cfg.topN : withResult2.length;
  const shown2 = withResult2.slice(0, topN2);

  let rank = 1;
  const html = shown2.map((r, rowIdx) => {
    const isDsq  = !r.ok;
    const noBest = r.bestSec === Infinity;
    const posIdx = (isDsq || noBest) ? 0 : rank;
    const posCls = posIdx===1?'p1':posIdx===2?'p2':posIdx===3?'p3':'other';
    const topCls = posIdx===1?'top1':posIdx===2?'top2':posIdx===3?'top3':'';
    const altCls = rowIdx % 2 === 0 ? 'even' : 'odd';
    const rowCls = [topCls, altCls, isDsq?'dsq':''].filter(Boolean).join(' ');
    const nameLen = (r.team || '').length;
    const fontSize = nameLen > 22 ? Math.max(11, baseFs - 3) + 'px'
                   : nameLen > 16 ? Math.max(12, baseFs - 1) + 'px'
                   : baseFs + 'px';

    let timeSub = '';
    if (cfg.showS1 && r.s1) timeSub += 'S1: ' + (r.s1d ? '<span class="rank-dsq-label">DSQ</span>' : r.s1);
    if (cfg.showS2 && r.s2) timeSub += (timeSub?'&nbsp;&nbsp;':'') + 'S2: ' + (r.s2d ? '<span class="rank-dsq-label">DSQ</span>' : r.s2);

    const rankTxt = isDsq ? 'DSQ' : (noBest ? '—' : posIdx);
    if (!isDsq && !noBest) rank++;
    return `<tr class="rank-row ${rowCls}">
      <td class="rank-pos ${posCls}" style="font-size:${posFs}px;">${rankTxt}</td>
      <td class="rank-name-cell">
        <span class="rank-name" style="font-size:${fontSize};">${esc(r.team)}</span>
      </td>
      <td class="rank-time-cell" style="font-size:${timeFs}px;">
        ${r.best || '<span style="color:var(--text3);">—</span>'}
        ${timeSub ? `<span class="rank-sub-time">${timeSub}</span>` : ''}
      </td>
    </tr>`;
  }).join('');

  return {
    html: `<table class="rank-table"><tbody>${html||'<tr><td colspan="3" class="no-data">Brak wyników</td></tr>'}</tbody></table>`,
    count: shown2.filter(r=>r.ok&&r.best).length + ' drużyn'
  };
}

function renderTeam() { _renderSection('team', buildTeamRows()); }

// ── Klasyfikacja ──
function buildKlasRows() {
  const teams    = getTeams();
  const athletes = state.athletes || [];
  const menAll   = athletes.filter(a=>a.gender==='M' && !a.pk);
  const N_men    = menAll.length;
  const M        = mult();

  // pkt ind M
  const menRanked = menAll.map(a=>({ a, bestSec: parseTime(bestTime(a.id)) })).sort((x,y)=>x.bestSec-y.bestSec);
  const indPts = {}; teams.forEach(t=>indPts[t]=0);
  let mr = 1;
  menRanked.forEach(r => {
    const nb = r.bestSec===Infinity;
    if (!nb) { if (indPts[r.a.team]!==undefined) indPts[r.a.team] += calcIndPts(mr, N_men); mr++; }
  });

  // pkt drużynowy
  const tRows = teams.map(t=>({ t, ok: getTeamAthletes(t).length>=teamMin(), bestSec: parseTime(teamBestTimeEff(t)) }))
    .sort((a,b)=>{ if(!a.ok&&b.ok)return 1;if(a.ok&&!b.ok)return -1;return a.bestSec-b.bestSec; });
  const N_teams = tRows.filter(r=>r.ok&&r.bestSec<Infinity).length;
  const teamPts = {}; teams.forEach(t=>teamPts[t]=0);
  let tr = 1;
  tRows.forEach(r=>{ if(r.ok&&r.bestSec<Infinity){ teamPts[r.t]=calcTeamPts(tr,N_teams,M); tr++; } });

  const result = teams.map(t=>({ team:t, ind:indPts[t]||0, team_:teamPts[t]||0, total:(indPts[t]||0)+(teamPts[t]||0) }))
    .sort((a,b)=>b.total-a.total);

  const topN = cfg.topN > 0 ? cfg.topN : result.length;
  const shown = result.slice(0, topN);
  const baseKlasFs = shown.length > 12 ? 14 : shown.length > 8 ? 16 : 18;
  const scoreSize  = shown.length > 12 ? 20 : shown.length > 8 ? 24 : 28;
  const medals = ['🥇','🥈','🥉'];
  const html = shown.map((r,i) => {
    const rank = i+1;
    const posCls = rank===1?'p1':rank===2?'p2':rank===3?'p3':'other';
    const topCls = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const altCls = i % 2 === 0 ? 'even' : 'odd';
    const rowCls = [topCls, altCls].filter(Boolean).join(' ');
    const posDisp = rank<=3 ? medals[rank-1] : rank;
    const nameLen = (r.team||'').length;
    const fontSize = nameLen > 22 ? Math.max(11, baseKlasFs - 2) + 'px'
                   : nameLen > 16 ? Math.max(12, baseKlasFs - 1) + 'px'
                   : baseKlasFs + 'px';
    return `<div class="klas-row ${rowCls}">
      <div class="klas-pos ${posCls}" style="font-size:${rank<=3?'20px':'17px'};">${posDisp}</div>
      <div class="klas-name" style="font-size:${fontSize};">${esc(r.team)}
        <span class="klas-pts-detail">${r.ind} + ${r.team_} pkt</span>
      </div>
      <div class="klas-score" style="font-size:${scoreSize}px;">${r.total}<br><span style="font-size:10px;color:var(--text3);">PKT</span></div>
    </div>`;
  }).join('');

  return {
    html: html || '<div class="no-data">Brak danych</div>',
    count: shown.length + ' drużyn'
  };
}

function renderKlas() { _renderSection('klas', buildKlasRows()); }

    const withResult = pool.filter(a => bestTime(a.id));

// ── Wspólny render sekcji + scroll ──
function _renderSection(id, { html, count }) {
  const track   = document.getElementById('track-' + id);
  const vp      = document.getElementById('vp-' + id);
  const countEl = document.getElementById('count-' + id);
  if (!track) return;
  if (countEl) countEl.textContent = count;

  // Zatrzymaj stary scroll
  if (_scrollRAFs[id]) { cancelAnimationFrame(_scrollRAFs[id]); delete _scrollRAFs[id]; }

  const speed = cfg.scrollSpeed || 0;

  if (speed > 0) {
    // Ustaw jedną kopię i zmierz wysokość
    track.innerHTML = html;
    track.style.transform = 'translateY(0)';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const vpH   = vp ? vp.offsetHeight : window.innerHeight;
      const oneH  = track.offsetHeight;
      if (oneH <= 0) return;

      // Ile kopii potrzeba żeby wypełnić przynajmniej 2× viewport (płynna pętla)
      // Minimalna liczba kopii: tyle żeby oneH * copies >= vpH * 2
      const copies = Math.max(3, Math.ceil((vpH * 2.5) / oneH) + 1);
      track.innerHTML = Array(copies).fill(html).join('');
      track.style.transform = 'translateY(0)';

      // segH = wysokość jednej kopii po wypełnieniu (może się nieznacznie różnić)
      const segH = track.offsetHeight / copies;

      let pos = 0, lastT = null;
      function step(now) {
        if (!lastT) { lastT = now; }
        const dt = Math.min(now - lastT, 50);
        lastT = now;
        pos += speed * dt / 1000;
        // Kiedy przewinęliśmy dokładnie jedną kopię — cofnij bezszwowo
        if (pos >= segH) pos -= segH;
        track.style.transform = `translateY(-${pos}px)`;
        _scrollRAFs[id] = requestAnimationFrame(step);
      }
      _scrollRAFs[id] = requestAnimationFrame(step);
    }));
  } else {
    track.innerHTML = html;
    track.style.transform = 'translateY(0)';
  }
}

function renderStartlist() {

  const gender   = cfg2.slGender  || 'both';

  if (!main) return;

  // Zatrzymaj stare scrolle
  Object.keys(_slScrollRAFs).forEach(k => {
    if (_slScrollRAFs[k]) cancelAnimationFrame(_slScrollRAFs[k]);
    delete _slScrollRAFs[k];
  });

  main.innerHTML = '';

  genders.forEach(g => {
    const gPairs = pairs.filter(p => p.gender === g).sort((a,b) => a.pairNum - b.pairNum);
    if (!gPairs.length && gender === 'both') return; // pomiń pustą płeć

    const block = document.createElement('div');

    const gLabel    = g === 'M' ? '♂ Mężczyźni' : '♀ Kobiety';
    const sLabel    = series === 's1' ? 'Seria 1' : 'Seria 2';
    block.innerHTML = `<div class="sl-section-header ind-${g.toLowerCase()}">
      <span>${gLabel} — ${sLabel}</span>
      <span style="font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:400;">${gPairs.filter(p=>p.aId).length} par</span>
    </div>`;

    const vp = document.createElement('div');
    vp.className = 'sl-scroll-viewport';
    vp.id = 'sl-vp-' + g;

    const track = document.createElement('div');
    track.className = 'sl-scroll-track';
    track.id = 'sl-track-' + g;

    const html = buildStartlistRows(gPairs, athletes, series);
    vp.appendChild(track);
    block.appendChild(vp);
    main.appendChild(block);

    _renderSlSection(g, html, speed, vp);
  });
}

function buildStartlistRows(pairs, athletes, series) {
  if (!pairs.length) return '<div class="no-data">Brak par — wygeneruj listę startową</div>';

  const N        = pairs.length;
  const nameSize = N > 20 ? 14 : N > 14 ? 16 : N > 9 ? 18 : 20;
  const subSize  = 11;
  const numSize  = N > 20 ? 18 : N > 14 ? 20 : 22;

  // Oblicz ranking wg czasu S1 dla badge'y — tylko gdy seria S2 lub mamy S1 times
  const rankMap = new Map(); // athleteId → rank (1-based)
  const gender  = pairs[0] && pairs[0].gender;
  if (gender) {
    const allAthletes = athletes.filter(a => a.gender === gender);
    const withTime = allAthletes
      .map(a => ({ id: a.id, sec: parseTime(getTime(a.id, 's1')) }))
      .filter(r => r.sec < Infinity)
      .sort((a, b) => a.sec - b.sec);
    withTime.forEach((r, i) => rankMap.set(r.id, i + 1));
  }

  const BADGES = [
    null,
    { icon: '🥇', label: 'LIDER',      color: '#ffd700' },
    { icon: '🥈', label: 'WICELIDER',  color: '#c8d0d8' },
    { icon: '🥉', label: 'PODIUM',     color: '#d4a060' },
    { icon: '⚔️', label: 'WALKA O MEDAL', color: '#e8944d' },
  ];

  function rankBadge(athId) {
    const r = rankMap.get(athId);
    if (!r || r > 4) return '';
    const b = BADGES[r];
    return `<span style="font-size:10px;font-weight:700;letter-spacing:.5px;
      color:${b.color};border:1px solid ${b.color}33;background:${b.color}18;
      padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle;
      font-family:var(--font-b);white-space:nowrap;">${b.icon} ${b.label}</span>`;
  }

  function athleteHTML(ath, lane, isSoloSlot) {
    if (!ath || isSoloSlot) {
      // Pusty slot — nie pokazuj nic (para solo nie ma drugiej strony)
      return `<div class="sl-athlete" style="flex:1;"></div>`;
    }
    const nameLen = (ath.name || '').length;
    const fs = nameLen > 22 ? Math.max(11, nameSize - 3)
             : nameLen > 16 ? Math.max(12, nameSize - 1)
             : nameSize;
    const s1time = state.times && state.times[ath.id] && state.times[ath.id].s1 || '';
    const s1dsq  = !!(state.disq && state.disq[ath.id] && state.disq[ath.id].s1);
    const timeStr = s1time ? (s1dsq ? ' · <span style="color:var(--red);">DSQ</span>' : ' · ' + s1time) : '';
    const badge   = rankBadge(ath.id);
    return `<div class="sl-athlete lane-${lane}">
      <div class="sl-lane-badge ${lane}">${lane}</div>
      <div class="sl-athlete-name" style="font-size:${fs}px;">${esc(ath.name)}${badge}</div>
      <div class="sl-athlete-sub" style="font-size:${subSize}px;">${esc(ath.team || '')}${timeStr}</div>
    </div>`;
  }

  return pairs.map((p, idx) => {
    const aAth  = p.aId ? athletes.find(x => x.id === p.aId) : null;
    const bAth  = p.bId ? athletes.find(x => x.id === p.bId) : null;
    const isSolo = !aAth || !bAth;
    const altCls = idx % 2 === 0 ? 'even' : 'odd';

    const laneA = p.aLane || 'L';
    const laneB = p.bLane || 'P';

    // Zawodnik L po lewej, P po prawej — solo po swojej stronie, druga strona pusta
    const [athL, athP] = laneA === 'L' ? [aAth, bAth] : [bAth, aAth];

    // Solo badge w nagłówku pary
    const soloBadge = isSolo
      ? `<span style="font-size:10px;font-weight:800;letter-spacing:1.5px;
          color:var(--orange);border:1px solid rgba(240,144,80,.4);
          background:rgba(240,144,80,.1);padding:2px 8px;border-radius:3px;
          margin-left:8px;">SOLO</span>`
      : '';

    return `<div class="sl-pair-row ${altCls}">
      <div class="sl-pair-num" style="font-size:${numSize}px;">
        ${p.pairNum}${soloBadge}
      </div>
      ${athleteHTML(athL, 'L', isSolo && laneA === 'P')}
      ${isSolo ? '<div style="width:48px;min-width:48px;flex-shrink:0;"></div>' : '<div class="sl-vs">VS</div>'}
      ${athleteHTML(athP, 'P', isSolo && laneA === 'L')}
    </div>`;
  }).join('');
}

function _renderSlSection(id, html, speed, vp) {
  const track = document.getElementById('sl-track-' + id);
  if (!track) return;

  if (_slScrollRAFs[id]) { cancelAnimationFrame(_slScrollRAFs[id]); delete _slScrollRAFs[id]; }

  if (speed > 0) {
    track.innerHTML = html;
    track.style.transform = 'translateY(0)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const vpH   = vp.offsetHeight;
      const oneH  = track.offsetHeight;
      if (oneH <= 0) return;
      const copies = Math.max(3, Math.ceil((vpH * 2.5) / oneH) + 1);
      track.innerHTML = Array(copies).fill(html).join('');
      const segH = track.offsetHeight / copies;
      let pos = 0, lastT = null;
      function step(now) {
        if (!lastT) lastT = now;
        const dt = Math.min(now - lastT, 50);
        lastT = now;
        pos += speed * dt / 1000;
        if (pos >= segH) pos -= segH;
        track.style.transform = `translateY(-${pos}px)`;
        _slScrollRAFs[id] = requestAnimationFrame(step);
      }
      _slScrollRAFs[id] = requestAnimationFrame(step);
    }));
  } else {
    track.innerHTML = html;
    track.style.transform = 'translateY(0)';
  }
}


</script>
